// ── PWA Install ──
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _pwaPrompt = e;
  // Notifier React que l'install est disponible
  window.dispatchEvent(new CustomEvent('pwa-install-ready'));
});
window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  window.dispatchEvent(new CustomEvent('pwa-installed'));
});
window.installPWA = async function() {
  if (!_pwaPrompt) return false;
  _pwaPrompt.prompt();
  const { outcome } = await _pwaPrompt.userChoice;
  _pwaPrompt = null;
  return outcome === 'accepted';
};
window.canInstallPWA = () => !!_pwaPrompt;
// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

async function createStripeCheckout(cartItems, customerEmail){
  const sw=Array.isArray(cartItems)?cartItems[0]:null;
  if(!sw)throw new Error("Aucun produit à payer.");

  const priceId=STRIPE_PRICES[sw.slug];
  if(!priceId)throw new Error(`priceId manquant pour : ${sw.slug||'inconnu'}`);

  const payload={
    priceId,
    email:customerEmail||"",
    softwareSlug:sw.slug,
    items:[{slug:sw.slug,priceId,quantity:1}],
    customerEmail:customerEmail||"",
    successUrl:window.location.origin+window.location.pathname+'?payment=success',
    cancelUrl:window.location.origin+window.location.pathname+'?payment=cancel'
  };

  const resp=await fetch(CHECKOUT_FUNCTION_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const session=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(session.error||"Fonction create-checkout indisponible.");
  if(session.error)throw new Error(session.error);
  if(!session.url)throw new Error("URL Stripe introuvable.");
  return session;
}

async function callMistralProxy(payload){
  const headers={'Content-Type':'application/json'};
  // Envoyer le token Supabase (requis par les Edge Functions)
  if(supabaseClient){
    try{
      const {data:s}=await supabaseClient.auth.getSession();
      if(s?.session?.access_token) headers['Authorization']=`Bearer ${s.session.access_token}`;
      else headers['Authorization']=`Bearer ${supabaseKey}`;
    }catch(e){ headers['Authorization']=`Bearer ${supabaseKey}`; }
  } else { headers['Authorization']=`Bearer ${supabaseKey}`; }
  const resp=await fetch(MISTRAL_PROXY_URL,{
    method:'POST',
    headers,
    body:JSON.stringify(payload)
  });
  const data=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(data.error||"Fonction mistral-proxy indisponible.");
  return data;
}

async function uploadCompanyLogoToCloud(file,userId){
  if(!supabaseClient) throw new Error("Supabase n'est pas configuré.");
  if(!userId) throw new Error("Utilisateur non connecté.");
  const ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'');
  const filePath=`${userId}/company-logo.${ext||'png'}`;
  const { error: uploadError } = await supabaseClient.storage
    .from(COMPANY_LOGO_BUCKET)
    .upload(filePath, file, { upsert:true, cacheControl:'3600' });
  if(uploadError) throw uploadError;
  const { data } = supabaseClient.storage.from(COMPANY_LOGO_BUCKET).getPublicUrl(filePath);
  return data?.publicUrl || "";
}

async function persistCompanyLogoUrl(userId, logoUrl){
  if(!supabaseClient||!userId||!logoUrl)return;
  const metadata = { companyLogoUrl: logoUrl, companyLogo: logoUrl };
  try{
    await supabaseClient.auth.updateUser({ data: metadata });
  }catch(e){
    console.warn('auth.updateUser companyLogo failed:',e);
  }
  try{
    await supabaseClient.from('user_profiles').upsert({ user_id:userId, company_logo_url:logoUrl }, { onConflict:'user_id' });
  }catch(e){
    console.warn('user_profiles upsert skipped:',e);
  }
}

async function syncSubsFromCloud(userId, softwareList, setUser, setUsers){
  const cloudSubs=await loadUserSubs(userId, softwareList);
  setUser(prev=>{
    if(!prev)return prev;
    const next={...prev,subs:cloudSubs};
    if(setUsers)setUsers(us=>us.map(u=>String(u.id)===String(next.id)?{...u,...next}:u));
    return next;
  });
  return cloudSubs;
}

const normalizeTeamSoftwareIds=value=>Array.isArray(value)?value.map(v=>Number(v)).filter(v=>!Number.isNaN(v)):[];
const mapTeamMemberRow=row=>row?({...row,ownerId:row.owner_id,userId:row.user_id,softwareIds:normalizeTeamSoftwareIds(row.software_ids),createdAt:row.created_at}):null;
const TEAM_INVITES_LS_KEY='oniq_team_invites';
const TEAM_MEMBERS_LS_KEY='oniq_team_members';
const TEAM_SESSIONS_LS_KEY='oniq_team_sessions';
const TEAM_COMPANIES_LS_KEY='oniq_team_companies';

function readJsonArray(key){
  try{
    const raw=localStorage.getItem(key);
    const parsed=raw?JSON.parse(raw):[];
    return Array.isArray(parsed)?parsed:[];
  }catch(e){
    return [];
  }
}

function writeJsonArray(key, value){
  try{ localStorage.setItem(key, JSON.stringify(Array.isArray(value)?value:[])); }catch(e){}
}

function localId(prefix='id'){
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
}

function upsertLocalRow(key, row, matchFn){
  const rows=readJsonArray(key);
  const idx=rows.findIndex(matchFn);
  if(idx>=0) rows[idx]={...rows[idx], ...row};
  else rows.push(row);
  writeJsonArray(key, rows);
  return idx>=0?rows[idx]:row;
}

function getLocalTeamInviteByToken(token){
  if(!token) return null;
  return readJsonArray(TEAM_INVITES_LS_KEY).find(r=>r.token===token) || null;
}

function getLocalOwnerTeamMembers(ownerId){
  return readJsonArray(TEAM_MEMBERS_LS_KEY)
    .filter(r=>String(r.owner_id)===String(ownerId))
    .sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||'')));
}

function getLocalTeamMemberByAuth(ownerId, userId){
  if(!ownerId || !userId) return null;
  return getLocalOwnerTeamMembers(ownerId).find(r=>String(r.user_id)===String(userId)) || null;
}

function getLocalTeamMemberByEmail(ownerId, email){
  const normalized=String(email||'').trim().toLowerCase();
  if(!ownerId || !normalized) return null;
  return getLocalOwnerTeamMembers(ownerId).find(r=>String(r.email||'').trim().toLowerCase()===normalized) || null;
}

function saveLocalTeamMember(row){
  const normalized={
    id: row.id || localId('tm'),
    owner_id: String(row.owner_id||''),
    user_id: row.user_id?String(row.user_id):'',
    email: String(row.email||'').trim().toLowerCase(),
    name: row.name || String(row.email||'membre').split('@')[0],
    status: row.status || 'active',
    software_ids: normalizeTeamSoftwareIds(row.software_ids),
    created_at: row.created_at || new Date().toISOString()
  };
  return upsertLocalRow(TEAM_MEMBERS_LS_KEY, normalized, r=>String(r.id)===String(normalized.id) || (String(r.owner_id)===String(normalized.owner_id) && String(r.email||'').toLowerCase()===normalized.email));
}

function saveLocalTeamInvite(row){
  const normalized={
    token: row.token,
    owner_id: String(row.owner_id||''),
    owner_email: row.owner_email || '',
    owner_company: row.owner_company || 'Mon entreprise',
    owner_logo_url: row.owner_logo_url || row.ownerLogo || '',
    status: row.status || 'pending',
    created_at: row.created_at || new Date().toISOString()
  };
  return upsertLocalRow(TEAM_INVITES_LS_KEY, normalized, r=>r.token===normalized.token);
}

function saveLocalTeamSession(row){
  const normalized={
    id: row.id || localId('ts'),
    invite_token: row.invite_token,
    member_id: row.member_id,
    created_at: row.created_at || new Date().toISOString()
  };
  return upsertLocalRow(TEAM_SESSIONS_LS_KEY, normalized, r=>String(r.invite_token)===String(normalized.invite_token) && String(r.member_id)===String(normalized.member_id));
}

function sanitizeCompanyCode(value){
  return String(value||'').trim().toUpperCase().replace(/[^A-Z0-9-]/g,'');
}

function genCompanyAccessCode(ownerId){
  const clean = String(ownerId||genCode()).replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
  const core = (clean.slice(0,4) || genCode().slice(0,4)).padEnd(4,'X');
  const tail = genCode().slice(0,4);
  return `${core}-${tail}`;
}

function saveLocalCompanyDirectory(row){
  const normalized={
    owner_id:String(row.owner_id||''),
    company_code:sanitizeCompanyCode(row.company_code||row.companyCode||''),
    owner_email:row.owner_email||'',
    owner_company:row.owner_company||'Entreprise',
    owner_logo_url:row.owner_logo_url||'',
    created_at:row.created_at||new Date().toISOString(),
    updated_at:new Date().toISOString()
  };
  return upsertLocalRow(TEAM_COMPANIES_LS_KEY, normalized, r=>String(r.owner_id)===String(normalized.owner_id) || sanitizeCompanyCode(r.company_code)===normalized.company_code);
}

function getLocalCompanyDirectoryByCode(code){
  const normalized=sanitizeCompanyCode(code);
  if(!normalized) return null;
  return readJsonArray(TEAM_COMPANIES_LS_KEY).find(r=>sanitizeCompanyCode(r.company_code)===normalized) || null;
}

async function ensureCompanyDirectory(owner){
  if(!owner?.id) return null;
  const localRows=readJsonArray(TEAM_COMPANIES_LS_KEY);
  const existingLocal=localRows.find(r=>String(r.owner_id)===String(owner.id));
  const row={
    owner_id:String(owner.id),
    company_code:sanitizeCompanyCode(existingLocal?.company_code || owner.companyCode || genCompanyAccessCode(owner.id)),
    owner_email:owner.email||'',
    owner_company:owner.company||'Entreprise',
    owner_logo_url:owner.companyLogo||'',
    created_at:existingLocal?.created_at || new Date().toISOString(),
    updated_at:new Date().toISOString()
  };
  saveLocalCompanyDirectory(row);
  if(!supabaseClient) return row;
  try{
    const payload={...row};
    const { error } = await supabaseClient.from('company_directory').upsert(payload,{ onConflict:'owner_id' });
    if(error){
      console.warn('ensureCompanyDirectory cloud skipped:', error.message||error);
      return row;
    }
  }catch(e){
    console.warn('ensureCompanyDirectory error:', e?.message||e);
  }
  return row;
}

async function getCompanyDirectoryByCode(code){
  const normalized=sanitizeCompanyCode(code);
  if(!normalized) return null;
  if(supabaseClient){
    try{
      const { data, error } = await supabaseClient.from('company_directory').select('*').eq('company_code', normalized).maybeSingle();
      if(!error && data) return data;
      if(error) console.warn('getCompanyDirectoryByCode client error:', error.message||error);
    }catch(e){
      console.warn('getCompanyDirectoryByCode exception:', e?.message||e);
    }
  }
  try{
    const resp = await fetch(`${supabaseUrl}/rest/v1/company_directory?company_code=eq.${encodeURIComponent(normalized)}&select=*&limit=1`,{
      headers:{
        'apikey': supabaseKey,
        'Authorization': `Bearer ${supabaseKey}`,
        'Accept': 'application/json'
      }
    });
    if(resp.ok){
      const rows = await resp.json();
      if(Array.isArray(rows) && rows.length>0) return rows[0];
    }
  }catch(e){
    console.warn('getCompanyDirectoryByCode REST fallback error:', e?.message||e);
  }
  return getLocalCompanyDirectoryByCode(normalized);
}


function isPermissionError(error){
  const msg=String(error?.message||error||'').toLowerCase();
  return msg.includes('row-level security') || msg.includes('violates row-level security') || msg.includes('permission denied') || msg.includes('not allowed');
}

async function createTeamInvite(owner){
  const token=(window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():genCode()+genCode();
  const row={
    token,
    owner_id:String(owner?.id||''),
    owner_email:owner?.email||'',
    owner_company:owner?.company||'Mon entreprise',
    owner_logo_url:owner?.companyLogo||'',
    status:'pending',
    created_at:new Date().toISOString()
  };
  saveLocalTeamInvite(row);
  if(!supabaseClient) return token;
  try{
    let { error } = await supabaseClient.from('team_invites').insert(row);
    if(error && /owner_logo_url/i.test(String(error.message||''))){
      const legacyRow={
        token,
        owner_id:String(owner?.id||''),
        owner_email:owner?.email||'',
        owner_company:owner?.company||'Mon entreprise',
        status:'pending',
        created_at:row.created_at
      };
      const retry = await supabaseClient.from('team_invites').insert(legacyRow);
      error = retry.error || null;
    }
    if(error){
      console.warn('createTeamInvite cloud failed, local fallback kept:', error.message||error);
      return token;
    }
    return token;
  }catch(e){
    console.warn('createTeamInvite exception, local fallback kept:', e?.message||e);
    return token;
  }
}

async function getTeamInviteByToken(token){
  if(!token) return null;
  // Tentative 1 : via supabaseClient normal
  if(supabaseClient){
    try{
      const { data, error } = await supabaseClient.from('team_invites').select('*').eq('token', token).maybeSingle();
      if(!error && data) return data;
      if(error) console.warn('getTeamInviteByToken client error:', error.message);
    }catch(e){console.warn('getTeamInviteByToken exception:', e);}
  }
  // Tentative 2 : requête REST directe avec la clé anon (fonctionne en navigation privée)
  try{
    const resp = await fetch(`${supabaseUrl}/rest/v1/team_invites?token=eq.${encodeURIComponent(token)}&select=*&limit=1`,{
      headers:{
        'apikey': supabaseKey,
        'Authorization': `Bearer ${supabaseKey}`,
        'Accept': 'application/json'
      }
    });
    if(resp.ok){
      const rows = await resp.json();
      if(Array.isArray(rows) && rows.length>0) return rows[0];
    }
  }catch(e){console.warn('getTeamInviteByToken REST fallback error:', e);}
  return getLocalTeamInviteByToken(token);
}

async function getOwnerTeamMembers(ownerId){
  if(!ownerId) return [];
  const localRows=getLocalOwnerTeamMembers(ownerId).map(mapTeamMemberRow);
  if(!supabaseClient) return localRows;
  const { data, error } = await supabaseClient.from('team_members').select('*').eq('owner_id', String(ownerId)).order('created_at', {ascending:true});
  if(error){console.error('Erreur getOwnerTeamMembers:', error); return localRows;}
  const cloudRows=Array.isArray(data)?data.map(mapTeamMemberRow):[];
  const merged=[];
  const seen=new Set();
  [...cloudRows,...localRows].forEach(row=>{
    const key=row?.id||`${row?.ownerId}_${row?.email}`;
    if(row && !seen.has(key)){
      seen.add(key);
      merged.push(row);
    }
  });
  return merged;
}

async function updateTeamMemberSoftware(memberId, softwareIds){
  if(!memberId) return;
  const rows=readJsonArray(TEAM_MEMBERS_LS_KEY);
  const idx=rows.findIndex(r=>String(r.id)===String(memberId));
  if(idx>=0){ rows[idx]={...rows[idx], software_ids:normalizeTeamSoftwareIds(softwareIds)}; writeJsonArray(TEAM_MEMBERS_LS_KEY, rows); }
  if(!supabaseClient) return;
  const { error } = await supabaseClient.from('team_members').update({software_ids:softwareIds}).eq('id', memberId);
  if(error){
    if(isPermissionError(error)) return;
    throw error;
  }
}

async function updateTeamMemberStatus(memberId, status){
  if(!memberId) return;
  const rows=readJsonArray(TEAM_MEMBERS_LS_KEY);
  const idx=rows.findIndex(r=>String(r.id)===String(memberId));
  if(idx>=0){ rows[idx]={...rows[idx], status}; writeJsonArray(TEAM_MEMBERS_LS_KEY, rows); }
  if(!supabaseClient) return;
  const { error } = await supabaseClient.from('team_members').update({status}).eq('id', memberId);
  if(error){
    if(isPermissionError(error)) return;
    throw error;
  }
}

async function createOrUpdateTeamMember({ownerId,userId,email,name}){
  const normalizedEmail=String(email||'').trim().toLowerCase();
  let existing=await getTeamMemberByEmail(ownerId, normalizedEmail);
  const payload={user_id:String(userId||''),name:name||(existing?.name)||normalizedEmail.split('@')[0],status:'active'};
  if(existing){
    saveLocalTeamMember({
      id: existing.id,
      owner_id:String(ownerId),
      user_id:String(userId||existing.userId||''),
      email:normalizedEmail,
      name:payload.name,
      status:'active',
      software_ids:existing.softwareIds||existing.software_ids||[],
      created_at:existing.createdAt||existing.created_at
    });
    if(!supabaseClient) return mapTeamMemberRow(saveLocalTeamMember({
      id: existing.id,
      owner_id:String(ownerId),
      user_id:String(userId||existing.userId||''),
      email:normalizedEmail,
      name:payload.name,
      status:'active',
      software_ids:existing.softwareIds||existing.software_ids||[],
      created_at:existing.createdAt||existing.created_at
    }));
    const { data, error } = await supabaseClient.from('team_members').update(payload).eq('id', existing.id).select('*').maybeSingle();
    if(error){
      if(isPermissionError(error)) return mapTeamMemberRow(saveLocalTeamMember({
        id: existing.id,
        owner_id:String(ownerId),
        user_id:String(userId||existing.userId||''),
        email:normalizedEmail,
        name:payload.name,
        status:'active',
        software_ids:existing.softwareIds||existing.software_ids||[],
        created_at:existing.createdAt||existing.created_at
      }));
      throw error;
    }
    return mapTeamMemberRow(data||{...existing,user_id:String(userId),name:payload.name,status:'active'});
  }
  const newRow={
    id: localId('tm'),
    owner_id:String(ownerId),
    user_id:String(userId||''),
    email:normalizedEmail,
    name:name||normalizedEmail.split('@')[0],
    status:'active',
    software_ids:[],
    created_at:new Date().toISOString()
  };
  saveLocalTeamMember(newRow);
  if(!supabaseClient) return mapTeamMemberRow(newRow);
  const { data, error } = await supabaseClient.from('team_members').insert({
    owner_id:String(ownerId),
    user_id:String(userId),
    email:normalizedEmail,
    name:name||normalizedEmail.split('@')[0],
    status:'active',
    software_ids:[]
  }).select('*').maybeSingle();
  if(error){
    if(isPermissionError(error)) return mapTeamMemberRow(newRow);
    throw error;
  }
  return mapTeamMemberRow(data);
}

const Sparkline=({data})=>{
  const max=Math.max(...data),min=Math.min(...data),w=300,h=60,p=6;
  const x=(i)=>p+(i/(data.length-1))*(w-p*2);
  const y=(v)=>h-p-((v-min)/(max-min||1))*(h-p*2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} ${data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")} L${x(data.length-1)},${h} L${x(0)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:60}}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.25"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#g1)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r="3" fill={C.gold}/>
          <text x={x(i)} y={h} textAnchor="middle" style={{fontSize:8,fontFamily:SS,fill:C.stone}}>{MRR_MONTHS[i]}</text>
        </g>
      ))}
    </svg>
  );
};

  const is={width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"12px 14px",fontFamily:SS,fontSize:13,color:C.ivory,outline:"none",boxSizing:"border-box"};

  const doResetPassword=async()=>{
    setErr("");
    if(!email){setErr("Saisissez votre email.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const {error}=await supabaseClient.auth.resetPasswordForEmail(email.trim(),{
        redirectTo:window.location.origin+window.location.pathname
      });
      if(error){setErr(error.message||"Erreur lors de l'envoi.");return;}
      setResetSent(true);
    }catch(e){
      setErr(e?.message||"Erreur lors de l'envoi.");
    }finally{
      setLoading(false);
    }
  };

  const doLogin=async()=>{
    setErr("");
    if(!email||!pass){setErr("Saisissez votre email et votre mot de passe.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email.trim(),
        password: pass
      });
      if(error){
        const msg=(error.message||'').toLowerCase();
        if(msg.includes('email not confirmed')){
          setErr("Votre email n'est pas encore confirmé. Vérifiez votre boîte mail (et vos spams) et cliquez sur le lien de confirmation.");
        } else if(msg.includes('invalid login') || msg.includes('invalid credentials')){
          setErr("Email ou mot de passe incorrect. Si vous venez de créer votre compte, vérifiez que vous avez confirmé votre email via le lien reçu par mail.");
        } else {
          setErr(error.message||"Connexion impossible.");
        }
        return;
      }
      const authUser=data?.user;
      if(!authUser){setErr("Connexion impossible.");return;}
      onLogin(mapAuthUserToDemoUser(authUser),false);
    }catch(e){
      setErr(e?.message||"Connexion impossible.");
    }finally{
      setLoading(false);
    }
  };

  const doRegister=async()=>{
    setErr("");
    if(!reg.company||!reg.email||!reg.pass){setErr("Remplissez tous les champs.");return;}
    if(reg.pass!==reg.pass2){setErr("Mots de passe différents.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email: reg.email.trim(),

          data: {

            name: reg.name || reg.company,

        setErr("Compte créé. Vérifie ton email pour confirmer ton inscription.");
        setMode("login");
        setStep(1);
        return;
      }

        return;

      setStep(1);

      setErr((e && e.message) ? e.message : "Inscription impossible.");

const PasswordResetPage=({onDone})=>{
  const [password,setPassword]=useState('');
  const [password2,setPassword2]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState(false);

  useEffect(()=>{
    let active=true;
    async function bootstrapRecovery(){
      if(!supabaseClient) return;
      try{
        const hashParams=new URLSearchParams((window.location.hash||'').replace(/^#/,''));
        const accessToken=hashParams.get('access_token');
        const refreshToken=hashParams.get('refresh_token');
        if(accessToken && refreshToken){
          const { error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if(error) throw error;
        }
        if(active){
          const cleanUrl=window.location.pathname + window.location.search;
          window.history.replaceState({},'',cleanUrl);
        }
      }catch(e){
        if(active) setErr(e?.message||"Lien de réinitialisation invalide ou expiré.");
      }
    }
    bootstrapRecovery();
    return ()=>{active=false;};
  },[]);

  const submit=async()=>{
    setErr('');
    if(!password || !password2){
      setErr('Saisissez votre nouveau mot de passe.');
      return;
    }
    if(password.length<6){
      setErr('Le mot de passe doit contenir au moins 6 caractères.');
      return;
    }
    if(password!==password2){
      setErr('Les mots de passe sont différents.');
      return;
    }
    if(!supabaseClient){
      setErr("Supabase n'est pas configuré.");
      return;
    }
    setLoading(true);
    try{
      const { error } = await supabaseClient.auth.updateUser({ password });
      if(error) throw error;
      setOk(true);
      try{ await supabaseClient.auth.signOut(); }catch(e){}
    }catch(e){
      setErr(e?.message||"Impossible de changer le mot de passe.");
    }finally{
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:520,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:isMob()?'28px 22px':'36px 34px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
        <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.gold,marginBottom:8}}>Réinitialisation du mot de passe</div>
        <div style={{fontFamily:SF,fontSize:isMob()?30:38,fontWeight:700,color:C.ink,marginBottom:8}}>Choisir un nouveau mot de passe</div>
        <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.7,marginBottom:20}}>
          {ok ? "Votre mot de passe a bien été mis à jour." : "Saisissez votre nouveau mot de passe puis validez pour revenir à la connexion."}
        </div>

        {!ok ? (
          <>
            <TI label='Nouveau mot de passe' value={password} onChange={e=>setPassword(e.target.value)} type='password'/>
            <TI label='Confirmer le mot de passe' value={password2} onChange={e=>setPassword2(e.target.value)} type='password' mb={8}/>
            {err && <div style={{background:'#fff4f4',border:'1px solid #efc7c7',color:'#8d2d2d',borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,lineHeight:1.6,margin:'12px 0 16px'}}>{err}</div>}
            <button disabled={loading} onClick={submit} style={{width:'100%',background:C.ink,border:'none',borderRadius:6,padding:'12px 16px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ivory,cursor:'pointer',opacity:loading?0.7:1}}>
              {loading?'Enregistrement...':'Enregistrer le nouveau mot de passe'}
            </button>
          </>
        ) : (
          <>
            <div style={{background:'#f6f2e8',border:`1px solid ${C.linen}`,color:C.ink,borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,lineHeight:1.6,margin:'12px 0 16px'}}>
              Vous pouvez maintenant vous reconnecter avec votre nouveau mot de passe.
            </div>
            <button onClick={onDone} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'12px 16px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer'}}>

        <div style={{borderTop:`1px solid ${C.linen}`,padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,background:C.bg,marginLeft:0}}>

          <div style={{display:"flex",gap:18}}>
            <button onClick={()=>{setPrevView(view);setView("pub-mentions");}} style={{background:"none",border:"none",fontFamily:SS,fontSize:10,color:C.stone,cursor:"pointer",textDecoration:"underline",padding:0}}>Mentions légales</button>

const Marketplace=({user,setUser,software,setView,onAuth})=>{
  const [cat,setCat]=useState("Tous");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("popular");
  const [cart,setCart]=useState([]);
  const [detail,setDetail]=useState(null);
  const [showCart,setShowCart]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [toast,setToast]=useState(null);
  const [aiQ,setAiQ]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiRes,setAiRes]=useState(null);
  const [showAi,setShowAi]=useState(false);

  const CATS=["Tous",...Array.from(new Set(software.map(s=>s.cat)))];
  let list=software.filter(s=>(cat==="Tous"||s.cat===cat)&&s.name.toLowerCase().includes(search.toLowerCase()));
  if(sort==="popular")list=[...list].sort((a,b)=>b.reviews-a.reviews);
  if(sort==="rating")list=[...list].sort((a,b)=>b.rating-a.rating);
  if(sort==="price_asc")list=[...list].sort((a,b)=>a.price-b.price);
  if(sort==="price_desc")list=[...list].sort((a,b)=>b.price-a.price);

  const isSub=id=>user?.subs?.includes(id);
  const isTrial=id=>user&&isTrialActive(user.trials?.[id]);
  const isCart=id=>cart.includes(id);

  const [showTrialCode,setShowTrialCode]=useState(null);
  const [trialCodeInput,setTrialCodeInput]=useState('');
  const [trialCodeErr,setTrialCodeErr]=useState('');
  const [trialCodeLoading,setTrialCodeLoading]=useState(false);

  const startTrial=id=>{
    if(!user){onAuth("register");return;}
    setShowTrialCode(id);
    setTrialCodeInput('');
    setTrialCodeErr('');
  };
  const submitTrialCode=async()=>{
    if(!trialCodeInput.trim()){setTrialCodeErr("Saisissez un code d'essai.");return;}
    setTrialCodeLoading(true);setTrialCodeErr('');
    const result=await redeemTrialCode(trialCodeInput,user.id,user.email);
    setTrialCodeLoading(false);
    if(!result.ok){setTrialCodeErr(result.msg);return;}
    // Vérifier que le code correspond au bon logiciel
    const sw=software.find(s=>s.id===showTrialCode);
    if(sw&&result.slug!==sw.slug){setTrialCodeErr("Ce code est pour un autre logiciel.");return;}
    setUser(u=>({...u,trials:{...u.trials,[showTrialCode]:Date.now()}}));
    setShowTrialCode(null);
    setToast(`✓ ${result.msg}`);
    setTimeout(()=>setToast(null),4000);
    setDetail(null);
  };
  const toggleCart=id=>{if(!user){onAuth("register");return;}setCart(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
  const cartItems=software.filter(s=>cart.includes(s.id));
  const cartTotal=cartItems.reduce((s,x)=>s+x.price,0);
  const pay=async()=>{
    try{localStorage.setItem('oniq_pending_subs',JSON.stringify({cart,userId:user.id,email:user.email,ts:Date.now()}));if(supabaseClient&&user?.id){supabaseClient.from('software_user_data').upsert({user_id:String(user.id),software_slug:'_pending',data_key:'pending_cart',data_value:JSON.stringify({cart,userId:user.id,email:user.email,ts:Date.now()}),updated_at:new Date().toISOString()},{onConflict:'user_id,software_slug,data_key'}).catch(()=>{});}}catch(e){}
    try{
      const session=await createStripeCheckout(cartItems, user.email);
      if(session&&session.url){
        window.location.href=session.url;
        return;
      }
      throw new Error("Session de paiement indisponible.");
    }catch(e){
      console.error('Stripe error:',e);
      setToast("Paiement indisponible : "+e.message);
      setTimeout(()=>setToast(null),5000);
    }
  };

  const runAi=async()=>{
    if(!user){onAuth("register");return;}
    if(!aiQ.trim())return;
    setAiLoad(true);setAiRes(null);
    try{
      const catalog=software.map(s=>`id:${s.id} ${s.name}(${s.price}€): ${s.desc}`).join("\n");
      const prompt=`Catalogue:\n${catalog}\n\nBesoin: "${aiQ}"\n\nRéponds UNIQUEMENT en JSON sans markdown:\n{"message":"réponse courte","matches":[{"id":1,"reason":"raison"}],"noMatch":false}`;
      const data=await callMistralProxy({model:"mistral-small-latest",messages:[{role:"user",content:prompt}],temperature:0.3});
      if(data.error)throw new Error(data.error.message);
      const txt=data.choices?.[0]?.message?.content||"{}";
      setAiRes(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setAiRes({message:"Une erreur est survenue, réessayez.",matches:[],noMatch:true});}
    setAiLoad(false);

              <span>✦</span> Recherche IA
              {!user&&<span style={{fontSize:9,background:C.gold,color:C.ink,borderRadius:2,padding:"1px 5px",fontWeight:800,marginLeft:2}}>PRO</span>}

            <span style={{fontFamily:SF,fontWeight:700,fontSize:17,color:C.ink}}>{cartTotal} €</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowCart(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Continuer</button>
            <button onClick={()=>{setShowCart(false);setShowPay(true);}} style={{flex:2,background:C.gold,border:"none",borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Passer au paiement</button>

      )}

      {/* Paiement — Récap puis redirection Stripe */}

        <Overlay title="Paiement" subtitle="Abonnement mensuel · résiliable à tout moment" onClose={()=>setShowPay(false)}>

            {cartItems.map(sw=><div key={sw.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontFamily:SS,fontSize:12}}><span style={{color:C.ink}}>{sw.icon} {sw.name}</span><span style={{color:C.gold,fontWeight:700}}>{sw.price}€</span></div>)}
            <HR s={{margin:"9px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,textTransform:"uppercase"}}>Total / mois</span><span style={{fontFamily:SF,fontWeight:700,fontSize:14,color:C.ink}}>{cartTotal} €</span></div>
          </div>
          <div style={{background:C.greenDim,border:`1px solid ${C.green}33`,borderRadius:6,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🔒</span>
            <div><div style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.green}}>Paiement sécurisé par Stripe</div><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2}}>Vous allez être redirigé vers la page de paiement sécurisée Stripe</div></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowPay(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"11px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Annuler</button>
            <button onClick={pay} style={{flex:2,background:C.gold,border:"none",borderRadius:4,padding:"11px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Payer avec Stripe · {cartTotal}€/mois</button>
          </div>

      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

      {/* Modal Code d'essai */}
      {showTrialCode&&(
        <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(10,10,8,0.55)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}} onClick={()=>setShowTrialCode(null)}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:isMob()?"16px 14px":"32px 36px",width:420,maxWidth:"94vw",boxShadow:"0 24px 60px rgba(0,0,0,0.18)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:SF,fontSize:20,fontWeight:700,color:C.ink}}>🔑 Code d'essai</div>
              <button onClick={()=>setShowTrialCode(null)} style={{background:"none",border:"none",fontSize:18,color:C.stone,cursor:"pointer"}}>✕</button>

            <div style={{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:20,lineHeight:1.6}}>
              Entrez votre code d'essai pour tester <strong style={{color:C.ink}}>{software.find(s=>s.id===showTrialCode)?.name}</strong> gratuitement. Demandez un code à notre équipe commerciale.
            </div>
            <div style={{marginBottom:16}}>
              <input type="text" value={trialCodeInput} onChange={e=>setTrialCodeInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&submitTrialCode()} placeholder="ONIQ-XXXX-XXXX-XXXX" style={{width:"100%",padding:"14px 16px",border:`2px solid ${trialCodeErr?'#b52020':C.linen}`,borderRadius:8,fontFamily:"monospace",fontSize:16,fontWeight:700,letterSpacing:"0.08em",textAlign:"center",color:C.ink,background:C.dim,boxSizing:"border-box",outline:"none"}} autoFocus/>
            </div>
            {trialCodeErr&&<div style={{fontFamily:SS,fontSize:12,color:"#b52020",marginBottom:14,background:"#fde8e8",padding:"10px 14px",borderRadius:6}}>{trialCodeErr}</div>}
            <button disabled={trialCodeLoading} onClick={submitTrialCode} style={{width:"100%",background:C.gold,border:"none",borderRadius:6,padding:14,fontFamily:SS,fontSize:12,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:trialCodeLoading?0.7:1}}>{trialCodeLoading?"Vérification...":"Activer mon essai"}</button>
            <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:14,textAlign:"center",lineHeight:1.5}}>Pas de code ? <a href="mailto:contact@oniq.fr" style={{color:C.gold,fontWeight:600}}>Contactez-nous</a> pour en obtenir un.</div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Mon Espace ─────────────────────────────────────────────────────────────
const MonEspace=({user,setUser,software})=>{
  const myApps=software.filter(s=>user.subs.includes(s.id));
  const myTrials=software.filter(s=>!user.subs.includes(s.id)&&isTrialActive(user.trials?.[s.id]));
  const mrr=myApps.reduce((s,x)=>s+x.price,0);
  const [unsub,setUnsub]=useState(null);
  const [toast,setToast]=useState(null);
  const [accessMap,setAccessMap]=useState({});
  const [loadingAccess,setLoadingAccess]=useState(true);

  useEffect(()=>{
    let mounted=true;
    async function loadAccess(){
      if(!user?.id){
        if(mounted){setAccessMap({});setLoadingAccess(false);}
        return;
      }
      setLoadingAccess(true);
      const map=await getSoftwareAccessMap(user.id);
      if(mounted){
        setAccessMap(map||{});
        setLoadingAccess(false);
      }
    }
    loadAccess();
    return ()=>{mounted=false;};
  },[user?.id,myApps.length]);

  const doUnsub=()=>{
    const sw=software.find(s=>s.id===unsub);
    if(sw) removeUserSub(user.id,sw.slug);
    setUser(u=>({...u,subs:u.subs.filter(x=>x!==unsub)}));
    setAccessMap(prev=>{const next={...prev}; delete next[sw?.slug]; return next;});
    setUnsub(null);
    setToast("Désabonnement effectué.");
    setTimeout(()=>setToast(null),3000);
  };

  const appStatuses=myApps.map(sw=>({ sw, access:accessMap[sw.slug]||null, active:isAccessActiveRecord(accessMap[sw.slug]||null) }));
  const activeCount=appStatuses.filter(x=>x.active).length;
  const nextExpiry=appStatuses.filter(x=>x.access?.access_end).sort((a,b)=>new Date(a.access.access_end)-new Date(b.access.access_end))[0]?.access?.access_end||null;
  const statusLabel=loadingAccess?"Synchronisation...":activeCount>0?`${activeCount} accès actif${activeCount>1?'s':''}`:"Aucun accès actif";
  const invoices=[{id:"INV-2024-104",amount:mrr,date:"01 Déc 2024",status:"paid"},{id:"INV-2024-089",amount:Math.max(0,mrr-5),date:"01 Nov 2024",status:"paid"},{id:"INV-2024-074",amount:Math.max(0,mrr-5),date:"01 Oct 2024",status:"paid"}];

  return (
    <div style={{padding:isMob()?"16px 12px":"28px 36px"}}>
      <div style={{marginBottom:22}}>
        <div style={{fontFamily:SS,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.stone,marginBottom:4}}>Mon espace</div>
        <h1 style={{margin:0,fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink}}>Bonjour, {user.company} 👋</h1>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <KPI label="Abonnement mensuel" value={`${mrr} €`} sub={`${myApps.length} logiciel${myApps.length>1?"s":""} souscrit${myApps.length>1?"s":""}`} accent/>
        <KPI label="Accès actifs" value={loadingAccess?"...":activeCount} sub={statusLabel}/>
        <KPI label="Prochaine échéance" value={nextExpiry?formatAccessDate(nextExpiry):"—"} sub={nextExpiry?"Renouvellement à surveiller":"Aucune échéance"}/>
        <KPI label="Client depuis" value={user.since||"2024"} sub="Membre ONIQ"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"1fr 1fr",gap:window.innerWidth<=768?12:18}}>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>Mes logiciels</span>
            <span style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone}}>{statusLabel}</span>
          </div>
          {myApps.length===0&&<div style={{padding:"22px 18px",fontFamily:SS,fontSize:13,color:C.stone,textAlign:"center"}}>Aucun logiciel souscrit.</div>}
          {appStatuses.map(({sw,access,active},i)=>(
            <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px"}}>
              <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div>
                <div style={{fontFamily:SS,fontSize:10,color:active?C.green:C.red,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>● {active?"Actif":"Inactif"} · {sw.price}€/mois</div>
                <div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:3}}>Fin d'accès : {access?.access_end?formatAccessDate(access.access_end):"—"}{access?.source?` · Source : ${access.source}`:""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>openSoftwareProtected(sw.slug)} style={{background:C.ink,border:"none",borderRadius:4,padding:"6px 10px",fontFamily:SS,fontSize:9,fontWeight:700,color:C.ivory,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>Ouvrir</button>
                <button onClick={()=>setUnsub(sw.id)} style={{background:"none",border:`1px solid ${C.linen}`,borderRadius:4,padding:"5px 9px",fontFamily:SS,fontSize:10,color:C.stone,cursor:"pointer"}}>✕</button>
              </div>
            </div>{i<appStatuses.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
          ))}
          {myTrials.length>0&&(
            <>
              <div style={{padding:"9px 18px",background:C.goldDim,borderTop:`1px solid ${C.linen}`,fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.gold}}>Essais en cours</div>
              {myTrials.map((sw,i)=>(
                <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px"}}>
                  <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
                  <div style={{flex:1}}><div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div><div style={{fontFamily:SS,fontSize:10,color:C.gold,fontWeight:700,marginTop:2}}>{trialDaysLeft(user.trials[sw.id])} jours restants</div></div>
                  <button style={{background:C.ink,border:"none",borderRadius:4,padding:"5px 12px",fontFamily:SS,fontSize:10,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>S'abonner</button>
                </div>{i<myTrials.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
              ))}
            </>
          )}
          <div style={{padding:"11px 18px",borderTop:`1px solid ${C.linen}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total mensuel</span>
            <span style={{fontFamily:SF,fontWeight:700,fontSize:15,color:C.ink}}>{mrr} €</span>
          </div>
        </div>
        <div style={{display:"grid",gap:18}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`}}><span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>État de l'abonnement</span></div>
            <div style={{padding:"18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:6,padding:"12px 14px"}}><div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone,marginBottom:5}}>Statut</div><div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:activeCount>0?C.green:C.red}}>{loadingAccess?"Synchronisation":activeCount>0?"Actif":"Inactif"}</div></div>
                <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:6,padding:"12px 14px"}}><div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone,marginBottom:5}}>Prochaine fin d'accès</div><div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink}}>{nextExpiry?formatAccessDate(nextExpiry):"—"}</div></div>
              </div>
              <div style={{background:activeCount>0?C.greenDim:C.redDim,border:`1px solid ${activeCount>0?C.green+'33':C.red+'33'}`,borderRadius:6,padding:"12px 14px",fontFamily:SS,fontSize:12,color:activeCount>0?C.green:C.red,lineHeight:1.6}}>
                {loadingAccess?"Vérification des accès en cours…":activeCount>0?"Votre abonnement est bien synchronisé avec Stripe et vos accès logiciels sont ouverts.":"Aucun accès actif détecté. Vérifie ton paiement ou contacte le support."}
              </div>
            </div>
          </div>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`}}><span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>Mes factures</span></div>
            {invoices.map((inv,i)=>(
              <div key={inv.id}><div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 18px"}}>
                <div style={{flex:1}}><div style={{fontFamily:SS,fontSize:12,fontWeight:600,color:C.ink}}>{inv.id}</div><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2}}>{inv.date}</div></div>
                <span style={{fontFamily:SF,fontWeight:700,fontSize:13,color:C.ink,marginRight:10}}>{inv.amount} €</span>
                <Badge status={inv.status}/>
              </div>{i<invoices.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
            ))}
            <div style={{padding:"12px 18px",borderTop:`1px solid ${C.linen}`}}>
              <button style={{width:"100%",background:C.ink,border:"none",borderRadius:4,padding:11,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ivory,cursor:"pointer"}}>Payer maintenant · {mrr} €</button>
            </div>
          </div>
        </div>
      </div>
      {unsub&&(
        <div style={{position:"fixed",inset:0,background:"rgba(5,5,4,0.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:8,padding:36,width:320,textAlign:"center"}}>
            <div style={{fontFamily:SF,fontSize:17,fontWeight:700,color:C.ink,marginBottom:7}}>Se désabonner ?</div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:22}}>Vous perdrez l'accès à <strong>{software.find(s=>s.id===unsub)?.name}</strong> fin du mois.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setUnsub(null)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Annuler</button>
              <button onClick={doUnsub} style={{flex:1,background:C.redDim,border:`1px solid ${C.red}44`,borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.red,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Confirmer</button>
            </div>
          </div>
        </div>
      )}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
    </div>
  );
};

const SoftwareLaunchModal=({software,onClose})=>{
  if(!software)return null;
  const launcher=softwareLaunchers[software.slug];
  const iframeRef=React.useRef(null);
  
  useEffect(()=>{
    const CLOUD_TABLE='software_user_data';
    
    // Handler pour les messages de l'iframe BatiManager
    const handleBatiMessage=async(evt)=>{
      if(!evt.data||!evt.data.type)return;
      if(!supabaseClient)return;
      
      // BatiManager demande de sauvegarder
      if(evt.data.type==='bati-save'&&evt.data.data){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁️ Parent: no user for save');return}
          const {error}=await supabaseClient.from(CLOUD_TABLE).upsert({
            user_id:userId,
            software_slug:'batimanager',
            data_key:evt.data.key,
            data_value:evt.data.data,
            updated_at:new Date().toISOString()
          },{onConflict:'user_id,software_slug,data_key'});
          if(error){
            console.warn('☁️ Parent save failed:',error.message);
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-error',error:error.message},'*');
          } else {
            console.log('☁️ Parent save OK for BatiManager');
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-ok'},'*');
          }
        }catch(e){console.warn('☁️ Parent save error:',e)}
      }
      
      // BatiManager demande de charger les données
      if(evt.data.type==='bati-load'){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁️ Parent: no user for load');return}
          const {data:row,error}=await supabaseClient.from(CLOUD_TABLE)
            .select('data_value')
            .eq('user_id',userId)
            .eq('software_slug','batimanager')
            .eq('data_key',evt.data.key)
            .maybeSingle();
          if(error){console.warn('☁️ Parent load failed:',error.message);return}
          console.log('☁️ Parent load OK, has data:',!!row?.data_value);
          iframeRef.current?.contentWindow?.postMessage({type:'bati-cloud-data',data:row?.data_value||null},'*');
        }catch(e){console.warn('☁️ Parent load error:',e)}
      }

      // BatiManager demande un appel Mistral chat via proxy sécurisé
      if(evt.data.type==='bati-mistral-request'&&evt.data.reqId){
        try{
          const result=await callMistralProxy(evt.data.payload);
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-response',reqId:evt.data.reqId,result},'*');
        }catch(e){
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-response',reqId:evt.data.reqId,error:e.message},'*');
        }
      }

      // BatiManager demande un appel Mistral OCR via proxy sécurisé
      if(evt.data.type==='bati-mistral-ocr-request'&&evt.data.reqId){
        try{
          const {data:sess}=await supabaseClient.auth.getSession();
          const headers={'Content-Type':'application/json'};
          if(sess?.session?.access_token)headers['Authorization']=`Bearer ${sess.session.access_token}`;
          else headers['Authorization']=`Bearer ${supabaseKey}`;
          const resp=await fetch(`${SUPABASE_FUNCTIONS_BASE}/mistral-ocr`,{method:'POST',headers,body:JSON.stringify(evt.data.payload)});
          const result=await resp.json().catch(()=>({}));
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-ocr-response',reqId:evt.data.reqId,result},'*');
        }catch(e){
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-ocr-response',reqId:evt.data.reqId,error:e.message},'*');
        }
      }
    };
    
    window.addEventListener('message',handleBatiMessage);

    // Envoyer le token Supabase à l'iframe après chargement
    const sendAuth=async()=>{
      if(!supabaseClient||!iframeRef.current)return;
      try{
        const {data}=await supabaseClient.auth.getSession();
        if(data?.session){
          const msg={type:'oniq-auth-token',access_token:data.session.access_token,refresh_token:data.session.refresh_token};
          const trySend=()=>{
            try{iframeRef.current?.contentWindow?.postMessage(msg,'*');}catch(e){}
          };
          setTimeout(trySend,500);
          setTimeout(trySend,1500);
          setTimeout(trySend,3000);
          setTimeout(trySend,5000);
        }
      }catch(e){console.warn('Auth token send failed:',e)}
    };
    sendAuth();
    
    return ()=>window.removeEventListener('message',handleBatiMessage);
  },[]);
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#fff'}}>
      <button onClick={onClose} style={{position:'fixed',bottom:18,right:18,zIndex:1001,background:'rgba(26,20,16,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:999,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#fff',cursor:'pointer',boxShadow:'0 8px 24px rgba(0,0,0,0.18)'}}>Fermer ✕</button>
      <iframe ref={iframeRef} title={software.name} src={launcher?.src} style={{position:'absolute',inset:0,width:'100%',height:'100%',border:'none',background:'#fff'}} sandbox="allow-scripts allow-same-origin allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"/>
    </div>
  );
};

        {!loading&&members.length===0&&<div style={{padding:'24px 20px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun membre enregistré pour le moment.</div>}
        {!loading&&members.map((member,idx)=>(

                <div style={{marginTop:8}}><Badge status={member.status==='disabled'?'overdue':'active'}/></div>
              </div>
              <div>
                <div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Logiciels attribués</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {software.filter(sw=>owner.subs.includes(sw.id)).map(sw=>{
                    const checked=getMemberSoftwareIds(member).includes(sw.id);
                    return <label key={sw.id} style={{display:'inline-flex',alignItems:'center',gap:6,background:checked?C.goldDim:C.ivory,border:`1px solid ${checked?C.gold+'55':C.linen}`,borderRadius:30,padding:'7px 10px',fontFamily:SS,fontSize:11,color:checked?C.ink:C.stone,cursor:'pointer'}}><input type='checkbox' checked={checked} onChange={()=>toggleSoftware(member.id,sw.id)}/>{sw.name}</label>;
                  })}
                </div>
              </div>
              <button onClick={()=>toggleStatus(member.id)} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>{member.status==='disabled'?'Réactiver':'Suspendre'}</button>
            </div>
            {idx<members.length-1&&<HR s={{margin:'0 20px'}}/>}
          </div>
        ))}
      </div>
    </div>
  );
};


const TeamAccessPage=({token,owner,software})=>{
  const [member,setMember]=useState(null);
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',companyCode:''});
  const [resolvedOwner,setResolvedOwner]=useState(owner||null);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(true);
  const [submitting,setSubmitting]=useState(false);
  const [launchedSoftware,setLaunchedSoftware]=useState(null);

  useEffect(()=>{
    const handler=e=>setLaunchedSoftware(e.detail||null);
    window.addEventListener('oniq-open-software',handler);
    return ()=>window.removeEventListener('oniq-open-software',handler);
  },[]);

  useEffect(()=>{
    if(owner?.id){
      setResolvedOwner(prev=>({...(prev||{}), ...owner}));
    }
  },[owner?.id, owner?.company, owner?.companyLogo]);

  useEffect(()=>{
    let alive=true;
    async function bootstrap(){
      setLoading(true);
      setErr('');

      if(!resolvedOwner?.id){
        if(alive) setLoading(false);
        return;
      }

      try{
        if(supabaseClient){
          const { data } = await supabaseClient.auth.getUser();
          const authUser = data?.user;

          if(authUser){
            let found = await getTeamMemberByAuth(resolvedOwner.id, authUser.id);

            if(!found && authUser.email){
              found = await getTeamMemberByEmail(resolvedOwner.id, authUser.email);
            }

            if(!found && authUser.email){
              found = await createOrUpdateTeamMember({
                ownerId: resolvedOwner.id,
                userId: authUser.id,
                email: authUser.email,
                name: authUser.user_metadata?.name || authUser.email.split('@')[0] || 'Membre'
              });
            }

            if(found && found.status !== 'disabled'){
              await saveSession(found.id);
              if(alive) {
                setMember(found);
                setMode('login');
              }
            }
          }
        }
      }catch(e){
        console.error('Bootstrap équipe error:', e);
      }finally{
        if(alive) setLoading(false);
      }
    }

    bootstrap();
    return ()=>{ alive=false; };
  },[token, resolvedOwner?.id]);

  const saveSession=async(memberId)=>{ await createTeamSession(token, memberId); };

  const doRegister=async()=>{
    if(!form.name||!form.email||!form.password){setErr('Remplissez tous les champs.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      if(!resolvedOwner?.id){setErr('Entrez votre code entreprise.');return;}
      const existing=await getTeamMemberByEmail(resolvedOwner.id, form.email);
      if(existing && existing.userId){setErr("Cet email existe déjà dans l'équipe. Connectez-vous."); setMode('login'); return;}
      const { data, error } = await supabaseClient.auth.signUp({
        email: form.email.trim().toLowerCase(),
        password: form.password,
        options: { data: { name: form.name, company: resolvedOwner?.company||'' } }
      });
      if(error) throw error;

      // Cas 1 : session retournée = email auto-confirmé, on connecte directement
      if(data?.session){
        const authUser=data.session.user;
        const next=await createOrUpdateTeamMember({ownerId:resolvedOwner.id,userId:authUser.id,email:form.email,name:form.name});
        await saveSession(next.id);
        setMember(next);
        return;
      }

      // Cas 2 : user retourné mais PAS de session = confirmation email requise
      if(data?.user && !data?.session){
        // Tenter un login immédiat au cas où la confirmation n'est pas requise
        try{
          const loginResult = await supabaseClient.auth.signInWithPassword({
            email: form.email.trim().toLowerCase(),
            password: form.password
          });
          if(!loginResult.error && loginResult.data?.user){
            const authUser=loginResult.data.user;
            const next=await createOrUpdateTeamMember({ownerId:resolvedOwner.id,userId:authUser.id,email:form.email,name:form.name});
            await saveSession(next.id);
            setMember(next);
            return;
          }
        }catch(loginErr){
          // Le login a échoué = confirmation requise, on continue vers le message
        }
        setErr('✅ Compte créé ! Un email de confirmation vous a été envoyé. Cliquez sur le lien dans cet email, puis revenez vous connecter.');
        setMode('login');
        return;
      }

      // Cas 3 : aucun user retourné
      setErr('✅ Compte créé ! Vérifiez votre boîte mail pour confirmer votre inscription, puis connectez-vous.');
      setMode('login');
    }catch(e){
      console.error('Erreur inscription équipe:',e);
      const msg=e?.message||'';
      if(msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists')){
        setErr("Un compte existe déjà avec cet email. Connectez-vous plutôt.");
        setMode('login');
      } else {
        setErr(msg||"Impossible de créer l'accès équipe.");
      }
    }finally{
      setSubmitting(false);
    }
  };

  const doLogin=async()=>{
    if(!form.email||!form.password){setErr('Renseignez votre email et mot de passe.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      let activeOwner=resolvedOwner;
      const enteredCode=sanitizeCompanyCode(form.companyCode);
      if(!activeOwner?.id){
        if(!enteredCode){
          setErr('Entrez votre code entreprise pour accéder au hub.');
          return;
        }
        const companyRow=await getCompanyDirectoryByCode(enteredCode);
        if(!companyRow?.owner_id) throw new Error('Code entreprise introuvable.');
        activeOwner={
          id:companyRow.owner_id,
          email:companyRow.owner_email||'',
          company:companyRow.owner_company||'Entreprise',
          companyLogo:companyRow.owner_logo_url||'',
          subs:[]
        };
        const ownerSubs=await loadUserSubs(activeOwner.id, SW_DB);
        activeOwner={...activeOwner, subs:ownerSubs};
        setResolvedOwner(activeOwner);
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: form.email.trim().toLowerCase(),
        password: form.password
      });
      if(error) throw error;
      const { data } = await supabaseClient.auth.getUser();
      const authUser=data?.user;
      if(!authUser) throw new Error('Connexion impossible.');
      let found=await getTeamMemberByAuth(activeOwner.id, authUser.id);
      if(!found && authUser.email){
        found = await getTeamMemberByEmail(activeOwner.id, authUser.email);
      }
      if(found && String(found.userId || '') !== String(authUser.id)){
        found = await createOrUpdateTeamMember({
          ownerId: activeOwner.id,
          userId: authUser.id,
          email: authUser.email,
          name: found.name || authUser.user_metadata?.name || authUser.email?.split('@')[0] || 'Membre'
        });
      }
      if(!found){
        found = await createOrUpdateTeamMember({
          ownerId: activeOwner.id,
          userId: authUser.id,
          email: authUser.email,
          name: authUser.user_metadata?.name || authUser.email?.split('@')[0] || 'Membre'
        });
      }
      if(found.status==='disabled'){setErr('Accès équipe suspendu.'); return;}
      await saveSession(found.id);
      setMember(found);
    }catch(e){
      console.error('Erreur connexion équipe:',e);
      const msg=e?.message||'';
      if(msg.toLowerCase().includes('email not confirmed')){
        setErr("⚠️ Votre email n'est pas encore confirmé. Vérifiez votre boîte mail puis utilisez « Mot de passe oublié » si besoin.");
      } else if(msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials')){
        setErr("⚠️ Email ou mot de passe incorrect. Si vous venez de créer votre compte, vérifiez d'abord votre email de confirmation. Sinon utilisez « Mot de passe oublié ».");
      } else {
        setErr(msg||'Accès équipe introuvable ou suspendu.');
      }
    }finally{
      setSubmitting(false);
    }
  };

  const doForgotPassword=async()=>{
    if(!form.email){setErr('Entrez votre email pour recevoir le lien.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      const { error } = await supabaseClient.auth.resetPasswordForEmail(form.email.trim().toLowerCase(), {
        redirectTo: window.location.origin + window.location.pathname
      });
      if(error) throw error;
      setErr('✅ Email de réinitialisation envoyé. Vérifiez votre boîte mail.');
    }catch(e){
      setErr(e?.message||"Impossible d'envoyer l'email de réinitialisation.");
    }finally{
      setSubmitting(false);
    }
  };

  if(loading){
    return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}><div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',textAlign:'center',maxWidth:460,fontFamily:SS,color:C.stone}}>Chargement de l'accès équipe...</div></div>;
  }

  if(member){
    const apps=software.filter(sw=>getMemberSoftwareIds(member).includes(sw.id));
    return <>
      <div style={{minHeight:'100vh',background:C.dim,padding:'42px 24px'}}>
        <div style={{maxWidth:1180,margin:'0 auto'}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'26px 28px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',gap:18,flexWrap:'wrap',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              {resolvedOwner?.companyLogo?(<img src={resolvedOwner.companyLogo} alt='Logo entreprise' style={{width:62,height:62,objectFit:'contain',borderRadius:10,background:C.ivory,border:`1px solid ${C.linen}`,padding:8}}/>):(<div style={{width:62,height:62,borderRadius:10,background:C.ink,border:`1px solid ${C.gold}55`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:22,fontWeight:700,color:C.gold}}>{((resolvedOwner?.company)||'ON').slice(0,2).toUpperCase()}</div>)}
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Accès équipe</div>
                <div style={{fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink,marginBottom:4}}>Nos logiciels</div>
                <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6}}>Connecté en tant que <strong>{member.name}</strong> · accès limité au hub de {resolvedOwner?.company||'votre entreprise'}.</div>
              </div>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,marginBottom:3}}>Logiciels autorisés</div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ink}}>{apps.length}</div>
              </div>
              <button onClick={async()=>{try{await supabaseClient?.auth.signOut();}catch(e){} setMember(null);}} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>Déconnexion</button>
              <InstallPWAButton style={{borderRadius:6,padding:'9px 12px',fontSize:10}}/>
            </div>
          </div>
          <TeamInstallCard owner={resolvedOwner||owner||{}}/>
          <SoftwareGrid apps={apps} showCommercialInfos={false}/>
          {apps.length===0&&<div style={{marginTop:18,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun logiciel ne vous a encore été attribué. Demandez au patron de vous donner accès depuis l'onglet <strong>Gérer mon équipe</strong>.</div>}
        </div>
      </div>
      {launchedSoftware&&<SoftwareLaunchModal software={launchedSoftware} onClose={()=>setLaunchedSoftware(null)}/>}    
    </>;
  }

  return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{width:460,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
      <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Invitation équipe</div>
      <div style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,marginBottom:6}}>{resolvedOwner?.company?`Rejoindre ${resolvedOwner.company}`:'Accéder au hub salarié'}</div>
      <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6,marginBottom:18}}>Connectez-vous au hub salarié. Si votre compte n'est pas encore relié à une entreprise, entrez le code entreprise transmis par le patron.</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setMode('register')} style={{flex:1,background:mode==='register'?C.ink:'transparent',border:`1px solid ${mode==='register'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='register'?C.ivory:C.stone,cursor:'pointer'}}>Créer mon accès</button>
        <button onClick={()=>setMode('login')} style={{flex:1,background:mode==='login'?C.ink:'transparent',border:`1px solid ${mode==='login'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='login'?C.ivory:C.stone,cursor:'pointer'}}>Connexion</button>
      </div>
      {mode==='register'&&<div style={{marginBottom:12}}><TI label='Nom complet' value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>}
      <TI label='Email' value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type='email'/>
      <TI label='Mot de passe' value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} type='password' mb={10}/>
      <TI label='Code entreprise' value={form.companyCode} onChange={e=>setForm(p=>({...p,companyCode:e.target.value.toUpperCase()}))} placeholder='Ex : RUU-4821' mb={10}/>
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:12,color:C.red,marginBottom:12}}>{err}</div>}
      <button disabled={submitting} onClick={mode==='register'?doRegister:doLogin} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'11px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer',opacity:submitting?0.7:1}}>{submitting?'Chargement...':(mode==='register'?'Créer et accéder au hub':'Se connecter au hub')}</button>
      {mode==='login'&&<button disabled={submitting} onClick={doForgotPassword} style={{width:'100%',marginTop:8,background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 14px',fontFamily:SS,fontSize:10,fontWeight:600,letterSpacing:'0.06em',color:C.stone,cursor:'pointer'}}>Mot de passe oublié</button>}
      <div style={{marginTop:14,padding:'12px 14px',background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:8}}>
        <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Télécharger le hub</div>
        <div style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.6,marginBottom:10}}>Téléchargez directement l’application <strong>Oniq Hub</strong> pour accéder au hub depuis votre ordinateur.</div>
        <a href={ONIQ_HUB_DOWNLOAD_URL} target="_blank" rel="noopener noreferrer" style={{display:'block',width:'100%',background:C.ink,border:`1px solid ${C.ink}`,borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.ivory,cursor:'pointer',textDecoration:'none',textAlign:'center'}}>Télécharger l'application sur votre PC</a>
      </div>
    </div>
  </div>;
};
