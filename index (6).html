// ── Admin Validations — leads en attente de confirmation paiement ───────────
const AdminValidations=({software,users})=>{
  const [crm,setCrm]=useState(()=>getCRM());
  const [confirmedComms,setConfirmedComms]=useState([]);
  useEffect(()=>{
    if(!supabaseClient)return;
    supabaseClient.from('commissions').select('*').order('paid_at',{ascending:false}).then(({data})=>{if(data)setConfirmedComms(data);});
  },[]);
  const save=(d)=>{saveCRM(d);setCrm({...d});if(supabaseClient){supabaseClient.auth.getSession().then(({data})=>{const uid=data?.session?.user?.id;if(uid)saveCRMToCloud(uid,d);});}};

  const pendingLeads=crm.leads.filter(l=>l.pendingConfirmation&&l.stage==='rdv_fait');
  const concludedLeads=crm.leads.filter(l=>l.stage==='conclu');

  const confirmPayment=async(lead)=>{
    const sw=software.find(s=>s.slug===lead.logiciel);
    const monthlyHT=sw?.price||lead.valeur||0;
    const commAmount=calcCommissionAmount(monthlyHT);
    const co=crm.commerciaux.find(c=>c.id===lead.commercial);
    // Insérer dans la table commissions Supabase
    if(supabaseClient){
      await supabaseClient.from('commissions').insert({
        commercial_id:lead.commercial,
        commercial_name:co?.nom||'',
        lead_id:lead.id,
        client_email:lead.email||lead.entreprise,
        software_slug:lead.logiciel,
        amount_ht:monthlyHT,
        commission_amount:commAmount,
        stripe_invoice_id:'manual-'+lead.id,
        paid_at:new Date().toISOString(),
        status:'confirmed'
      });
    }
    // Passer le lead en conclu
    const d={...crm};
    const l=d.leads.find(x=>x.id===lead.id);
    if(l){l.stage='conclu';l.pendingConfirmation=false;l.signedAt=crmNow();l.history.push({stage:'conclu',date:crmNow(),note:'Paiement confirmé par admin'});}
    save(d);
    setConfirmedComms(prev=>[...prev,{commercial_id:lead.commercial,lead_id:lead.id,commission_amount:commAmount,amount_ht:monthlyHT,paid_at:new Date().toISOString()}]);
  };

  const rejectRequest=(lead)=>{
    const d={...crm};
    const l=d.leads.find(x=>x.id===lead.id);
    if(l){l.pendingConfirmation=false;l.history.push({stage:'rdv_fait',date:crmNow(),note:'Demande refusée par admin'});}
    save(d);
  };

  const co=(id)=>crm.commerciaux.find(c=>c.id===id);
  const sw=(slug)=>software.find(s=>s.slug===slug);

  return React.createElement('div',{style:{padding:isMob()?'16px 14px':'28px 36px'}},
    React.createElement('div',{style:{fontFamily:SS,fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:4}},'Admin'),
    React.createElement('h1',{style:{margin:0,fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink,marginBottom:6}},'Validations & Commissions'),
    React.createElement('p',{style:{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:28,lineHeight:1.6}},'Les commissions sont automatiquement créditées via le webhook Stripe. En cas de besoin, vous pouvez valider manuellement ci-dessous.'),

    // Section en attente
    React.createElement('div',{style:{marginBottom:32}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16}},
        React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink}},'⏳ En attente de validation'),
        pendingLeads.length>0&&React.createElement('div',{style:{background:'#fdf4e0',color:'#9a6800',border:'1px solid #f0d080',borderRadius:20,padding:'2px 10px',fontFamily:SS,fontSize:11,fontWeight:700}},pendingLeads.length)
      ),
      pendingLeads.length===0
        ?React.createElement('div',{style:{fontFamily:SS,fontSize:12,color:C.stone,padding:'24px',textAlign:'center',background:C.dim,borderRadius:8}},'✅ Aucune demande en attente')
        :React.createElement('div',{style:{display:'grid',gap:12}},
          pendingLeads.map(l=>React.createElement('div',{key:l.id,style:{background:C.paper,border:'1px solid #f0d080',borderRadius:10,padding:'18px 20px',borderLeft:'4px solid #9a6800'}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
              React.createElement('div',null,
                React.createElement('div',{style:{fontFamily:SF,fontSize:15,fontWeight:700,color:C.ink,marginBottom:3}},l.entreprise),
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone}},l.contact+(l.email?' · '+l.email:'')+(l.tel?' · '+l.tel:'')),
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone,marginTop:4}},
                  'Logiciel : '+(sw(l.logiciel)?.name||l.logiciel)+' · '+(sw(l.logiciel)?.price||l.valeur||0)+'€/mois'
                ),
                co(l.commercial)&&React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:'#9a6800',fontWeight:600,marginTop:4}},'Commercial : '+co(l.commercial).nom),
                React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:'#1e6641',marginTop:8}},'Commission à verser : '+calcCommissionAmount(sw(l.logiciel)?.price||l.valeur||0).toLocaleString('fr-FR')+'€')
              ),
              React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
                React.createElement('button',{onClick:()=>confirmPayment(l),style:{padding:'10px 20px',background:'#1e6641',border:'none',borderRadius:7,fontFamily:SS,fontSize:11,fontWeight:700,color:'#fff',cursor:'pointer',letterSpacing:'0.04em'}},'✅ Confirmer le paiement'),
                React.createElement('button',{onClick:()=>rejectRequest(l),style:{padding:'10px 20px',background:'#fde8e8',border:'1px solid #f5b8b8',borderRadius:7,fontFamily:SS,fontSize:11,fontWeight:700,color:'#b52020',cursor:'pointer'}},'❌ Refuser la demande')
              )
            )
          ))
        )
    ),

    // Historique commissions confirmées
    React.createElement('div',null,
      React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink,marginBottom:16}},'✅ Commissions confirmées ('+confirmedComms.length+')'),
      confirmedComms.length===0
        ?React.createElement('div',{style:{fontFamily:SS,fontSize:12,color:C.stone,padding:'24px',textAlign:'center',background:C.dim,borderRadius:8}},'Aucune commission confirmée pour l'instant')
        :React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,overflow:'hidden'}},
          React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:SS,fontSize:12}},
            React.createElement('thead',null,
              React.createElement('tr',{style:{background:C.dim,borderBottom:`1px solid ${C.linen}`}},
                ['Date','Client','Logiciel','Commercial','MRR HT','Commission','Source'].map((h,i)=>
                  React.createElement('th',{key:i,style:{padding:'10px 14px',textAlign:i>3?'right':'left',fontWeight:700,fontSize:9,textTransform:'uppercase',letterSpacing:'0.1em',color:C.stone}},h)
                )
              )
            ),
            React.createElement('tbody',null,
              confirmedComms.map((c,i)=>React.createElement('tr',{key:i,style:{borderBottom:`1px solid ${C.linen}`,background:i%2?C.dim:'transparent'}},
                React.createElement('td',{style:{padding:'10px 14px',color:C.stone,fontSize:10}},new Date(c.paid_at).toLocaleDateString('fr-FR')),
                React.createElement('td',{style:{padding:'10px 14px',fontWeight:600,color:C.ink}},c.client_email||'—'),
                React.createElement('td',{style:{padding:'10px 14px',color:C.stone}},sw(c.software_slug)?.name||c.software_slug||'—'),
                React.createElement('td',{style:{padding:'10px 14px',color:'#9a6800',fontWeight:600}},c.commercial_name||co(c.commercial_id)?.nom||'—'),
                React.createElement('td',{style:{padding:'10px 14px',textAlign:'right',fontWeight:700,color:C.ink}},(c.amount_ht||0).toLocaleString('fr-FR')+'€'),
                React.createElement('td',{style:{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'#1e6641'}},(c.commission_amount||0).toLocaleString('fr-FR')+'€'),
                React.createElement('td',{style:{padding:'10px 14px',textAlign:'right',fontSize:9,color:C.stone}},c.stripe_invoice_id?.startsWith('manual')?'Manuel':'Stripe auto')
              ))
            )
          )
        )
    )
  );
};

const TRIAL_CODES_KEY='oniq_trial_codes';
function getTrialCodes(){try{return JSON.parse(localStorage.getItem(TRIAL_CODES_KEY)||'[]')}catch(e){return[]}}
function saveTrialCodes(codes){try{localStorage.setItem(TRIAL_CODES_KEY,JSON.stringify(codes))}catch(e){}}

function generateTrialCode(softwareSlug, durationDays=7, note=''){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='ONIQ-';
  for(let i=0;i<3;i++){for(let j=0;j<4;j++)code+=chars[Math.floor(Math.random()*chars.length)];if(i<2)code+='-';}
  const entry={code,softwareSlug,durationDays,note,createdAt:new Date().toISOString(),usedBy:null,usedAt:null};
  const codes=getTrialCodes();
  codes.push(entry);
  saveTrialCodes(codes);
  // Aussi sauvegarder dans Supabase si disponible
  if(supabaseClient){
    supabaseClient.from('promo_codes').insert({code,software_slug:softwareSlug,duration_days:durationDays,note,created_at:entry.createdAt,used_by:null,used_at:null}).then(({error})=>{
      if(error)console.warn('Save trial code to Supabase failed:',error.message);
    });
  }
  return entry;
}

async function redeemTrialCode(codeStr, userId, userEmail){
  const codeUp=codeStr.trim().toUpperCase();
  // Chercher dans localStorage
  let codes=getTrialCodes();
  let found=codes.find(c=>c.code===codeUp);
  // Si pas trouvé localement, chercher dans Supabase
  if(!found&&supabaseClient){
    try{
      const {data}=await supabaseClient.from('promo_codes').select('*').eq('code',codeUp).maybeSingle();
      if(data) found={code:data.code,softwareSlug:data.software_slug,durationDays:data.duration_days||7,usedBy:data.used_by,usedAt:data.used_at};
    }catch(e){}
  }
  if(!found) return {ok:false,msg:"Code invalide. Vérifiez votre saisie."};
  if(found.usedBy) return {ok:false,msg:"Ce code a déjà été utilisé."};
  // Activer l'essai
  found.usedBy=userEmail||userId;
  found.usedAt=new Date().toISOString();
  // Mettre à jour localStorage
  codes=getTrialCodes();
  const idx=codes.findIndex(c=>c.code===codeUp);
  if(idx>=0){codes[idx]=found;saveTrialCodes(codes);}
  // Mettre à jour Supabase
  if(supabaseClient){
    supabaseClient.from('promo_codes').update({used_by:found.usedBy,used_at:found.usedAt}).eq('code',codeUp).then(()=>{});
    // Ajouter l'accès software_access
    const accessEnd=new Date();
    accessEnd.setDate(accessEnd.getDate()+(found.durationDays||7));
    supabaseClient.from('software_access').upsert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()},{onConflict:'user_id,software_slug'}).then(({error})=>{
      if(error) supabaseClient.from('software_access').insert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()}).then(()=>{});
    });
  }
  return {ok:true,slug:found.softwareSlug,days:found.durationDays||7,msg:`Essai de ${found.durationDays||7} jours activé !`};
}

const CRM_KEY='oniq_crm_v2';
const CRM_STAGES=['contacte','sans_reponse','rdv_pris','rdv_fait','conclu'];
const CRM_STAGE_LABELS={contacte:'📞 Contacté',sans_reponse:'🔕 Sans réponse',rdv_pris:'📅 RDV Pris',rdv_fait:'✅ RDV Fait',conclu:'🏆 Conclu'};
const CRM_STAGE_COLORS={contacte:'#1a3f7a',sans_reponse:'#b52020',rdv_pris:'#5b3d9e',rdv_fait:'#9a6800',conclu:'#1e6641'};
const MOIS_NOMS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
// Commission fixe : 50% du 1er mois HT, 0% ensuite
// La commission n'est créditée que sur confirmation de paiement Stripe (via webhook)
const COMMISSION_RATE = 0.50;
const calcCommissionAmount = (monthlyPriceHT) => Math.round(monthlyPriceHT * COMMISSION_RATE * 100) / 100;
const INTERACTION_TYPES=['📞 Appel','📧 Email','📅 RDV','💬 Message','📋 Démo','📄 Devis envoyé','✅ Contrat signé','❌ Refus','⏸️ Pas de réponse'];

function getCRM(){try{return JSON.parse(localStorage.getItem(CRM_KEY)||'{"commerciaux":[],"leads":[],"objectifs":[]}')}catch(e){return{commerciaux:[],leads:[],objectifs:[]}}}
function saveCRM(d){try{localStorage.setItem(CRM_KEY,JSON.stringify(d))}catch(e){}}
const CRM_CLOUD_SLUG='crm';
const CRM_CLOUD_KEY='crm_main';
async function loadCRMFromCloud(userId){
  if(!supabaseClient||!userId)return null;
  try{
    const {data,error}=await supabaseClient.from('software_user_data').select('data_value').eq('user_id',userId).eq('software_slug',CRM_CLOUD_SLUG).eq('data_key',CRM_CLOUD_KEY).maybeSingle();
    if(error||!data?.data_value)return null;
    return JSON.parse(data.data_value);
  }catch(e){console.warn('loadCRMFromCloud error:',e);return null;}
}
async function saveCRMToCloud(userId,crmData){
  if(!supabaseClient||!userId)return;
  try{
    await supabaseClient.from('software_user_data').upsert({user_id:userId,software_slug:CRM_CLOUD_SLUG,data_key:CRM_CLOUD_KEY,data_value:JSON.stringify(crmData),updated_at:new Date().toISOString()},{onConflict:'user_id,software_slug,data_key'});
  }catch(e){console.warn('saveCRMToCloud error:',e);}
}
const crmUid=()=>Math.random().toString(36).substr(2,8);
const crmNow=()=>new Date().toISOString();
const crmMonth=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const normName=(n)=>(n||'').trim().toLowerCase().replace(/[^a-z0-9àâäéèêëïîôùûüç]/g,'');
const COOLDOWN_MONTHS=6;

const AdminCommercial=({software,currentUserId,currentUserRole})=>{
  const [crm,setCrm]=useState(()=>getCRM());
  useEffect(()=>{
    if(!supabaseClient)return;
    supabaseClient.auth.getSession().then(async({data})=>{
      const uid=data?.session?.user?.id;
      if(!uid)return;
      const cloudCrm=await loadCRMFromCloud(uid);
      if(cloudCrm&&(cloudCrm.leads?.length>0||cloudCrm.commerciaux?.length>0)){
        saveCRM(cloudCrm);setCrm({...cloudCrm});
      }
    });
  },[]);
  const [tab,setTab]=useState('dashboard');
  const [showAddCo,setShowAddCo]=useState(false);
  const [showAddLead,setShowAddLead]=useState(false);
  const [showAiProspect,setShowAiProspect]=useState(false);
  const [showObjModal,setShowObjModal]=useState(false);
  const [showInteraction,setShowInteraction]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResults,setAiResults]=useState(null);
  const [aiSector,setAiSector]=useState('Bâtiment');
  const [aiRegion,setAiRegion]=useState('France');
  // Si l'utilisateur est commercial, on l'isole automatiquement sur ses leads
  const myCoId=React.useMemo(()=>{
    if(currentUserRole!=='commercial')return null;
    // Trouver le commercial dans le CRM qui correspond à cet utilisateur
    const crm0=getCRM();
    return crm0.commerciaux.find(c=>c.userId===currentUserId)?.id||null;
  },[currentUserId,currentUserRole]);
  const isRestrictedCommercial=currentUserRole==='commercial';
  const [selCo,setSelCo]=useState('all');
  const [selPeriod,setSelPeriod]=useState(crmMonth());
  const [editLead,setEditLead]=useState(null);
  const [newCo,setNewCo]=useState({nom:'',email:'',tel:'',zone:''});
  const [newLead,setNewLead]=useState({entreprise:'',contact:'',email:'',tel:'',secteur:'Bâtiment',region:'',logiciel:software[0]?.slug||'',source:'Manuel',commercial:'',notes:'',valeur:0});
  const [newInteraction,setNewInteraction]=useState({type:'📞 Appel',note:'',date:new Date().toISOString().slice(0,16)});
  const [objForm,setObjForm]=useState({coId:'',month:crmMonth(),target_leads:20,target_demos:8,target_signed:3,target_ca:0});
  const [aiRelances,setAiRelances]=useState(null);
  const [aiRelLoading,setAiRelLoading]=useState(false);

  const save=(d)=>{saveCRM(d);setCrm({...d});if(supabaseClient){supabaseClient.auth.getSession().then(({data})=>{const uid=data?.session?.user?.id;if(uid)saveCRMToCloud(uid,d);});}};
  const mob=isMob();
  const ls={fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,display:'block',marginBottom:6};
  const is={width:'100%',padding:'10px 12px',border:`1px solid ${C.linen}`,borderRadius:6,fontFamily:SS,fontSize:12,background:C.dim,boxSizing:'border-box'};

  // ══ DATA HELPERS ══
  const findDuplicate=(entreprise)=>{const n=normName(entreprise);return n?crm.leads.find(l=>normName(l.entreprise)===n):null};
  const isInCooldown=(lead)=>{if(!lead||lead.stage!=='perdu')return false;const lc=lead.history?.filter(h=>h.stage==='perdu').pop();if(!lc)return false;const e=new Date(lc.date);e.setMonth(e.getMonth()+COOLDOWN_MONTHS);return new Date()<e};
  const getCooldownEnd=(lead)=>{const lc=lead.history?.filter(h=>h.stage==='perdu').pop();if(!lc)return null;const d=new Date(lc.date);d.setMonth(d.getMonth()+COOLDOWN_MONTHS);return d};

  // ══ CRUD ══
  const addCommercial=()=>{if(!newCo.nom)return;const d={...crm};d.commerciaux.push({id:crmUid(),nom:newCo.nom,email:newCo.email,tel:newCo.tel,zone:newCo.zone,actif:true,createdAt:crmNow()});save(d);setNewCo({nom:'',email:'',tel:'',zone:''});setShowAddCo(false)};

  const addLead=(lead)=>{
    const ex=findDuplicate(lead.entreprise);
    if(ex){
      if(isInCooldown(ex)){alert(`⛔ "${ex.entreprise}" en cooldown ${COOLDOWN_MONTHS} mois.\nRecontact: ${getCooldownEnd(ex)?.toLocaleDateString('fr-FR')}`);return false}
      if(ex.stage==='conclu'){alert(`✅ "${ex.entreprise}" est déjà client.`);return false}
      // Anti-doublon inter-commerciaux : bloquer si suivi par un autre co
      if(ex.commercial&&lead.commercial&&ex.commercial!==lead.commercial){
        alert(`⛔ "${ex.entreprise}" est déjà suivi par un autre commercial.`);return false;
      }
      if(!confirm(`⚠️ "${ex.entreprise}" existe déjà (${CRM_STAGE_LABELS[ex.stage]}).\nCréer quand même ?`))return false;
    }
    const d={...crm};
    const sw=software.find(s=>s.slug===lead.logiciel);
    d.leads.push({id:crmUid(),...lead,stage:'contacte',valeur:lead.valeur||(sw?.price||0),commission_type:lead.commission_type||'prospect_close',createdAt:crmNow(),interactions:[],history:[{stage:'contacte',date:crmNow(),note:'Lead créé'}]});
    save(d);return true;
  };

  const moveStage=(leadId,newStage,note)=>{
    const d={...crm};const l=d.leads.find(x=>x.id===leadId);
    if(l){l.stage=newStage;l.history.push({stage:newStage,date:crmNow(),note:note||''});if(newStage==='conclu'){l.signedAt=crmNow()}}
    save(d);setEditLead(null);
  };

  const addInteractionToLead=(leadId)=>{
    const d={...crm};const l=d.leads.find(x=>x.id===leadId);
    if(l){l.interactions.push({id:crmUid(),...newInteraction,date:newInteraction.date||crmNow()});l.lastContact=crmNow()}
    save(d);setNewInteraction({type:'📞 Appel',note:'',date:new Date().toISOString().slice(0,16)});setShowInteraction(null);
  };

  const saveObjectif=()=>{
    if(!objForm.coId)return;
    const d={...crm};const key=`${objForm.coId}-${objForm.month}`;
    d.objectifs=d.objectifs||[];
    const existing=d.objectifs.findIndex(o=>o.key===key);
    const obj={key,coId:objForm.coId,month:objForm.month,...objForm};
    if(existing>=0)d.objectifs[existing]=obj;else d.objectifs.push(obj);
    save(d);setShowObjModal(false);
  };

  // ══ COMMISSION CALC ══
  // Commission affichée uniquement si paiement confirmé (table Supabase 'commissions')
  const [confirmedCommissions, setConfirmedCommissions] = useState([]);
  useEffect(()=>{
    if(!supabaseClient) return;
    supabaseClient.auth.getSession().then(async({data})=>{
      const uid=data?.session?.user?.id; if(!uid) return;
      const {data:rows}=await supabaseClient.from('commissions').select('*').order('paid_at',{ascending:false});
      if(rows) setConfirmedCommissions(rows);
    });
  },[]);
  const getLeadCommission=(lead)=>{
    // Chercher une commission confirmée liée à ce lead
    return confirmedCommissions.find(c=>c.lead_id===lead.id)||null;
  };
  const calcCommission=(lead)=>{
    const confirmed=getLeadCommission(lead);
    if(confirmed) return confirmed.commission_amount||0;
    return 0; // Pas de commission tant que paiement non confirmé
  };

  // ══ AI PROSPECTION ══
  const runAiProspect=async()=>{
    setAiLoading(true);setAiResults(null);
    try{
      const swList=software.map(s=>`${s.name}(${s.price}€/mois): ${s.desc}`).join('\n');
      const prompt=`Tu es un expert commercial B2B logiciels SaaS BTP en ${aiRegion}, secteur ${aiSector}.\n\nNos logiciels:\n${swList}\n\nGénère 10 entreprises FICTIVES mais RÉALISTES avec coordonnées complètes. JSON uniquement, sans texte avant/après:\n[{"nom":"Entreprise BTP SARL","secteur":"Construction","taille":"PME","ville":"Lyon (69)","site":"www.entreprise-btp.fr","contact":"Jean Dupont","poste":"Gérant","email":"j.dupont@entreprise-btp.fr","tel":"06 12 34 56 78","logiciel":"batimanager","score":85,"raison":"Constructeur actif sans outil de gestion chantier","ca_estime":"2M€"}]\n\nIMPORTANT: email et tel doivent être RÉALISTES (format français). Si inconnu mettre null.`;
      const data=await callMistralProxy({model:'mistral-small-latest',messages:[{role:'user',content:prompt}],temperature:0.7});
      const txt=data.choices?.[0]?.message?.content||'[]';
      setAiResults(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch(e){setAiResults([]);}
    setAiLoading(false);
  };

  const importAiLead=(r)=>{
    const ok=addLead({entreprise:r.nom,contact:r.contact,email:r.email||r.email_probable||'',tel:r.tel||'',secteur:r.secteur,region:r.ville,logiciel:r.logiciel,source:'IA Prospection',commercial:selCo!=='all'?selCo:'',notes:`${r.poste} · ${r.taille} · Score:${r.score} · CA:${r.ca_estime||'?'} · ${r.raison}${r.site?' · '+r.site:''}`,valeur:software.find(s=>s.slug===r.logiciel)?.price||0,commission_type:'prospect_close'});
    if(ok)setAiResults(prev=>prev.filter(x=>x.nom!==r.nom));
  };

  // ══ AI RELANCES ══
  const runAiRelances=async()=>{
    setAiRelLoading(true);setAiRelances(null);
    const staleLeads=crm.leads.filter(l=>!['conclu'].includes(l.stage)).map(l=>{
      const lastInt=l.interactions?.slice(-1)[0];
      const daysSince=lastInt?Math.floor((Date.now()-new Date(lastInt.date).getTime())/86400000):Math.floor((Date.now()-new Date(l.createdAt).getTime())/86400000);
      return{id:l.id,entreprise:l.entreprise,contact:l.contact,stage:l.stage,daysSince,lastType:lastInt?.type||'Aucun contact',logiciel:l.logiciel};
    }).sort((a,b)=>b.daysSince-a.daysSince).slice(0,15);
    try{
      const prompt=`Tu es un directeur commercial expert. Voici des leads en cours sans nouvelle récente:\n${JSON.stringify(staleLeads)}\n\nPour chaque lead, suggère une action de relance concrète. Réponds en JSON:\n[{"id":"...","entreprise":"...","urgence":"haute|moyenne|basse","action":"phrase d'action concrète","script":"phrase d'accroche téléphonique"}]`;

    }catch(e){setAiRelances([]);}

  };

  // ══ STATS ══
  // Si commercial connecté : uniquement ses leads (pas de filtre "tous")
  const effectiveCoId=isRestrictedCommercial?(myCoId||'__none__'):selCo;

  const totalCA=signes.reduce((s,l)=>s+(l.valeur||0),0);
  const totalCommissions=confirmedCommissions.reduce((s,c)=>s+(c.commission_amount||0),0);

  // Stats par commercial pour leaderboard
  const coStats=crm.commerciaux.map(co=>{
    const cl=crm.leads.filter(l=>l.commercial===co.id);
    const coPendingValidation=cl.filter(l=>l.stage==='rdv_fait'&&l.pendingConfirmation);
    const pl=cl.filter(l=>l.stage!=='conclu');
    const obj=(crm.objectifs||[]).find(o=>o.coId===co.id&&o.month===selPeriod);
    const periodDemos=cl.filter(l=>l.history?.some(h=>h.stage==='rdv_fait'&&h.date?.startsWith(selPeriod))).length;
    const periodLeads=cl.filter(l=>l.createdAt?.startsWith(selPeriod)).length;
    // Commissions uniquement sur paiements confirmés Stripe

    const com=coCommissions.reduce((s,c)=>s+(c.commission_amount||0),0);
    const ca=coCommissions.reduce((s,c)=>s+(c.amount_ht||0),0);
    const periodSigned=coCommissions.filter(c=>(c.paid_at||'').startsWith(selPeriod)).length;
    return{...co,total:cl.length,signes:coCommissions.length,pipeline:pl.length,ca,com,
      tx:cl.length>0?((coCommissions.length/cl.length)*100).toFixed(1):0,

      pendingValidation:coPendingValidation.length,
      interactions:cl.reduce((s,l)=>s+(l.interactions?.length||0),0),
      lastActivity:cl.reduce((latest,l)=>{const la=l.interactions?.slice(-1)[0]?.date||l.createdAt;return la>latest?la:latest},'')
    };
  }).sort((a,b)=>b.com-a.com);

  // ══ RENDER ══
  const KPI=({label,value,color,sub})=>React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:mob?'12px':'16px 18px',borderTop:`3px solid ${color}`}},

    React.createElement('div',{style:{fontFamily:SF,fontSize:mob?18:24,fontWeight:700,color}},value),

  );

  return React.createElement('div',{style:{padding:mob?'16px 12px':'28px 36px'}},
    React.createElement('div',{style:{fontFamily:SS,fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:4}},'CRM Commercial'),
    React.createElement('h1',{style:{margin:0,fontFamily:SF,fontSize:mob?22:30,fontWeight:700,color:C.ink,marginBottom:8}},'Gestion Commerciale'),
    React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone,marginBottom:20}},'Période : '+selPeriod),

    // KPIs
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:mob?'1fr 1fr':'repeat(4,1fr)',gap:mob?8:14,marginBottom:20}},
      React.createElement(KPI,{label:'Pipeline actif',value:pipeline.length,color:'#1a3f7a',sub:periodLeads.length+' ce mois'}),
      React.createElement(KPI,{label:'Signés',value:signes.length,color:'#1e6641',sub:'Tx conv: '+txConv+'%'}),
      React.createElement(KPI,{label:'CA Généré',value:totalCA.toLocaleString('fr-FR')+'€',color:'#5b3d9e',sub:totalCA>0?((totalCA/12)).toLocaleString('fr-FR',{maximumFractionDigits:0})+'€/mois MRR':''}),
      React.createElement(KPI,{label:'Commissions confirmées',value:totalCommissions.toLocaleString('fr-FR',{maximumFractionDigits:0})+'€',color:'#b5651d',sub:'Paiements Stripe validés'}),
      pendingValidationLeads.length>0&&React.createElement(KPI,{label:'En attente validation',value:pendingValidationLeads.length,color:'#9a6800',sub:'Clients à confirmer'})
    ),

    // Tabs
    React.createElement('div',{style:{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}},
      React.createElement(TabBtn,{id:'pipeline',icon:'🔄',label:'Pipeline'}),
      React.createElement(TabBtn,{id:'prospection',icon:'🔍',label:'Prospection IA'}),
      React.createElement(TabBtn,{id:'relances',icon:'🤖',label:'Relances IA'}),
      isRestrictedCommercial&&React.createElement(TabBtn,{id:'mes_commissions',icon:'💰',label:'Mes commissions'}),
      !isRestrictedCommercial&&React.createElement(TabBtn,{id:'dashboard',icon:'📊',label:'Dashboard'}),
      !isRestrictedCommercial&&React.createElement(TabBtn,{id:'leaderboard',icon:'🏆',label:'Leaderboard'}),
      !isRestrictedCommercial&&React.createElement(TabBtn,{id:'commerciaux',icon:'👥',label:'Équipe'}),
      !isRestrictedCommercial&&React.createElement(TabBtn,{id:'objectifs',icon:'🎯',label:'Objectifs'})
    ),

    // Filtre commercial + période
    React.createElement('div',{style:{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap',alignItems:'center'}},
      !isRestrictedCommercial&&React.createElement('select',{value:selCo,onChange:e=>setSelCo(e.target.value),style:{...is,width:'auto'}},
        React.createElement('option',{value:'all'},'Tous les commerciaux'),
        crm.commerciaux.map(co=>React.createElement('option',{key:co.id,value:co.id},co.nom))

// Panel Admin : composant Codes d'essai
const AdminCodes=({software})=>{
  const [codes,setCodes]=useState(()=>getTrialCodes());
  useEffect(()=>{
    if(!supabaseClient)return;
    supabaseClient.from('promo_codes').select('*').order('created_at',{ascending:false}).then(({data,error})=>{
      if(error||!data||data.length===0)return;
      const mapped=data.map(d=>({code:d.code,softwareSlug:d.software_slug,durationDays:d.duration_days||7,note:d.note||'',createdAt:d.created_at,usedBy:d.used_by||null,usedAt:d.used_at||null}));
      const localCodes=getTrialCodes();
      const merged=Object.values([...localCodes,...mapped].reduce((acc,c)=>{acc[c.code]=c;return acc},{}));
      saveTrialCodes(merged);
      setCodes(merged);
    });
  },[]);
  const [selSw,setSelSw]=useState(software[0]?.slug||'batimanager');
  const [days,setDays]=useState(7);
  const [note,setNote]=useState('');
  const [copied,setCopied]=useState(null);
  const [nbGen,setNbGen]=useState(1);

  const [genBy,setGenBy]=useState('Admin');
  const generate=()=>{
    const newCodes=[];
    for(let i=0;i<nbGen;i++){
      const c=generateTrialCode(selSw,days,note);
      // Enrichir avec le commercial qui génère
      const allCodes=getTrialCodes();
      const found=allCodes.find(x=>x.code===c);
      if(found){found.generatedBy=genBy;found.generatedAt=new Date().toISOString();saveTrialCodes(allCodes);}
      newCodes.push(c);
    }
    setCodes(getTrialCodes());
    setCopied(null);
  };
  const copyCode=(code)=>{navigator.clipboard?.writeText(code);setCopied(code);setTimeout(()=>setCopied(null),2000)};
  const deleteCode=(code)=>{
    const updated=getTrialCodes().filter(c=>c.code!==code);
    saveTrialCodes(updated);
    setCodes(updated);
    if(supabaseClient)supabaseClient.from('promo_codes').delete().eq('code',code).then(()=>{});
  };

  const unused=codes.filter(c=>!c.usedBy);
  const used=codes.filter(c=>c.usedBy);

// ── Persistance des abonnements dans Supabase ──
async function loadUserSubs(userId, softwareList){
  if(!supabaseClient||!userId)return [];
  try{
    const {data,error}=await supabaseClient.from("software_access").select("software_slug,access_end").eq("user_id",userId);
    console.log('☁️ loadUserSubs result:',{data,error,userId});
    if(error||!data)return [];
    const now=new Date();
    const activeSlugs=data.filter(r=>new Date(r.access_end)>now).map(r=>r.software_slug);
    const ids=softwareList.filter(s=>activeSlugs.includes(s.slug)).map(s=>s.id);
    console.log('☁️ Active subs:',activeSlugs,'→ IDs:',ids);
    return ids;
  }catch(e){console.warn('loadUserSubs error:',e);return []}
}

async function saveUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId){console.warn('saveUserSub: missing client or userId');return}
  try{
    const accessEnd=new Date();
    accessEnd.setFullYear(accessEnd.getFullYear()+10);
    // Essayer d'abord un upsert
    const {data,error}=await supabaseClient.from("software_access").upsert({
      user_id:userId,
      software_slug:softwareSlug,
      access_end:accessEnd.toISOString()
    },{onConflict:'user_id,software_slug'});
    if(error){
      console.warn('☁️ saveUserSub upsert failed, trying insert:',error.message);
      // Fallback: essayer un simple insert
      const {error:err2}=await supabaseClient.from("software_access").insert({
        user_id:userId,
        software_slug:softwareSlug,
        access_end:accessEnd.toISOString()
      });
      if(err2) console.error('☁️ saveUserSub insert also failed:',err2.message);
      else console.log('☁️ saveUserSub insert OK for',softwareSlug);
    } else {
      console.log('☁️ saveUserSub OK for',softwareSlug);
    }
  }catch(e){console.error('saveUserSub error:',e)}
}

async function removeUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId)return;
  try{
    await supabaseClient.from("software_access").delete().eq("user_id",userId).eq("software_slug",softwareSlug);
  }catch(e){console.warn('removeUserSub error:',e)}
}

      }

        const invite=await getTeamInviteByToken(teamToken);

        if(!invite){
          setTeamOwner(null);
          setTeamLoading(false);

        const baseOwner={
          id:invite.owner_id,
          email:invite.owner_email||fallback.email||'',
          company:invite.owner_company||fallback.company||'Entreprise',
          companyLogo:invite.owner_logo_url||fallback.companyLogo||'',
          subs:fallback.subs||[]
        };

        setTeamOwner(baseOwner);

        const ownerSubs=invite.owner_id?await loadUserSubs(invite.owner_id, SW_DB):[];
        let companyLogo = baseOwner.companyLogo || '';
        try{
          if(supabaseClient && invite.owner_id){
            const { data, error } = await supabaseClient
              .from('user_profiles')
              .select('company_logo_url')
              .eq('user_id', invite.owner_id)
              .maybeSingle();

              companyLogo = data.company_logo_url;
            }
          }
        }catch(e){
          console.warn('Logo fetch error:', e);
        }

        if(!active) return;
        setTeamOwner({
          ...baseOwner,
          companyLogo:companyLogo,
          subs:ownerSubs.length?ownerSubs:(baseOwner.subs||[])
        });
      }catch(e){
        console.warn('loadTeamContext error:', e);
      }finally{
        if(active) setTeamLoading(false);
      }
    }
    loadTeamContext();
    return ()=>{active=false;};
  },[teamMode,teamToken,users]);

  useEffect(()=>{
    const detectRecovery=()=>{
      const hashParams=new URLSearchParams((window.location.hash||'').replace(/^#/,''));
      const searchParams=new URLSearchParams(window.location.search);
      const isRecovery=hashParams.get('type')==='recovery' || searchParams.get('type')==='recovery' || !!hashParams.get('access_token');
      setRecoveryMode(isRecovery);
    };
    detectRecovery();
    window.addEventListener('hashchange',detectRecovery);
    return ()=>window.removeEventListener('hashchange',detectRecovery);
  },[]);

  useEffect(()=>{
    let mounted=true;
    async function restoreSession(){
      if(!supabaseClient) return;
      const { data, error } = await supabaseClient.auth.getSession();
      if(error){console.error("Erreur session:", error);return;}
      const authUser=data?.session?.user;
      if(!authUser || !mounted) return;
      const existing=users.find(u=>u.email===authUser.email)||USERS_DB.find(u=>u.email===authUser.email)||null;
      const mapped=mapAuthUserToDemoUser(authUser,existing);
      // Charger les abonnements depuis Supabase
      const cloudSubs=await loadUserSubs(authUser.id, SW_DB);
      if(cloudSubs.length>0) mapped.subs=cloudSubs;
      setUser(mapped);
      setUsers(prev=>{
        const ex=prev.find(x=>String(x.id)===String(mapped.id)||x.email===mapped.email);
        return ex?prev.map(x=>(String(x.id)===String(ex.id)||x.email===mapped.email)?{...ex,...mapped}:x):[...prev,mapped];
      });
    }
    restoreSession();
    return ()=>{mounted=false;};
  },[]);

  // ═══ Gérer le retour Stripe après paiement ═══

        try{

            await syncSubsFromCloud(user.id, SW_DB, setUser, setUsers);
          }

          console.warn('Stripe refresh error:',e);

          try{localStorage.removeItem('oniq_pending_subs')}catch(e){}

        }
      };
      setTimeout(waitAndRefresh, 2500);
      if(pending?.cart?.length){

function formatAccessDate(value){
  if(!value) return "—";
  const d=new Date(value);
  if(Number.isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function isAccessActiveRecord(record){
  if(!record?.access_end) return false;
  const end=new Date(record.access_end);
  return !Number.isNaN(end.getTime()) && end>new Date();
}

async function getSoftwareAccessMap(userId){
  if(!supabaseClient || !userId) return {};
  const { data, error } = await supabaseClient
    .from("software_access")
    .select("software_slug,access_start,access_end,source,created_at")
    .eq("user_id", userId)
    .order("access_end", { ascending:false });

  if(error || !Array.isArray(data)){
    console.error("Erreur getSoftwareAccessMap:", error);
    return {};
  }

  const out={};
  data.forEach(row=>{
    if(row?.software_slug && !out[row.software_slug]) out[row.software_slug]=row;
  });
  return out;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

// SECURITY CHECK ACCESS (fixed)
async function checkAccess(softwareSlug){
  if(!supabaseClient){
    console.error("Supabase non disponible");
    return false;
  }

  const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
  if(userError || !user){
    alert("Connecte-toi d'abord.");
    return false;
  }

  const { data, error } = await supabaseClient
    .from("software_access")
    .select("access_end")
    .eq("user_id", user.id)
    .eq("software_slug", softwareSlug)
    .order("access_end", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("Erreur checkAccess:", error);
    return false;
  }

  if(!data || !data.access_end){
    return false;
  }

  return new Date(data.access_end) > new Date();
}

async function openSoftwareProtected(slug){
  const allowed = await checkAccess(slug);
  if(!allowed){
    alert("Ton accès n'est pas actif pour ce logiciel. Vérifie ton abonnement ou contacte le support.");
    return;
  }
  if(typeof go === "function"){
    go(slug);
    return;
  }
  console.warn("Fonction go(slug) introuvable");
}
