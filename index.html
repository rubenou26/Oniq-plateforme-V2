<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ONIQ Platform</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- Correct Supabase browser build -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body {font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:40px;}
button {padding:10px 20px; margin-top:10px;}
</style>
</head>

<body>

<h2>ONIQ Supabase Test</h2>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const supabaseUrl = "https://kxdxxhepewziazfnfnkq.supabase.co";
const supabaseKey = "PASTE_YOUR_SB_PUBLISHABLE_KEY_HERE";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function App(){

  const [software,setSoftware] = useState([]);

  useEffect(()=>{
    loadSoftware();
  },[]);

  async function loadSoftware(){
    const {data,error} = await supabaseClient
      .from("software_products")
      .select("*");

    console.log("DATA:",data);
    console.log("ERROR:",error);

    if(data) setSoftware(data);
  }

  return (
    <div>
      <h3>Logiciels depuis Supabase</h3>
      {software.map(sw => (
        <div key={sw.id}>
          <strong>{sw.name}</strong> — {sw.monthly_price}€/mois
        </div>
      ))}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));

</script>

</body>
</html>
