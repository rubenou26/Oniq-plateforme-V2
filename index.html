
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ONIQ Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f5f5f5;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  width:240px;
  background:#0a0a08;
  color:white;
  padding:20px;
}

.sidebar h4{
  margin-top:30px;
  font-size:12px;
  opacity:0.6;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  padding:8px 0;
  font-size:14px;
}

.main{
  margin-left:240px;
  padding:30px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.software{
  background:white;
  border-radius:10px;
  padding:20px;
  cursor:pointer;
  transition:0.2s;
}

.software:hover{
  transform:translateY(-2px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.notification{
  background:#fff;
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
}

iframe{
  width:100%;
  height:80vh;
  border:none;
}
</style>
</head>

<body>

<div class="sidebar">

<a href="#" onclick="openPage('marketplace')">Marketplace</a>
<a href="#" onclick="openPage('sector')">Par secteur</a>
<a href="#" onclick="openPage('about')">À propos</a>

<h4>ESPACE PRO</h4>

<a href="#" onclick="openPage('dashboard')">Dashboard</a>
<a href="#" onclick="openPage('space')">Mon espace</a>
<a href="#" onclick="openPage('referral')">Parrainage</a>
<a href="#" onclick="openPage('quote')">Devis sur mesure</a>

<h4>HUB</h4>

<a href="#" onclick="openPage('hub')">Nos logiciels</a>

</div>

<div class="main" id="main">

</div>

<script>

const team = {
  company:"Entreprise Demo",
  subs:["batimanager"],
  members:[
    {name:"Paul",role:"Admin"},
    {name:"Marc",role:"Employé"}
  ]
}

const notifications = [
  {message:"Paul a créé un chantier"},
  {message:"Marc a modifié un devis"},
  {message:"Nouveau membre rejoint l'équipe"}
]

function openPage(page){

  if(page==="dashboard"){

    document.getElementById("main").innerHTML=`
    
    <div class="topbar">
      <h1>Dashboard</h1>
      <div>🔔 ${notifications.length}</div>
    </div>

    <div class="grid">

      <div class="card">
      <h3>👥 Équipe</h3>
      ${team.members.length} membres actifs
      </div>

      <div class="card">
      <h3>🧰 Logiciels</h3>
      ${team.subs.length} actif
      </div>

      <div class="card">
      <h3>🔔 Notifications</h3>
      ${notifications.length}
      </div>

    </div>

    <div class="card">
    <h3>Activité récente</h3>
    ${notifications.map(n=>'<div class="notification">'+n.message+'</div>').join("")}
    </div>

    `

  }

  if(page==="hub"){

    document.getElementById("main").innerHTML=`
    
    <h1>Nos logiciels</h1>

    <div class="grid">

      <div class="software" onclick="openSoftware('batimanager')">

        <h3>BatiManager</h3>
        <p>Gestion de chantiers</p>
        <p>✔ Actif</p>

      </div>

    </div>

    `

  }

  if(page==="marketplace"){
    document.getElementById("main").innerHTML="<h1>Marketplace</h1>"
  }

  if(page==="sector"){
    document.getElementById("main").innerHTML="<h1>Par secteur</h1>"
  }

  if(page==="about"){
    document.getElementById("main").innerHTML="<h1>À propos</h1>"
  }

  if(page==="space"){
    document.getElementById("main").innerHTML="<h1>Mon espace</h1>"
  }

  if(page==="referral"){
    document.getElementById("main").innerHTML="<h1>Parrainage</h1>"
  }

  if(page==="quote"){
    document.getElementById("main").innerHTML="<h1>Devis sur mesure</h1>"
  }

}

function openSoftware(name){

  if(name==="batimanager"){

    document.getElementById("main").innerHTML=`
    
    <h1>BatiManager</h1>

    <iframe src="batimanager_vierge.html"></iframe>

    `

  }

}

openPage("dashboard")

</script>

</body>
</html>
