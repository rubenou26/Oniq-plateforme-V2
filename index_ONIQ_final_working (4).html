const TEAM_INVITES_KEY='oniq_team_invites_v1';
const TEAM_MEMBERS_KEY='oniq_team_members_v1';
const TEAM_SESSIONS_KEY='oniq_team_sessions_v1';
const loadStore=(key,fallback)=>{try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback;}catch(e){return fallback;}};
const saveStore=(key,value)=>localStorage.setItem(key,JSON.stringify(value));
const getTeamInvites=()=>loadStore(TEAM_INVITES_KEY,{});
const saveTeamInvites=v=>saveStore(TEAM_INVITES_KEY,v);
const getTeamMembers=()=>loadStore(TEAM_MEMBERS_KEY,[]);
const saveTeamMembers=v=>saveStore(TEAM_MEMBERS_KEY,v);
const getTeamSessions=()=>loadStore(TEAM_SESSIONS_KEY,{});
const saveTeamSessions=v=>saveStore(TEAM_SESSIONS_KEY,v);
const createTeamInvite=(owner)=>{
  const token=genCode();
  const invites=getTeamInvites();
  invites[token]={token,ownerId:owner.id,createdAt:Date.now(),label:owner.company};
  saveTeamInvites(invites);
  return token;
};
const getOwnerTeamMembers=(ownerId)=>getTeamMembers().filter(m=>String(m.ownerId)===String(ownerId));
const getMemberSoftwareIds=(member, ownerSubs)=>{
  const assigned=Array.isArray(member?.softwareIds)?member.softwareIds:[];
  return ownerSubs.filter(id=>assigned.includes(id));
};

const Sparkline=({data})=>{
  const max=Math.max(...data),min=Math.min(...data),w=300,h=60,p=6;
  const x=(i)=>p+(i/(data.length-1))*(w-p*2);
  const y=(v)=>h-p-((v-min)/(max-min||1))*(h-p*2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} ${data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")} L${x(data.length-1)},${h} L${x(0)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:60}}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.25"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#g1)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r="3" fill={C.gold}/>
          <text x={x(i)} y={h} textAnchor="middle" style={{fontSize:8,fontFamily:SS,fill:C.stone}}>{MRR_MONTHS[i]}</text>
        </g>
      ))}
    </svg>
  );
};

const AuthModal=({onLogin,initMode,onClose})=>{
  const [mode,setMode]=useState(initMode||"login");
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [reg,setReg]=useState({company:"",name:"",email:"",sector:"",pass:"",pass2:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetMode,setResetMode]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const is={width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"12px 14px",fontFamily:SS,fontSize:13,color:C.ivory,outline:"none",boxSizing:"border-box"};
  const ls={fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:7};

  const doResetPassword=async()=>{
    setErr("");
    if(!email){setErr("Saisissez votre email.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const {error}=await supabaseClient.auth.resetPasswordForEmail(email.trim(),{
        redirectTo:window.location.origin+window.location.pathname
      });
      if(error){setErr(error.message||"Erreur lors de l'envoi.");return;}
      setResetSent(true);
    }catch(e){
      setErr(e?.message||"Erreur lors de l'envoi.");
    }finally{
      setLoading(false);
    }
  };

  const doLogin=async()=>{
    setErr("");
    if(!email||!pass){setErr("Saisissez votre email et votre mot de passe.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email.trim(),
        password: pass
      });
      if(error){setErr(error.message||"Connexion impossible.");return;}
      const authUser=data?.user;
      if(!authUser){setErr("Connexion impossible.");return;}
      onLogin(mapAuthUserToDemoUser(authUser),false);
    }catch(e){
      setErr(e?.message||"Connexion impossible.");
    }finally{
      setLoading(false);
    }
  };

  const doRegister=async()=>{
    setErr("");
    if(!reg.company||!reg.email||!reg.pass){setErr("Remplissez tous les champs.");return;}
    if(reg.pass!==reg.pass2){setErr("Mots de passe différents.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email: reg.email.trim(),
        password: reg.pass,
        options: {
          data: {
            company: reg.company,
            name: reg.name || reg.company,
            sector: reg.sector || ""
          },

const Marketplace=({user,setUser,software,setView,onAuth})=>{
  const [cat,setCat]=useState("Tous");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("popular");
  const [cart,setCart]=useState([]);
  const [detail,setDetail]=useState(null);
  const [showCart,setShowCart]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [toast,setToast]=useState(null);
  const [aiQ,setAiQ]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiRes,setAiRes]=useState(null);
  const [showAi,setShowAi]=useState(false);

  const CATS=["Tous",...Array.from(new Set(software.map(s=>s.cat)))];
  let list=software.filter(s=>(cat==="Tous"||s.cat===cat)&&s.name.toLowerCase().includes(search.toLowerCase()));
  if(sort==="popular")list=[...list].sort((a,b)=>b.reviews-a.reviews);
  if(sort==="rating")list=[...list].sort((a,b)=>b.rating-a.rating);
  if(sort==="price_asc")list=[...list].sort((a,b)=>a.price-b.price);
  if(sort==="price_desc")list=[...list].sort((a,b)=>b.price-a.price);

  const isSub=id=>user?.subs?.includes(id);
  const isTrial=id=>user&&isTrialActive(user.trials?.[id]);
  const isCart=id=>cart.includes(id);

  const [showTrialCode,setShowTrialCode]=useState(null);
  const [trialCodeInput,setTrialCodeInput]=useState('');
  const [trialCodeErr,setTrialCodeErr]=useState('');
  const [trialCodeLoading,setTrialCodeLoading]=useState(false);

  const startTrial=id=>{
    if(!user){onAuth("register");return;}
    setShowTrialCode(id);
    setTrialCodeInput('');
    setTrialCodeErr('');
  };
  const submitTrialCode=async()=>{
    if(!trialCodeInput.trim()){setTrialCodeErr("Saisissez un code d'essai.");return;}
    setTrialCodeLoading(true);setTrialCodeErr('');
    const result=await redeemTrialCode(trialCodeInput,user.id,user.email);
    setTrialCodeLoading(false);
    if(!result.ok){setTrialCodeErr(result.msg);return;}
    // Vérifier que le code correspond au bon logiciel
    const sw=software.find(s=>s.id===showTrialCode);
    if(sw&&result.slug!==sw.slug){setTrialCodeErr("Ce code est pour un autre logiciel.");return;}
    setUser(u=>({...u,trials:{...u.trials,[showTrialCode]:Date.now()}}));
    setShowTrialCode(null);
    setToast(`✓ ${result.msg}`);
    setTimeout(()=>setToast(null),4000);
    setDetail(null);
  };
  const toggleCart=id=>{if(!user){onAuth("register");return;}setCart(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
  const cartItems=software.filter(s=>cart.includes(s.id));
  const cartTotal=cartItems.reduce((s,x)=>s+x.price,0);
  const pay=async()=>{
    // Collecter les price IDs Stripe pour les items du panier
    const lineItems=cartItems.map(sw=>{
      const priceId=STRIPE_PRICES[sw.slug];
      return priceId?{price:priceId,quantity:1}:null;
    }).filter(Boolean);
    
    if(lineItems.length===0){
      // Fallback si pas de price Stripe configuré : activer directement
      const newSubs=[...new Set([...user.subs,...cart])];
      setUser(u=>({...u,subs:newSubs}));
      setCart([]);setShowPay(false);
      setToast("🎉 Abonnements activés !");
      setTimeout(()=>setToast(null),4000);
      cart.forEach(id=>{const sw=software.find(s=>s.id===id);if(sw)saveUserSub(user.id,sw.slug);});
      return;
    }

    // Sauvegarder les items en attente dans localStorage pour les activer après le retour Stripe
    try{localStorage.setItem('oniq_pending_subs',JSON.stringify({cart,userId:user.id,email:user.email,ts:Date.now()}))}catch(e){}

    // Rediriger vers Stripe Checkout
    if(stripePromise){
      try{
        const {error}=await stripePromise.redirectToCheckout({
          lineItems,
          mode:'subscription',
          successUrl:window.location.origin+window.location.pathname+'?payment=success',
          cancelUrl:window.location.origin+window.location.pathname+'?payment=cancel',
          customerEmail:user.email
        });
        if(error){
          console.error('Stripe error:',error);
          setToast("Erreur de paiement : "+error.message);
          setTimeout(()=>setToast(null),5000);
        }
      }catch(e){
        console.error('Stripe redirect error:',e);
        setToast("Erreur Stripe : "+e.message);
        setTimeout(()=>setToast(null),5000);
      }
    }
  };

  const runAi=async()=>{
    if(!user){onAuth("register");return;}
    if(!aiQ.trim())return;
    setAiLoad(true);setAiRes(null);
    try{
      const catalog=software.map(s=>`id:${s.id} ${s.name}(${s.price}€): ${s.desc}`).join("\n");
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:`Catalogue:\n${catalog}\n\nBesoin: "${aiQ}"\n\nRéponds UNIQUEMENT en JSON sans markdown:\n{"message":"réponse courte","matches":[{"id":1,"reason":"raison"}],"noMatch":false}`}]})});
      const data=await res.json();
      const txt=data.content?.map(b=>b.text||"").join("")||"{}";
      setAiRes(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setAiRes({message:"Une erreur est survenue, réessayez.",matches:[],noMatch:true});}
    setAiLoad(false);
  };
  const aiMatches=aiRes?software.filter(s=>aiRes.matches?.some(m=>m.id===s.id)):[];

  return (
    <div style={{padding:"28px 36px"}}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:SS,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.stone,marginBottom:4}}>Catalogue</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <h1 style={{margin:0,fontFamily:SF,fontSize:30,fontWeight:700,color:C.ink}}>Marketplace</h1>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>{if(!user){onAuth("register");return;}setShowAi(p=>!p);}} style={{display:"flex",alignItems:"center",gap:7,background:showAi?C.goldDim:"transparent",border:`1px solid ${showAi?C.gold+"66":C.linen}`,borderRadius:6,padding:"8px 14px",fontFamily:SS,fontSize:11,fontWeight:600,color:showAi?C.gold:C.stone,cursor:"pointer"}}>
              <span>✦</span> Recherche IA
              {!user&&<span style={{fontSize:9,background:C.gold,color:C.ink,borderRadius:2,padding:"1px 5px",fontWeight:800,marginLeft:2}}>PRO</span>}
            </button>
            {user&&cart.length>0&&<button onClick={()=>setShowCart(true)} style={{background:C.gold,border:"none",borderRadius:6,padding:"8px 16px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer"}}>🛒 {cart.length} · {cartTotal}€/mois</button>}
            {!user&&<button onClick={()=>onAuth("register")} style={{background:C.gold,border:"none",borderRadius:6,padding:"8px 16px",fontFamily:SS,fontSize:11,fontWeight:800,color:C.ink,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Créer un compte</button>}
          </div>
        </div>
      </div>

      {/* Bannière visiteur */}
      {!user&&(
        <div style={{background:C.goldDim,border:`1px solid ${C.gold}44`,borderRadius:8,padding:"12px 18px",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:C.gold}}>✦</span>
            <span style={{fontFamily:SS,fontSize:12,color:C.ink}}>Créez un compte gratuit pour activer les <strong>codes d'essai</strong> et accéder à votre espace pro.</span>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>onAuth("login")} style={{background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"6px 14px",fontFamily:SS,fontSize:11,fontWeight:600,color:C.stone,cursor:"pointer"}}>Connexion</button>
            <button onClick={()=>onAuth("register")} style={{background:C.ink,border:"none",borderRadius:4,padding:"6px 14px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>S'inscrire</button>
          </div>
        </div>
      )}

      {/* IA */}
      {showAi&&user&&(

const SoftwareLaunchModal=({software,onClose})=>{
  if(!software)return null;
  const launcher=softwareLaunchers[software.slug];
  const iframeRef=React.useRef(null);
  
  useEffect(()=>{
    // Envoyer le token Supabase à l'iframe après chargement
    const sendAuth=async()=>{
      if(!supabaseClient||!iframeRef.current)return;
      try{
        const {data}=await supabaseClient.auth.getSession();
        if(data?.session){
          const msg={type:'oniq-auth-token',access_token:data.session.access_token,refresh_token:data.session.refresh_token};
          // Attendre que l'iframe soit chargé puis envoyer
          const trySend=()=>{
            try{iframeRef.current?.contentWindow?.postMessage(msg,'*');}catch(e){}
          };
          // Envoyer plusieurs fois car l'iframe data URL peut être lent à charger
          setTimeout(trySend,500);
          setTimeout(trySend,1500);
          setTimeout(trySend,3000);
          setTimeout(trySend,5000);
        }
      }catch(e){console.warn('Auth token send failed:',e)}
    };
    sendAuth();
  },[]);
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#fff'}}>
      <button onClick={onClose} style={{position:'fixed',bottom:18,right:18,zIndex:1001,background:'rgba(26,20,16,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:999,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#fff',cursor:'pointer',boxShadow:'0 8px 24px rgba(0,0,0,0.18)'}}>Fermer ✕</button>
      <iframe ref={iframeRef} title={software.name} src={launcher?.src} style={{position:'absolute',inset:0,width:'100%',height:'100%',border:'none',background:'#fff'}} sandbox="allow-scripts allow-same-origin allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"/>
    </div>
  );
};

const TeamAccessPage=({token,owner,software})=>{

  const [err,setErr]=useState('');
  const [launchedSoftware,setLaunchedSoftware]=useState(null);
  useEffect(()=>{
    const sessions=getTeamSessions();
    const memberId=sessions[token];
    if(memberId){
      const found=getTeamMembers().find(m=>String(m.id)===String(memberId) && m.status!=='disabled');
      if(found)setMember(found);
    }
  },[token]);
  useEffect(()=>{
    const handler=e=>setLaunchedSoftware(e.detail||null);
    window.addEventListener('oniq-open-software',handler);
    return ()=>window.removeEventListener('oniq-open-software',handler);
  },[]);
  const saveSession=(memberId)=>{const sessions=getTeamSessions();sessions[token]=memberId;saveTeamSessions(sessions);};
  const doRegister=()=>{
    if(!form.name||!form.email||!form.password){setErr('Remplissez tous les champs.');return;}
    const all=getTeamMembers();
    if(all.find(m=>m.ownerId===owner.id && m.email.toLowerCase()===form.email.toLowerCase())){setErr("Cet email existe déjà dans l'équipe. Connectez-vous.");return;}
    const next={id:Date.now(),ownerId:owner.id,name:form.name,email:form.email,password:form.password,status:'active',softwareIds:[]};
    all.push(next); saveTeamMembers(all); saveSession(next.id); setMember(next); setErr('');
  };
  const doLogin=()=>{
    const found=getTeamMembers().find(m=>m.ownerId===owner.id && m.email.toLowerCase()===form.email.toLowerCase() && m.password===form.password && m.status!=='disabled');
    if(!found){setErr('Accès équipe introuvable ou suspendu.');return;}
    saveSession(found.id); setMember(found); setErr('');

  if(member){
    const apps=software.filter(sw=>getMemberSoftwareIds(member,owner.subs).includes(sw.id));
    return <>

// ── Système de codes d'essai ──
const TRIAL_CODES_KEY='oniq_trial_codes';
function getTrialCodes(){try{return JSON.parse(localStorage.getItem(TRIAL_CODES_KEY)||'[]')}catch(e){return[]}}
function saveTrialCodes(codes){try{localStorage.setItem(TRIAL_CODES_KEY,JSON.stringify(codes))}catch(e){}}

function generateTrialCode(softwareSlug, durationDays=7, note=''){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='ONIQ-';
  for(let i=0;i<3;i++){for(let j=0;j<4;j++)code+=chars[Math.floor(Math.random()*chars.length)];if(i<2)code+='-';}
  const entry={code,softwareSlug,durationDays,note,createdAt:new Date().toISOString(),usedBy:null,usedAt:null};
  const codes=getTrialCodes();
  codes.push(entry);
  saveTrialCodes(codes);
  // Aussi sauvegarder dans Supabase si disponible
  if(supabaseClient){
    supabaseClient.from('promo_codes').insert({code,software_slug:softwareSlug,duration_days:durationDays,note,created_at:entry.createdAt,used_by:null,used_at:null}).then(({error})=>{
      if(error)console.warn('Save trial code to Supabase failed:',error.message);
    });
  }
  return entry;
}

async function redeemTrialCode(codeStr, userId, userEmail){
  const codeUp=codeStr.trim().toUpperCase();
  // Chercher dans localStorage
  let codes=getTrialCodes();
  let found=codes.find(c=>c.code===codeUp);
  // Si pas trouvé localement, chercher dans Supabase
  if(!found&&supabaseClient){
    try{
      const {data}=await supabaseClient.from('promo_codes').select('*').eq('code',codeUp).maybeSingle();
      if(data) found={code:data.code,softwareSlug:data.software_slug,durationDays:data.duration_days||7,usedBy:data.used_by,usedAt:data.used_at};
    }catch(e){}
  }
  if(!found) return {ok:false,msg:"Code invalide. Vérifiez votre saisie."};
  if(found.usedBy) return {ok:false,msg:"Ce code a déjà été utilisé."};
  // Activer l'essai
  found.usedBy=userEmail||userId;
  found.usedAt=new Date().toISOString();
  // Mettre à jour localStorage
  codes=getTrialCodes();
  const idx=codes.findIndex(c=>c.code===codeUp);
  if(idx>=0){codes[idx]=found;saveTrialCodes(codes);}
  // Mettre à jour Supabase
  if(supabaseClient){
    supabaseClient.from('promo_codes').update({used_by:found.usedBy,used_at:found.usedAt}).eq('code',codeUp).then(()=>{});
    // Ajouter l'accès software_access
    const accessEnd=new Date();
    accessEnd.setDate(accessEnd.getDate()+(found.durationDays||7));
    supabaseClient.from('software_access').upsert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()},{onConflict:'user_id,software_slug'}).then(({error})=>{
      if(error) supabaseClient.from('software_access').insert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()}).then(()=>{});
    });
  }
  return {ok:true,slug:found.softwareSlug,days:found.durationDays||7,msg:`Essai de ${found.durationDays||7} jours activé !`};
}

// ── Persistance des abonnements dans Supabase ──
async function loadUserSubs(userId, softwareList){
  if(!supabaseClient||!userId)return [];
  try{
    const {data,error}=await supabaseClient.from("software_access").select("software_slug,access_end").eq("user_id",userId);
    console.log('☁️ loadUserSubs result:',{data,error,userId});
    if(error||!data)return [];
    const now=new Date();
    const activeSlugs=data.filter(r=>new Date(r.access_end)>now).map(r=>r.software_slug);
    const ids=softwareList.filter(s=>activeSlugs.includes(s.slug)).map(s=>s.id);
    console.log('☁️ Active subs:',activeSlugs,'→ IDs:',ids);
    return ids;
  }catch(e){console.warn('loadUserSubs error:',e);return []}
}

async function saveUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId){console.warn('saveUserSub: missing client or userId');return}
  try{
    const accessEnd=new Date();
    accessEnd.setFullYear(accessEnd.getFullYear()+10);
    // Essayer d'abord un upsert
    const {data,error}=await supabaseClient.from("software_access").upsert({
      user_id:userId,
      software_slug:softwareSlug,
      access_end:accessEnd.toISOString()
    },{onConflict:'user_id,software_slug'});
    if(error){
      console.warn('☁️ saveUserSub upsert failed, trying insert:',error.message);
      // Fallback: essayer un simple insert
      const {error:err2}=await supabaseClient.from("software_access").insert({
        user_id:userId,
        software_slug:softwareSlug,
        access_end:accessEnd.toISOString()
      });
      if(err2) console.error('☁️ saveUserSub insert also failed:',err2.message);
      else console.log('☁️ saveUserSub insert OK for',softwareSlug);
    } else {
      console.log('☁️ saveUserSub OK for',softwareSlug);
    }
  }catch(e){console.error('saveUserSub error:',e)}
}

async function removeUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId)return;
  try{
    await supabaseClient.from("software_access").delete().eq("user_id",userId).eq("software_slug",softwareSlug);
  }catch(e){console.warn('removeUserSub error:',e)}
}

// SECURITY CHECK ACCESS (fixed)
async function checkAccess(softwareSlug){
  if(!supabaseClient) return true;
  const { data: { user } } = await supabaseClient.auth.getUser();
  if(!user){
    alert("Connecte-toi d'abord.");
    return false;
  }
  const { data } = await supabaseClient
    .from("software_access")
    .select("*")
    .eq("user_id", user.id)
    .eq("software_slug", softwareSlug)
    .maybeSingle();

  if(!data) return false;

  const now = new Date();
  const end = new Date(data.access_end);
  return end > now;
}

async function openSoftwareProtected(slug){
  const allowed = await checkAccess(slug);
  if(!allowed){
    alert("Ton accès est expiré ou non activé. Entre un code promo.");
    return;
  }
  if(typeof go === "function"){
    go(slug);
  }
}
