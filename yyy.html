  const inviteLink=inviteToken?`${window.location.origin}${window.location.pathname}?team=1&t=${inviteToken}`:'';
  const generateInvite=async()=>{
    try{
      setBusy(true);
      const token=await createTeamInvite(owner);
      setInviteToken(token);
    }catch(err){
      console.error('Erreur invitation:',err);
      alert("Impossible de générer le lien d’invitation.");
    }finally{
      setBusy(false);
    }
  };

  const toggleSoftware=async(memberId,softwareId)=>{
    const current=members.find(m=>m.id===memberId);
    if(!current) return;
    const assigned=normalizeTeamSoftwareIds(current.softwareIds);
    const next=assigned.includes(softwareId)?assigned.filter(id=>id!==softwareId):[...assigned,softwareId];
    try{
      await updateTeamMemberSoftware(memberId,next);
      await syncMembers();
    }catch(err){
      console.error('Erreur attribution logiciel:',err);
      alert("Impossible de modifier les logiciels attribués.");
    }
  };

  const toggleStatus=async(memberId)=>{
    const current=members.find(m=>m.id===memberId);
    if(!current) return;
    const nextStatus=current.status==='disabled'?'active':'disabled';
    try{
      await updateTeamMemberStatus(memberId,nextStatus);
      await syncMembers();
    }catch(err){
      console.error('Erreur statut membre:',err);
      alert("Impossible de mettre à jour le statut du membre.");
    }
  };

  return (
    <div style={{display:'grid',gap:18}}>
      <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px'}}>
        <div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink,marginBottom:5}}>Inviter un membre</div>
        <div style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.6,marginBottom:14}}>Vous pouvez soit partager un lien d’invitation, soit donner le code entreprise fixe à saisir dans la connexion salarié.</div>
        <div style={{display:'grid',gap:12}}>
          <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:8,padding:'12px 14px'}}>
            <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:6}}>Code entreprise</div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{fontFamily:SF,fontSize:24,fontWeight:700,color:C.ink,letterSpacing:'0.04em'}}>{companyCode||'...'}</div>
              <button onClick={()=>{if(companyCode){navigator.clipboard?.writeText(companyCode);setCopied(true);setTimeout(()=>setCopied(false),2000);}}} style={{background:copied?C.greenDim:C.gold,border:copied?`1px solid ${C.green}44`:'none',borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:copied?C.green:C.ink,cursor:'pointer'}}>{copied?'✓ Code copié':'Copier le code'}</button>
            </div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.6,marginTop:8}}>Le salarié entre ce code dans l’application pour être relié au hub de votre entreprise.</div>
          </div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
            <button onClick={generateInvite} disabled={busy} style={{background:C.ink,border:'none',borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ivory,cursor:'pointer',opacity:busy?0.7:1}}>{busy?'Génération...':"Générer un lien d’invitation"}</button>
            {inviteLink&&<button onClick={()=>{navigator.clipboard?.writeText(inviteLink);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>{'Copier le lien'}</button>}
          </div>
          {inviteLink&&<div style={{background:C.dim,border:`1px solid ${C.linen}`,borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,color:C.ink,wordBreak:'break-all'}}>{inviteLink}</div>}
        </div>
      </div>
      <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.linen}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink}}>Gérer mon équipe</div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone}}>Attribuez les accès logiciel membre par membre.</div>
          </div>
          <div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.gold}}>{members.length} membre{members.length>1?'s':''}</div>
        </div>
        {loading&&<div style={{padding:'24px 20px',fontFamily:SS,fontSize:13,color:C.stone}}>Chargement de l’équipe...</div>}
        {!loading&&members.length===0&&<div style={{padding:'24px 20px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun membre enregistré pour le moment.</div>}
        {!loading&&members.map((member,idx)=>(
          <div key={member.id}>
            <div style={{padding:'18px 20px',display:'grid',gridTemplateColumns:'1.1fr 2fr auto',gap:18,alignItems:'start'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:13,fontWeight:700,color:C.ink}}>{member.name}</div>
                <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:3}}>{member.email}</div>
                <div style={{marginTop:8}}><Badge status={member.status==='disabled'?'overdue':'active'}/></div>
              </div>
              <div>
                <div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Logiciels attribués</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {software.filter(sw=>owner.subs.includes(sw.id)).map(sw=>{
                    const checked=getMemberSoftwareIds(member).includes(sw.id);
                    return <label key={sw.id} style={{display:'inline-flex',alignItems:'center',gap:6,background:checked?C.goldDim:C.ivory,border:`1px solid ${checked?C.gold+'55':C.linen}`,borderRadius:30,padding:'7px 10px',fontFamily:SS,fontSize:11,color:checked?C.ink:C.stone,cursor:'pointer'}}><input type='checkbox' checked={checked} onChange={()=>toggleSoftware(member.id,sw.id)}/>{sw.name}</label>;
                  })}
                </div>
              </div>
              <button onClick={()=>toggleStatus(member.id)} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>{member.status==='disabled'?'Réactiver':'Suspendre'}</button>
            </div>
            {idx<members.length-1&&<HR s={{margin:'0 20px'}}/>}
          </div>
        ))}
      </div>
    </div>
  );
};


const TeamAccessPage=({token,owner,software})=>{
  const [member,setMember]=useState(null);
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({name:'',email:'',password:'',companyCode:''});
  const [resolvedOwner,setResolvedOwner]=useState(owner||null);
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(true);
  const [submitting,setSubmitting]=useState(false);
  const [launchedSoftware,setLaunchedSoftware]=useState(()=>{
    try{const s=localStorage.getItem('oniq-active-software');if(s){const sw=JSON.parse(s);if(sw?.slug)return sw;}return null;}catch(e){return null;}
  });
  const openSoftware=(sw)=>{
    setLaunchedSoftware(sw);
    try{if(sw)localStorage.setItem('oniq-active-software',JSON.stringify(sw));else localStorage.removeItem('oniq-active-software');}catch(e){}
  };

  useEffect(()=>{
    const handler=e=>openSoftware(e.detail||null);
    window.addEventListener('oniq-open-software',handler);
    return ()=>window.removeEventListener('oniq-open-software',handler);
  },[]);

  useEffect(()=>{
    if(owner?.id){
      setResolvedOwner(prev=>({...(prev||{}), ...owner}));
    }
  },[owner?.id, owner?.company, owner?.companyLogo]);

  useEffect(()=>{
    let alive=true;
    async function bootstrap(){
      setLoading(true);
      setErr('');

      if(!resolvedOwner?.id){
        if(alive) setLoading(false);
        return;
      }

      try{
        if(supabaseClient){
          const { data } = await supabaseClient.auth.getUser();
          const authUser = data?.user;

          if(authUser){
            let found = await getTeamMemberByAuth(resolvedOwner.id, authUser.id);

            if(!found && authUser.email){
              found = await getTeamMemberByEmail(resolvedOwner.id, authUser.email);
            }

            if(!found && authUser.email){
              found = await createOrUpdateTeamMember({
                ownerId: resolvedOwner.id,
                userId: authUser.id,
                email: authUser.email,
                name: authUser.user_metadata?.name || authUser.email.split('@')[0] || 'Membre'
              });
            }

            if(found && found.status !== 'disabled'){
              await saveSession(found.id);
              if(alive) {
                setMember(found);
                setMode('login');
              }
            }
          }
        }
      }catch(e){
        console.error('Bootstrap équipe error:', e);
      }finally{
        if(alive) setLoading(false);
      }
    }

    bootstrap();
    return ()=>{ alive=false; };
  },[token, resolvedOwner?.id]);

  const saveSession=async(memberId)=>{ await createTeamSession(token, memberId); };

  const doRegister=async()=>{
    if(!form.name||!form.email||!form.password){setErr('Remplissez tous les champs.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      if(!resolvedOwner?.id){setErr('Entrez votre code entreprise.');return;}
      const existing=await getTeamMemberByEmail(resolvedOwner.id, form.email);
      if(existing && existing.userId){setErr("Cet email existe déjà dans l'équipe. Connectez-vous."); setMode('login'); return;}
      const { data, error } = await supabaseClient.auth.signUp({
        email: form.email.trim().toLowerCase(),
        password: form.password,
        options: { data: { name: form.name, company: resolvedOwner?.company||'' } }
      });
      if(error) throw error;

      // Cas 1 : session retournée = email auto-confirmé, on connecte directement
      if(data?.session){
        const authUser=data.session.user;
        const next=await createOrUpdateTeamMember({ownerId:resolvedOwner.id,userId:authUser.id,email:form.email,name:form.name});
        await saveSession(next.id);
        setMember(next);
        return;
      }

      // Cas 2 : user retourné mais PAS de session = confirmation email requise
      if(data?.user && !data?.session){
        // Tenter un login immédiat au cas où la confirmation n’est pas requise
        try{
          const loginResult = await supabaseClient.auth.signInWithPassword({
            email: form.email.trim().toLowerCase(),
            password: form.password
          });
          if(!loginResult.error && loginResult.data?.user){
            const authUser=loginResult.data.user;
            const next=await createOrUpdateTeamMember({ownerId:resolvedOwner.id,userId:authUser.id,email:form.email,name:form.name});
            await saveSession(next.id);
            setMember(next);
            return;
          }
        }catch(loginErr){
          // Le login a échoué = confirmation requise, on continue vers le message
        }
        setErr('✅ Compte créé ! Un email de confirmation vous a été envoyé. Cliquez sur le lien dans cet email, puis revenez vous connecter.');
        setMode('login');
        return;
      }

      // Cas 3 : aucun user retourné
      setErr('✅ Compte créé ! Vérifiez votre boîte mail pour confirmer votre inscription, puis connectez-vous.');
      setMode('login');
    }catch(e){
      console.error('Erreur inscription équipe:',e);
      const msg=e?.message||'';
      if(msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists')){
        setErr("Un compte existe déjà avec cet email. Connectez-vous plutôt.");
        setMode('login');
      } else {
        setErr(msg||"Impossible de créer l'accès équipe.");
      }
    }finally{
      setSubmitting(false);
    }
  };

  const doLogin=async()=>{
    if(!form.email||!form.password){setErr('Renseignez votre email et mot de passe.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      let activeOwner=resolvedOwner;
      const enteredCode=sanitizeCompanyCode(form.companyCode);
      if(!activeOwner?.id){
        if(!enteredCode){
          setErr('Entrez votre code entreprise pour accéder au hub.');
          return;
        }
        const companyRow=await getCompanyDirectoryByCode(enteredCode);
        if(!companyRow?.owner_id) throw new Error('Code entreprise introuvable.');
        activeOwner={
          id:companyRow.owner_id,
          email:companyRow.owner_email||'',
          company:companyRow.owner_company||'Entreprise',
          companyLogo:companyRow.owner_logo_url||'',
          subs:[]
        };
        const ownerSubs=await loadUserSubs(activeOwner.id, SW_DB);
        activeOwner={...activeOwner, subs:ownerSubs};
        setResolvedOwner(activeOwner);
      }

      const { error } = await supabaseClient.auth.signInWithPassword({
        email: form.email.trim().toLowerCase(),
        password: form.password
      });
      if(error) throw error;
      const { data } = await supabaseClient.auth.getUser();
      const authUser=data?.user;
      if(!authUser) throw new Error('Connexion impossible.');
      let found=await getTeamMemberByAuth(activeOwner.id, authUser.id);
      if(!found && authUser.email){
        found = await getTeamMemberByEmail(activeOwner.id, authUser.email);
      }
      if(found && String(found.userId || '') !== String(authUser.id)){
        found = await createOrUpdateTeamMember({
          ownerId: activeOwner.id,
          userId: authUser.id,
          email: authUser.email,
          name: found.name || authUser.user_metadata?.name || authUser.email?.split('@')[0] || 'Membre'
        });
      }
      if(!found){
        found = await createOrUpdateTeamMember({
          ownerId: activeOwner.id,
          userId: authUser.id,
          email: authUser.email,
          name: authUser.user_metadata?.name || authUser.email?.split('@')[0] || 'Membre'
        });
      }
      if(found.status==='disabled'){setErr('Accès équipe suspendu.'); return;}
      await saveSession(found.id);
      setMember(found);
    }catch(e){
      console.error('Erreur connexion équipe:',e);
      const msg=e?.message||'';
      if(msg.toLowerCase().includes('email not confirmed')){
        setErr("⚠ Votre email n’est pas encore confirmé. Vérifiez votre boîte mail puis utilisez « Mot de passe oublié » si besoin.");
      } else if(msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials')){
        setErr("⚠ Email ou mot de passe incorrect. Si vous venez de créer votre compte, vérifiez d'abord votre email de confirmation. Sinon utilisez « Mot de passe oublié ».");
      } else {
        setErr(msg||'Accès équipe introuvable ou suspendu.');
      }
    }finally{
      setSubmitting(false);
    }
  };

  const doForgotPassword=async()=>{
    if(!form.email){setErr('Entrez votre email pour recevoir le lien.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      const { error } = await supabaseClient.auth.resetPasswordForEmail(form.email.trim().toLowerCase(), {
        redirectTo: window.location.origin + window.location.pathname
      });
      if(error) throw error;
      setErr('✅ Email de réinitialisation envoyé. Vérifiez votre boîte mail.');
    }catch(e){
      setErr(e?.message||"Impossible d’envoyer l’email de réinitialisation.");
    }finally{
      setSubmitting(false);
    }
  };

  if(loading){
    return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}><div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',textAlign:'center',maxWidth:460,fontFamily:SS,color:C.stone}}>Chargement de l’accès équipe...</div></div>;
  }

  if(member){
    const apps=software.filter(sw=>getMemberSoftwareIds(member).includes(sw.id));
    return <>
      <div style={{minHeight:'100vh',background:C.dim,padding:'42px 24px'}}>
        <div style={{maxWidth:1180,margin:'0 auto'}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'26px 28px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',gap:18,flexWrap:'wrap',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              {resolvedOwner?.companyLogo?(<img src={resolvedOwner.companyLogo} alt='Logo entreprise' style={{width:62,height:62,objectFit:'contain',borderRadius:10,background:C.ivory,border:`1px solid ${C.linen}`,padding:8}}/>):(<div style={{width:62,height:62,borderRadius:10,background:C.ink,border:`1px solid ${C.gold}55`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:22,fontWeight:700,color:C.gold}}>{((resolvedOwner?.company)||'ON').slice(0,2).toUpperCase()}</div>)}
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Accès équipe</div>
                <div style={{fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink,marginBottom:4}}>Nos logiciels</div>
                <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6}}>Connecté en tant que <strong>{member.name}</strong> · accès limité au hub de {resolvedOwner?.company||'votre entreprise'}.</div>
              </div>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,marginBottom:3}}>Logiciels autorisés</div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ink}}>{apps.length}</div>
              </div>
              <button onClick={async()=>{try{await supabaseClient?.auth.signOut();}catch(e){} setMember(null);}} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>{t('logout')}</button>
              <InstallPWAButton style={{borderRadius:6,padding:'9px 12px',fontSize:10}}/>
            </div>
          </div>
          <TeamInstallCard owner={resolvedOwner||owner||{}}/>
          <SoftwareGrid apps={apps} showCommercialInfos={false}/>
          {apps.length===0&&<div style={{marginTop:18,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun logiciel ne vous a encore été attribué. Demandez au patron de vous donner accès depuis l'onglet <strong>Gérer mon équipe</strong>.</div>}
        </div>
      </div>
      {launchedSoftware&&<SoftwareLaunchModal software={launchedSoftware} onClose={()=>openSoftware(null)}/>}    
    </>;
  }

  return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{width:460,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
      <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Invitation équipe</div>
      <div style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,marginBottom:6}}>{resolvedOwner?.company?`Rejoindre ${resolvedOwner.company}`:'Accéder au hub salarié'}</div>
      <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6,marginBottom:18}}>Connectez-vous au hub salarié. Si votre compte n’est pas encore relié à une entreprise, entrez le code entreprise transmis par le patron.</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setMode('register')} style={{flex:1,background:mode==='register'?C.ink:'transparent',border:`1px solid ${mode==='register'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='register'?C.ivory:C.stone,cursor:'pointer'}}>Créer mon accès</button>
        <button onClick={()=>setMode('login')} style={{flex:1,background:mode==='login'?C.ink:'transparent',border:`1px solid ${mode==='login'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='login'?C.ivory:C.stone,cursor:'pointer'}}>Connexion</button>
      </div>
      {mode==='register'&&<div style={{marginBottom:12}}><TI label='Nom complet' value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>}
      <TI label='Email' value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type='email'/>
      <TI label='Mot de passe' value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} type='password' mb={10}/>
      <TI label='Code entreprise' value={form.companyCode} onChange={e=>setForm(p=>({...p,companyCode:e.target.value.toUpperCase()}))} placeholder='Ex : RUU-4821' mb={10}/>
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:12,color:C.red,marginBottom:12}}>{err}</div>}
      <button disabled={submitting} onClick={mode==='register'?doRegister:doLogin} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'11px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer',opacity:submitting?0.7:1}}>{submitting?'Chargement...':(mode==='register'?'Créer et accéder au hub':'Se connecter au hub')}</button>
      {mode==='login'&&<button disabled={submitting} onClick={doForgotPassword} style={{width:'100%',marginTop:8,background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 14px',fontFamily:SS,fontSize:10,fontWeight:600,letterSpacing:'0.06em',color:C.stone,cursor:'pointer'}}>Mot de passe oublié</button>}
      <div style={{marginTop:14,padding:'12px 14px',background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:8}}>
        <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Télécharger le hub</div>
        <div style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.6,marginBottom:10}}>Téléchargez directement l’application <strong>Oniq Hub</strong> pour accéder au hub depuis votre ordinateur.</div>
        <a href={ONIQ_HUB_DOWNLOAD_URL} target="_blank" rel="noopener noreferrer" style={{display:'block',width:'100%',background:C.ink,border:`1px solid ${C.ink}`,borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:C.ivory,cursor:'pointer',textDecoration:'none',textAlign:'center'}}>Télécharger l’application sur votre PC</a>
      </div>
    </div>
  </div>;
};

const Parrainage=({user})=>{
  const {t}=useLang();

          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.linen}`}}><span style={{fontFamily:SF,fontSize:13,fontWeight:600,color:C.ink}}>Top logiciels</span></div>
            <div style={{padding:"12px 16px"}}>
              {software.slice(0,4).map(s=>{const cnt=clients.filter(c=>c.subs.includes(s.id)).length;return(
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                  <span style={{fontSize:13}}>{s.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:SS,fontSize:11,fontWeight:600,color:C.ink}}>{s.name}</span><span style={{fontFamily:SS,fontSize:11,color:C.stone}}>{cnt}</span></div>
                    <div style={{height:3,background:C.linen,borderRadius:2,marginTop:3}}><div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${C.gold},${C.goldL})`,width:`${(cnt/Math.max(1,clients.length))*100}%`}}/></div>
                  </div>
                </div>
              );})}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const AdminClients=({users,setUsers,software,setView,setSelClient})=>{
  const clients=users.filter(u=>u.role!=="admin");
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({company:"",email:"",sector:""});
  const [clientsTab,setClientsTab]=useState("clients");
  const [userSearch,setUserSearch]=useState("");
  const [userResults,setUserResults]=useState([]);
  const [userSearchLoading,setUserSearchLoading]=useState(false);
  const [userSearchMsg,setUserSearchMsg]=useState("");
  const [roleUpdating,setRoleUpdating]=useState(null);
  const [resendLoading,setResendLoading]=useState(null);
  const [resendMsg,setResendMsg]=useState("");

  const filtered=clients.filter(c=>{const q=search.toLowerCase();return(c.company.toLowerCase().includes(q)||c.email.toLowerCase().includes(q))&&(filter==="all"||c.status===filter);});
  const add=()=>{if(!form.company||!form.email)return;setUsers(p=>[...p,{id:Date.now(),role:"client",name:form.company,company:form.company,email:form.email,password:"client",avatar:form.company.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(),subs:[],trials:{},since:new Date().toLocaleDateString("fr-FR",{month:"short",year:"numeric"}),status:"trial",sector:form.sector,referralCode:genCode(),referrals:0,referralCredit:0}]);setForm({company:"",email:"",sector:""});setShowAdd(false);};

  const searchUsers=async()=>{
    const q=userSearch.trim().toLowerCase();
    if(!q){setUserSearchMsg("Entrez un email, nom ou entreprise.");return;}
    setUserSearchLoading(true);setUserResults([]);setUserSearchMsg("");setResendMsg("");
    try{
      const merged=[];const seen=new Set();
      const push=(u)=>{const k=(u.email||u.id||'').toLowerCase();if(k&&!seen.has(k)){seen.add(k);merged.push(u);}};

      // 1) RPC auth.users — source principale (tous les inscrits Supabase)
      if(supabaseClient){
        try{
          // Récupérer les rôles ONIQ persistés
          let rolesMap={};
          try{
            const {data:rolesData}=await supabaseClient.from('user_roles').select('user_id,role');
            (rolesData||[]).forEach(r=>{rolesMap[r.user_id]=r.role;});
          }catch(e){}

          const {data,error}=await supabaseClient.rpc('search_auth_users_by_email',{search_email:q});
          if(!error&&data){
            data.forEach(r=>{
              // Priorité : user_roles > app_metadata > 'client'
              const role=rolesMap[r.id]||r.raw_app_meta_data?.role||'client';
              push({
                id:r.id,
                email:r.email||'',
                name:r.raw_user_meta_data?.full_name||r.raw_user_meta_data?.name||r.email||'',
                company:r.raw_user_meta_data?.company||r.raw_user_meta_data?.full_name||r.raw_user_meta_data?.name||r.email||'',
                role,
                avatar:(r.raw_user_meta_data?.full_name||r.raw_user_meta_data?.name||r.email||'?').slice(0,2).toUpperCase(),
                since:r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{month:'short',year:'numeric'}):'–',
                confirmed:!!r.email_confirmed_at,
                source:'auth'
              });
            });
          }
        }catch(e){}
      }

      // 2) State local (admins hardcodés)
      users.filter(u=>{const lq=q;return u.email?.toLowerCase().includes(lq)||u.name?.toLowerCase().includes(lq)||u.company?.toLowerCase().includes(lq);})
        .forEach(u=>push({id:u.id,email:u.email,name:u.name||u.company||u.email,company:u.company||u.name||u.email,role:u.role||'client',avatar:u.avatar||(u.company||u.email||'?').slice(0,2).toUpperCase(),since:u.since,confirmed:true,source:'local'}));

      if(supabaseClient){
        // 3) pending_registrations
        try{
          const {data}=await supabaseClient.from('pending_registrations')
            .select('user_id,email,company,name,sector,confirmed,created_at')
            .or(`email.ilike.%${q}%,company.ilike.%${q}%,name.ilike.%${q}%`).limit(30);
          (data||[]).forEach(r=>push({id:r.user_id,email:r.email||'',name:r.name||r.company||r.email||'',company:r.company||r.name||r.email||'',role:r.confirmed?'client':'inscrit',avatar:(r.company||r.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),since:r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{month:'short',year:'numeric'}):'–',confirmed:r.confirmed||false,source:'pending'}));
        }catch(e){}

        // 4) company_directory
        try{
          const {data}=await supabaseClient.from('company_directory')
            .select('owner_id,owner_email,owner_name,owner_company,owner_role,created_at')
            .or(`owner_email.ilike.%${q}%,owner_name.ilike.%${q}%,owner_company.ilike.%${q}%`).limit(30);
          (data||[]).forEach(r=>push({id:r.owner_id,email:r.owner_email||'',name:r.owner_name||r.owner_company||r.owner_email||'',company:r.owner_company||r.owner_name||r.owner_email||'',role:r.owner_role||'client',avatar:(r.owner_company||r.owner_name||r.owner_email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),since:r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{month:'short',year:'numeric'}):'–',confirmed:true,source:'directory'}));
        }catch(e){}

        // 5) profiles
        try{
          const {data}=await supabaseClient.from('profiles')
            .select('id,email,full_name,company,role,created_at')
            .or(`email.ilike.%${q}%,full_name.ilike.%${q}%,company.ilike.%${q}%`).limit(20);
          (data||[]).forEach(r=>push({id:r.id,email:r.email||'',name:r.full_name||r.email||'',company:r.company||r.full_name||r.email||'',role:r.role||'client',avatar:(r.full_name||r.email||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),since:r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{month:'short',year:'numeric'}):'–',confirmed:true,source:'profiles'}));
        }catch(e){}
      }

      setUserResults(merged);
      setUserSearchMsg(merged.length===0?"Aucun utilisateur trouvé. S'il vient de s'inscrire, son compte sera visible ici dès la prochaine connexion.":merged.length+" utilisateur(s) trouvé(s).");
    }catch(e){setUserSearchMsg("Erreur: "+e.message);}
    setUserSearchLoading(false);
  };

  const resendConfirmation=async(email)=>{
    if(!email||!supabaseClient)return;
    setResendLoading(email);setResendMsg("");
    try{
      const {error}=await supabaseClient.auth.resend({type:'signup',email});
      if(error)setResendMsg("Erreur: "+error.message);
      else setResendMsg("✓ Email renvoyé à "+email+". Vérifiez les spams.");
    }catch(e){setResendMsg("Erreur: "+e.message);}
    setResendLoading(null);
  };

  const assignRole=async(user,newRole)=>{
    setRoleUpdating(user.id||user.email);
    try{
      // Mise à jour locale state
      const existingLocal=users.find(u=>u.email?.toLowerCase()===user.email?.toLowerCase());
      if(existingLocal){setUsers(p=>p.map(u=>u.email?.toLowerCase()===user.email?.toLowerCase()?{...u,role:newRole}:u));}
      else{setUsers(p=>[...p,{id:user.id||Date.now(),role:newRole,name:user.name||user.email,company:user.company||user.name||user.email,email:user.email,avatar:user.avatar||'??',subs:[],trials:{},since:user.since||new Date().toLocaleDateString("fr-FR",{month:"short",year:"numeric"}),status:'active',sector:'',referralCode:genCode(),referrals:0,referralCredit:0}]);}

      if(supabaseClient&&user.id){
        // SOURCE PRINCIPALE : table user_roles (fonctionne pour tous les users auth)
        try{
          await supabaseClient.from('user_roles').upsert(
            {user_id:user.id, email:user.email||'', role:newRole, updated_at:new Date().toISOString()},
            {onConflict:'user_id'}
          );
        }catch(e){console.warn('user_roles upsert failed:',e);}

        // Tables secondaires (en bonus si l'utilisateur y existe)
        try{await supabaseClient.from('pending_registrations').update({role:newRole}).eq('email',user.email);}catch(e){}
        try{await supabaseClient.from('company_directory').update({owner_role:newRole}).eq('owner_id',String(user.id));}catch(e){}
        try{await supabaseClient.from('profiles').upsert({id:user.id,role:newRole,email:user.email},{onConflict:'id'});}catch(e){}
      }

      setUserResults(prev=>prev.map(u=>(u.id===user.id||u.email===user.email)?{...u,role:newRole}:u));
    }catch(e){alert("Erreur: "+e.message);}
    setRoleUpdating(null);
  };

  const confirmUserEmail=async(user)=>{
    // Marquer comme confirmé dans pending_registrations
    if(supabaseClient){
      try{await supabaseClient.from('pending_registrations').update({confirmed:true}).eq('email',user.email);}catch(e){}
    }
    setUserResults(prev=>prev.map(u=>(u.email===user.email)?{...u,confirmed:true,role:u.role==='inscrit'?'client':u.role}:u));
    alert("Marqué comme confirmé localement. Pour confirmer dans Supabase Auth, allez dans le dashboard Supabase → Authentication → Users.");
  };

  const ROLE_STYLES={admin:{bg:'#fdf4e0',color:'#9a6800',label:'⚙ Admin'},commercial:{bg:'#e8eef8',color:'#1a3f7a',label:'💼 Commercial'},client:{bg:'#f3f0ec',color:'#6b5f52',label:'👤 Client'},inscrit:{bg:'#eef0ff',color:'#4b5b9a',label:'✉ Email non confirmé'},'non-client':{bg:'#f0f0f0',color:'#888',label:'👤 Non-client'}};
  const getRoleStyle=(r)=>ROLE_STYLES[r]||ROLE_STYLES['non-client'];
  const tabBtn=(id,lbl)=>(<button onClick={()=>setClientsTab(id)} style={{padding:"8px 18px",borderRadius:5,border:clientsTab===id?'none':`1px solid ${C.linen}`,background:clientsTab===id?C.ink:'transparent',color:clientsTab===id?C.ivory:C.stone,fontFamily:SS,fontSize:11,fontWeight:700,cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.06em'}}>{lbl}</button>);

  return (
    <div>
      <PH section="Gestion" title="Clients & Utilisateurs" action={<button onClick={()=>setShowAdd(true)} style={{background:C.ink,border:"none",borderRadius:4,padding:"9px 18px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>+ Nouveau client</button>}/>
      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {tabBtn("clients","👥 Clients ("+clients.length+")")}
        {tabBtn("search","🔍 Recherche & rôles")}
      </div>

      {clientsTab==="clients"&&<>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div style={{flex:1,position:"relative"}}><span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.sand}}>⌕</span><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher…" style={{width:"100%",background:C.paper,border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px 12px 9px 30px",fontFamily:SS,fontSize:13,color:C.ink,outline:"none",boxSizing:"border-box"}}/></div>
          {["all","active","trial","overdue"].map(f=>(<button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.ink:"transparent",border:`1px solid ${filter===f?C.ink:C.linen}`,borderRadius:4,padding:"8px 13px",color:filter===f?C.ivory:C.stone,cursor:"pointer",fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>{{all:"Tous",active:"Actifs",trial:"Essai",overdue:"Retard"}[f]}</button>))}
        </div>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 2fr 1fr 1fr",padding:"9px 18px",background:C.dim,borderBottom:`1px solid ${C.linen}`,gap:12}}>
            {["Entreprise","Email","Secteur / Rôle","Logiciels","MRR","Statut"].map(h=><div key={h} style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:C.stone}}>{h}</div>)}
          </div>
          {filtered.map((c,i)=>(<div key={c.id}><div onClick={()=>{setSelClient(c);setView("a-client-detail");}} style={{display:"grid",gridTemplateColumns:"2fr 2fr 1fr 2fr 1fr 1fr",padding:"12px 18px",gap:12,cursor:"pointer",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background=C.dim} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><Mono i={c.avatar} size={26}/><span style={{fontFamily:SS,fontWeight:600,fontSize:12,color:C.ink}}>{c.company}</span></div>
            <div style={{fontFamily:SS,fontSize:11,color:C.stone}}>{c.email}</div>
            <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}><span style={{fontFamily:SS,fontSize:11,color:C.stone}}>{c.sector||"–"}</span><span style={{background:getRoleStyle(c.role).bg,color:getRoleStyle(c.role).color,borderRadius:10,padding:'0 6px',fontSize:9,fontWeight:700}}>{getRoleStyle(c.role).label}</span></div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{c.subs.slice(0,2).map(id=>{const sw=software.find(x=>x.id===id);return sw?<span key={id} style={{background:C.goldDim,color:C.gold,fontSize:9,padding:"2px 7px",borderRadius:2,fontWeight:700}}>{sw.name}</span>:null;})} {c.subs.length>2&&<span style={{color:C.stone,fontSize:10}}>+{c.subs.length-2}</span>}</div>
            <div style={{fontFamily:SF,fontWeight:700,fontSize:13,color:C.ink}}>{getMrr(c.subs)} €</div>
            <Badge status={c.status}/>
          </div>{i<filtered.length-1&&<HR s={{margin:"0 18px"}}/>}</div>))}
          {filtered.length===0&&<div style={{padding:'32px',textAlign:'center',fontFamily:SS,fontSize:12,color:C.stone}}>Aucun client trouvé.</div>}
        </div>
      </>}

      {clientsTab==="search"&&<>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:8,padding:'22px 24px',marginBottom:16}}>
          <div style={{fontFamily:SF,fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Rechercher un utilisateur</div>
          <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginBottom:16,lineHeight:1.5}}>
            Recherche dans <strong>tous les inscrits</strong> — confirmés ou non. Les utilisateurs apparaissent dès leur inscription.
          </div>
          <div style={{display:'flex',gap:10,marginBottom:10}}>
            <div style={{flex:1,position:'relative'}}><span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:C.sand}}>⌕</span><input value={userSearch} onChange={e=>setUserSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchUsers()} placeholder="Email, nom ou entreprise…" style={{width:'100%',background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:4,padding:'10px 12px 10px 32px',fontFamily:SS,fontSize:13,color:C.ink,outline:'none',boxSizing:'border-box'}}/></div>
            <button onClick={searchUsers} disabled={userSearchLoading} style={{background:C.ink,border:'none',borderRadius:4,padding:'10px 22px',fontFamily:SS,fontSize:10,fontWeight:700,color:C.ivory,cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase',opacity:userSearchLoading?0.6:1,flexShrink:0}}>{userSearchLoading?'Recherche…':'Rechercher'}</button>
          </div>
          {userSearchMsg&&<div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:6}}>{userSearchMsg}</div>}

          {/* Bloc renvoyer email — si email saisi */}
          {userSearch.trim().includes('@')&&userResults.length===0&&!userSearchLoading&&(
            <div style={{background:'#fdf8ee',border:'1px solid #e8d8a0',borderRadius:6,padding:'14px 16px',marginTop:12}}>
              <div style={{fontFamily:SS,fontSize:11,fontWeight:700,color:'#9a6800',marginBottom:6}}>⚠ Utilisateur non trouvé ?</div>
              <div style={{fontFamily:SS,fontSize:11,color:'#7a5c00',marginBottom:10,lineHeight:1.5}}>
                Si l'utilisateur s'est inscrit sans confirmer son email, renvoyez-lui le lien de confirmation :
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <button onClick={()=>resendConfirmation(userSearch.trim())} disabled={!!resendLoading}
                  style={{background:C.gold,border:'none',borderRadius:4,padding:'8px 16px',fontFamily:SS,fontSize:10,fontWeight:700,color:C.ink,cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase',opacity:resendLoading?0.5:1}}>
                  {resendLoading?'Envoi…':'✉ Renvoyer la confirmation'}
                </button>
                <a href="https://supabase.com/dashboard/project/kxdxxhepewziazfnfnkq/auth/users" target="_blank" rel="noopener noreferrer" style={{fontFamily:SS,fontSize:10,color:'#3A6EA5',textDecoration:'underline'}}>Confirmer dans Supabase →</a>
              </div>
              {resendMsg&&<div style={{fontFamily:SS,fontSize:11,color:resendMsg.startsWith('✓')?C.green:C.red,marginTop:8,fontWeight:600}}>{resendMsg}</div>}
            </div>
          )}
        </div>

        {userResults.length>0&&(
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 1fr',padding:'9px 18px',background:C.dim,borderBottom:`1px solid ${C.linen}`,gap:12}}>
              {['Utilisateur','Email','Statut / Rôle','Actions'].map(h=><div key={h} style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:C.stone}}>{h}</div>)}
            </div>
            {userResults.map((u,i)=>{
              const rs=getRoleStyle(u.role);
              const isUpdating=roleUpdating===u.id||roleUpdating===u.email;
              return(
                <div key={u.id||u.email}>
                  <div style={{display:'grid',gridTemplateColumns:'2fr 2fr 1fr 1fr',padding:'12px 18px',gap:12,alignItems:'center',background:i%2===0?'transparent':C.dim}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <Mono i={u.avatar||'??'} size={28}/>
                      <div>
                        <div style={{fontFamily:SS,fontWeight:600,fontSize:12,color:C.ink}}>{u.name||u.email}</div>
                        {u.company&&u.company!==u.email&&u.company!==u.name&&<div style={{fontFamily:SS,fontSize:10,color:C.stone}}>{u.company}</div>}
                        <div style={{fontFamily:SS,fontSize:9,color:u.confirmed===false?'#9a6800':C.sand}}>{u.confirmed===false?'✉ Email non confirmé':u.since?'Inscrit '+u.since:''}</div>
                      </div>
                    </div>
                    <div style={{fontFamily:SS,fontSize:11,color:C.stone,wordBreak:'break-all'}}>{u.email}</div>
                    <div><span style={{background:rs.bg,color:rs.color,borderRadius:10,padding:'2px 9px',fontSize:9,fontWeight:700}}>{rs.label}</span></div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {u.confirmed===false&&(
                        <button onClick={()=>resendConfirmation(u.email)} disabled={resendLoading===u.email}
                          style={{padding:'4px 8px',borderRadius:3,border:'1px solid #e8d8a0',background:'#fdf8ee',color:'#9a6800',fontFamily:SS,fontSize:8,fontWeight:700,cursor:'pointer',textTransform:'uppercase'}}>
                          {resendLoading===u.email?'…':'✉ Renvoyer'}
                        </button>
                      )}
                      {['admin','commercial','client'].map(role=>(
                        <button key={role} disabled={u.role===role||isUpdating} onClick={()=>assignRole(u,role)}
                          style={{padding:'4px 9px',borderRadius:3,border:`1px solid ${u.role===role?getRoleStyle(role).color:C.linen}`,background:u.role===role?getRoleStyle(role).bg:'transparent',color:u.role===role?getRoleStyle(role).color:C.stone,fontFamily:SS,fontSize:9,fontWeight:700,cursor:u.role===role?'default':'pointer',opacity:isUpdating?0.5:1,textTransform:'uppercase',letterSpacing:'0.06em'}}>
                          {isUpdating?'…':{admin:'⚙ Admin',commercial:'💼 Comm.',client:'👤 Client'}[role]}
                        </button>
                      ))}
                    </div>
                  </div>
                  {resendMsg&&resendLoading===null&&userResults[i].email===userSearch.trim()&&<div style={{padding:'4px 18px 8px',fontFamily:SS,fontSize:10,color:resendMsg.startsWith('✓')?C.green:C.red}}>{resendMsg}</div>}
                  {i<userResults.length-1&&<HR s={{margin:'0 18px'}}/>}
                </div>
              );
            })}
          </div>
        )}
      </>}

      {showAdd&&(
        <Overlay title="Nouveau client" onClose={()=>setShowAdd(false)}>
          <TI label="Nom de l'entreprise" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))}/>
          <TI label="Email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type="email"/>
          <div style={{marginBottom:16}}><FL label="Secteur"/>
            <select value={form.sector} onChange={e=>setForm(p=>({...p,sector:e.target.value}))} style={{width:"100%",background:C.paper,border:`1px solid ${C.linen}`,borderRadius:4,padding:"11px 14px",fontFamily:SS,fontSize:13,color:C.ink,outline:"none"}}>
              <option value="">–</option>{SECTORS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>

// ── Admin Validations — leads en attente de confirmation paiement ───────────
const AdminValidations=({software,users})=>{
  const [crm,setCrm]=useState(()=>getCRM());
  const [confirmedComms,setConfirmedComms]=useState([]);
  useEffect(()=>{
    if(!supabaseClient)return;
    supabaseClient.from('commissions').select('*').order('paid_at',{ascending:false}).then(({data})=>{if(data)setConfirmedComms(data);});
  },[]);
  const save=(d)=>{saveCRM(d);setCrm({...d});if(supabaseClient){supabaseClient.auth.getSession().then(({data})=>{const uid=data?.session?.user?.id;if(uid)saveCRMToCloud(uid,d);});}};

  const pendingLeads=crm.leads.filter(l=>l.pendingConfirmation&&l.stage==='rdv_fait');
  const concludedLeads=crm.leads.filter(l=>l.stage==='conclu');

  const confirmPayment=async(lead)=>{
    const sw=software.find(s=>s.slug===lead.logiciel);
    const monthlyHT=sw?.price||lead.valeur||0;
    const commAmount=calcCommissionAmount(monthlyHT);
    const co=crm.commerciaux.find(c=>c.id===lead.commercial);
    // Insérer dans la table commissions Supabase
    if(supabaseClient){
      await supabaseClient.from('commissions').insert({
        commercial_id:lead.commercial,
        commercial_name:co?.nom||'',
        lead_id:lead.id,
        client_email:lead.email||lead.entreprise,
        software_slug:lead.logiciel,
        amount_ht:monthlyHT,
        commission_amount:commAmount,
        stripe_invoice_id:'manual-'+lead.id,
        paid_at:new Date().toISOString(),
        status:'confirmed'
      });
    }
    // Passer le lead en conclu
    const d={...crm};
    const l=d.leads.find(x=>x.id===lead.id);
    if(l){l.stage='conclu';l.pendingConfirmation=false;l.signedAt=crmNow();l.history.push({stage:'conclu',date:crmNow(),note:'Paiement confirmé par admin'});}
    save(d);
    setConfirmedComms(prev=>[...prev,{commercial_id:lead.commercial,lead_id:lead.id,commission_amount:commAmount,amount_ht:monthlyHT,paid_at:new Date().toISOString()}]);
  };

  const rejectRequest=(lead)=>{
    const d={...crm};
    const l=d.leads.find(x=>x.id===lead.id);
    if(l){l.pendingConfirmation=false;l.history.push({stage:'rdv_fait',date:crmNow(),note:'Demande refusée par admin'});}
    save(d);
  };

  const co=(id)=>crm.commerciaux.find(c=>c.id===id);
  const sw=(slug)=>software.find(s=>s.slug===slug);

  return React.createElement('div',{style:{padding:isMob()?'16px 14px':'28px 36px'}},
    React.createElement('div',{style:{fontFamily:SS,fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:4}},'Admin'),
    React.createElement('h1',{style:{margin:0,fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink,marginBottom:6}},'Validations & Commissions'),
    React.createElement('p',{style:{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:28,lineHeight:1.6}},'Les commissions sont automatiquement créditées via le webhook Stripe. En cas de besoin, vous pouvez valider manuellement ci-dessous.'),

    // Section en attente
    React.createElement('div',{style:{marginBottom:32}},
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16}},
        React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink}},'⏳ En attente de validation'),
        pendingLeads.length>0&&React.createElement('div',{style:{background:'#fdf4e0',color:'#9a6800',border:'1px solid #f0d080',borderRadius:20,padding:'2px 10px',fontFamily:SS,fontSize:11,fontWeight:700}},pendingLeads.length)
      ),
      pendingLeads.length===0
        ?React.createElement('div',{style:{fontFamily:SS,fontSize:12,color:C.stone,padding:'24px',textAlign:'center',background:C.dim,borderRadius:8}},'✅ Aucune demande en attente')
        :React.createElement('div',{style:{display:'grid',gap:12}},
          pendingLeads.map(l=>React.createElement('div',{key:l.id,style:{background:C.paper,border:'1px solid #f0d080',borderRadius:10,padding:'18px 20px',borderLeft:'4px solid #9a6800'}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}},
              React.createElement('div',null,
                React.createElement('div',{style:{fontFamily:SF,fontSize:15,fontWeight:700,color:C.ink,marginBottom:3}},l.entreprise),
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone}},l.contact+(l.email?' · '+l.email:'')+(l.tel?' · '+l.tel:'')),
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone,marginTop:4}},
                  'Logiciel : '+(sw(l.logiciel)?.name||l.logiciel)+' · '+(sw(l.logiciel)?.price||l.valeur||0)+'€/mois'
                ),
                co(l.commercial)&&React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:'#9a6800',fontWeight:600,marginTop:4}},'Commercial : '+co(l.commercial).nom),
                React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:'#1e6641',marginTop:8}},'Commission à verser : '+calcCommissionAmount(sw(l.logiciel)?.price||l.valeur||0).toLocaleString("fr-FR")+'€')
              ),
              React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
                React.createElement('button',{onClick:()=>confirmPayment(l),style:{padding:'10px 20px',background:'#1e6641',border:'none',borderRadius:7,fontFamily:SS,fontSize:11,fontWeight:700,color:'#fff',cursor:'pointer',letterSpacing:'0.04em'}},'✅ Confirmer le paiement'),

    React.createElement('div',null,

      confirmedComms.length===0
        ?React.createElement('div',{style:{fontFamily:SS,fontSize:12,color:C.stone,padding:'24px',textAlign:'center',background:C.dim,borderRadius:8}},'Aucune commission confirmée pour l\'instant')
        :React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,overflow:'hidden'}},
          React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:SS,fontSize:12}},
            React.createElement('thead',null,
              React.createElement('tr',{style:{background:C.dim,borderBottom:`1px solid ${C.linen}`}},
                ['Date','Client','Logiciel','Commercial','MRR HT','Commission','Source'].map((h,i)=>
                  React.createElement('th',{key:i,style:{padding:'10px 14px',textAlign:i>3?'right':'left',fontWeight:700,fontSize:9,textTransform:'uppercase',letterSpacing:'0.1em',color:C.stone}},h)
                )
              )
            ),
            React.createElement('tbody',null,
              confirmedComms.map((c,i)=>React.createElement('tr',{key:i,style:{borderBottom:`1px solid ${C.linen}`,background:i%2?C.dim:'transparent'}},
                React.createElement('td',{style:{padding:'10px 14px',color:C.stone,fontSize:10}},new Date(c.paid_at).toLocaleDateString("fr-FR")),
                React.createElement('td',{style:{padding:'10px 14px',fontWeight:600,color:C.ink}},c.client_email||'—'),

                React.createElement('td',{style:{padding:'10px 14px',color:'#9a6800',fontWeight:600}},c.commercial_name||co(c.commercial_id)?.nom||'—'),

  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='ONIQ-';
  for(let i=0;i<3;i++){for(let j=0;j<4;j++)code+=chars[Math.floor(Math.random()*chars.length)];if(i<2)code+='-';}
  const entry={code,softwareSlug,durationDays,note,createdAt:new Date().toISOString(),usedBy:null,usedAt:null};
  const codes=getTrialCodes();
  codes.push(entry);
  saveTrialCodes(codes);
  // Aussi sauvegarder dans Supabase si disponible
  if(supabaseClient){
    supabaseClient.from('promo_codes').insert({code,software_slug:softwareSlug,duration_days:durationDays,note,created_at:entry.createdAt,used_by:null,used_at:null}).then(({error})=>{
      if(error)console.warn('Save trial code to Supabase failed:',error.message);
    });
  }
  return entry;
}

async function redeemTrialCode(codeStr, userId, userEmail){
  const codeUp=codeStr.trim().toUpperCase();
  // Chercher dans localStorage
  let codes=getTrialCodes();
  let found=codes.find(c=>c.code===codeUp);
  // Si pas trouvé localement, chercher dans Supabase
  if(!found&&supabaseClient){
    try{
      const {data}=await supabaseClient.from('promo_codes').select('*').eq('code',codeUp).maybeSingle();
      if(data) found={code:data.code,softwareSlug:data.software_slug,durationDays:data.duration_days||7,usedBy:data.used_by,usedAt:data.used_at};
    }catch(e){}
  }
  if(!found) return {ok:false,msg:"Code invalide. Vérifiez votre saisie."};
  if(found.usedBy) return {ok:false,msg:"Ce code a déjà été utilisé."};
  // Activer l'essai
  found.usedBy=userEmail||userId;
  found.usedAt=new Date().toISOString();
  // Mettre à jour localStorage
  codes=getTrialCodes();
  const idx=codes.findIndex(c=>c.code===codeUp);
  if(idx>=0){codes[idx]=found;saveTrialCodes(codes);}
  // Mettre à jour Supabase
  if(supabaseClient){
    supabaseClient.from('promo_codes').update({used_by:found.usedBy,used_at:found.usedAt}).eq('code',codeUp).then(()=>{});
    // Ajouter l'accès software_access
    const accessEnd=new Date();
    accessEnd.setDate(accessEnd.getDate()+(found.durationDays||7));
    supabaseClient.from('software_access').upsert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()},{onConflict:'user_id,software_slug'}).then(({error})=>{
      if(error) supabaseClient.from('software_access').insert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()}).then(()=>{});
    });
  }
  return {ok:true,slug:found.softwareSlug,days:found.durationDays||7,msg:`Essai de ${found.durationDays||7} jours activé !`};
}

// Panel Admin : composant Codes d'essai
const AdminCodes=({software})=>{
  const [codes,setCodes]=useState(()=>getTrialCodes());
  useEffect(()=>{
    if(!supabaseClient)return;
    supabaseClient.from('promo_codes').select('*').order('created_at',{ascending:false}).then(({data,error})=>{
      if(error||!data||data.length===0)return;
      const mapped=data.map(d=>({code:d.code,softwareSlug:d.software_slug,durationDays:d.duration_days||7,note:d.note||'',createdAt:d.created_at,usedBy:d.used_by||null,usedAt:d.used_at||null}));
      const localCodes=getTrialCodes();
      const merged=Object.values([...localCodes,...mapped].reduce((acc,c)=>{acc[c.code]=c;return acc},{}));
      saveTrialCodes(merged);
      setCodes(merged);
    });
  },[]);
  const [selSw,setSelSw]=useState(software[0]?.slug||'batimanager');
  const [days,setDays]=useState(7);
  const [note,setNote]=useState('');
  const [copied,setCopied]=useState(null);
  const [nbGen,setNbGen]=useState(1);

  const [genBy,setGenBy]=useState('Admin');
  const generate=()=>{
    const newCodes=[];
    for(let i=0;i<nbGen;i++){
      const c=generateTrialCode(selSw,days,note);
      // Enrichir avec le commercial qui génère
      const allCodes=getTrialCodes();
      const found=allCodes.find(x=>x.code===c);
      if(found){found.generatedBy=genBy;found.generatedAt=new Date().toISOString();saveTrialCodes(allCodes);}
      newCodes.push(c);
    }
    setCodes(getTrialCodes());

// ── Persistance des abonnements dans Supabase ──
async function loadUserSubs(userId, softwareList){
  if(!supabaseClient||!userId)return [];
  try{
    const {data,error}=await supabaseClient.from("software_access").select("software_slug,access_end").eq("user_id",userId);
    console.log('☁ loadUserSubs result:',{data,error,userId});
    if(error||!data)return [];
    const now=new Date();
    const activeSlugs=data.filter(r=>new Date(r.access_end)>now).map(r=>r.software_slug);
    const ids=softwareList.filter(s=>activeSlugs.includes(s.slug)).map(s=>s.id);
    console.log('☁ Active subs:',activeSlugs,'→ IDs:',ids);
    return ids;
  }catch(e){console.warn('loadUserSubs error:',e);return []}
}

async function saveUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId){console.warn('saveUserSub: missing client or userId');return}
  try{
    const accessEnd=new Date();
    accessEnd.setFullYear(accessEnd.getFullYear()+10);
    // Essayer d'abord un upsert
    const {data,error}=await supabaseClient.from("software_access").upsert({
      user_id:userId,
      software_slug:softwareSlug,
      access_end:accessEnd.toISOString()
    },{onConflict:'user_id,software_slug'});
    if(error){
      console.warn('☁ saveUserSub upsert failed, trying insert:',error.message);
      // Fallback: essayer un simple insert
      const {error:err2}=await supabaseClient.from("software_access").insert({
        user_id:userId,
        software_slug:softwareSlug,
        access_end:accessEnd.toISOString()
      });
      if(err2) console.error('☁ saveUserSub insert also failed:',err2.message);
      else console.log('☁ saveUserSub insert OK for',softwareSlug);
    } else {
      console.log('☁ saveUserSub OK for',softwareSlug);
    }
  }catch(e){console.error('saveUserSub error:',e)}
}

async function removeUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId)return;
  try{
    await supabaseClient.from("software_access").delete().eq("user_id",userId).eq("software_slug",softwareSlug);
  }catch(e){console.warn('removeUserSub error:',e)}
}

function App() {

  useEffect(()=>{if(view&&view!=='landing'&&!view.startsWith('pub-')){try{localStorage.setItem('oniq_view',view);}catch(e){}};},[view]);

  const [devis,setDevis]=useState(DEVIS_DB);

  const [selClient,setSelClient]=useState(null);

  const [showAuth,setShowAuth]=useState(false);

  const [selSector,setSelSector]=useState("");
  const teamParams=new URLSearchParams(window.location.search);
  const teamMode=teamParams.get('team')==='1';
  const teamToken=teamParams.get('t')||'';
  const [teamInvite,setTeamInvite]=useState(null);
  const [teamOwner,setTeamOwner]=useState(null);
  const [teamLoading,setTeamLoading]=useState(false);
  const [recoveryMode,setRecoveryMode]=useState(false);

  useEffect(()=>{
    let active=true;
    async function loadTeamContext(){
      if(!teamMode || !teamToken){
        if(active){setTeamInvite(null);setTeamOwner(null);setTeamLoading(false);}
        return;
      }
      setTeamLoading(true);
      try{
        const invite=await getTeamInviteByToken(teamToken);
        if(!active) return;
        setTeamInvite(invite||null);
        if(!invite){
          setTeamOwner(null);
          setTeamLoading(false);
          return;
        }

        const fallback=users.find(u=>String(u.id)===String(invite.owner_id) || (invite.owner_email && u.email===invite.owner_email)) || USERS_DB.find(u=>String(u.id)===String(invite.owner_id) || (invite.owner_email && u.email===invite.owner_email)) || {};
        const baseOwner={
          id:invite.owner_id,
          email:invite.owner_email||fallback.email||'',
          company:invite.owner_company||fallback.company||'Entreprise',
          companyLogo:invite.owner_logo_url||fallback.companyLogo||'',
          subs:fallback.subs||[]
        };

        setTeamOwner(baseOwner);

        const ownerSubs=invite.owner_id?await loadUserSubs(invite.owner_id, SW_DB):[];
        let companyLogo = baseOwner.companyLogo || '';
        try{
          if(supabaseClient && invite.owner_id){
            const { data, error } = await supabaseClient
              .from('user_profiles')
              .select('company_logo_url')
              .eq('user_id', invite.owner_id)
              .maybeSingle();
            if(!error && data?.company_logo_url){
              companyLogo = data.company_logo_url;
            }
          }
        }catch(e){
          console.warn('Logo fetch error:', e);
        }

        if(!active) return;
        setTeamOwner({
          ...baseOwner,
          companyLogo:companyLogo,
          subs:ownerSubs.length?ownerSubs:(baseOwner.subs||[])
        });
      }catch(e){
        console.warn('loadTeamContext error:', e);
      }finally{
        if(active) setTeamLoading(false);
      }
    }
    loadTeamContext();
    return ()=>{active=false;};
  },[teamMode,teamToken,users]);

  useEffect(()=>{
    const detectRecovery=()=>{
      const hashParams=new URLSearchParams((window.location.hash||'').replace(/^#/,''));
      const searchParams=new URLSearchParams(window.location.search);
      const isRecovery=hashParams.get('type')==='recovery' || searchParams.get('type')==='recovery' || !!hashParams.get('access_token');
      setRecoveryMode(isRecovery);
    };
    detectRecovery();
    window.addEventListener('hashchange',detectRecovery);
    return ()=>window.removeEventListener('hashchange',detectRecovery);
  },[]);

  useEffect(()=>{
    let mounted=true;
    async function restoreSession(){
      if(!supabaseClient) return;
      const { data, error } = await supabaseClient.auth.getSession();
      if(error){console.error("Erreur session:", error);return;}
      const authUser=data?.session?.user;
      if(!authUser || !mounted) return;
      const existing=users.find(u=>u.email===authUser.email)||USERS_DB.find(u=>u.email===authUser.email)||null;
      const mapped=mapAuthUserToDemoUser(authUser,existing);
      // Charger le rôle depuis user_roles
      try{
        const {data:roleData}=await supabaseClient.from('user_roles').select('role').eq('user_id',authUser.id).maybeSingle();
        if(roleData?.role) mapped.role=roleData.role;
      }catch(e){}
      // Charger les abonnements depuis Supabase
      const cloudSubs=await loadUserSubs(authUser.id, SW_DB);
      if(cloudSubs.length>0) mapped.subs=cloudSubs;
      setUser(mapped);
      setUsers(prev=>{
        const ex=prev.find(x=>String(x.id)===String(mapped.id)||x.email===mapped.email);
        return ex?prev.map(x=>(String(x.id)===String(ex.id)||x.email===mapped.email)?{...ex,...mapped}:x):[...prev,mapped];
      });
    }
    restoreSession();
    return ()=>{mounted=false;};
  },[]);

  // ═══ Gérer le retour Stripe après paiement ═══
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const paymentStatus=params.get('payment');
    if(paymentStatus==='success'){
      const pending=JSON.parse(localStorage.getItem('oniq_pending_subs')||'null');
      const waitAndRefresh=async()=>{
        try{
          if(user?.id){
            await syncSubsFromCloud(user.id, SW_DB, setUser, setUsers);
          }
        }catch(e){
          console.warn('Stripe refresh error:',e);
        }finally{
          try{localStorage.removeItem('oniq_pending_subs')}catch(e){}
          window.history.replaceState({},'',window.location.pathname);
        }
      };
      setTimeout(waitAndRefresh, 2500);
      if(pending?.cart?.length){
        console.log('Retour Stripe détecté, attente de confirmation serveur…');
      }
    } else if(paymentStatus==='cancel'){
      try{localStorage.removeItem('oniq_pending_subs')}catch(e){}
      window.history.replaceState({},'',window.location.pathname);
    }
  },[user?.id]);

  useEffect(()=>{
    if(!supabaseClient) return;
    const { data: sub } = supabaseClient.auth.onAuthStateChange((event, session)=>{
      if(event==='PASSWORD_RECOVERY') setRecoveryMode(true);
      const authUser=session?.user;
      if(authUser){
        if(!authUser.email_confirmed_at && authUser.confirmation_sent_at){
          // Inscrit mais pas confirmé — bloquer l'accès
          if(supabaseClient) supabaseClient.auth.signOut();
          return;
        }
        const existing=users.find(u=>u.email===authUser.email)||USERS_DB.find(u=>u.email===authUser.email)||null;
        const mapped=mapAuthUserToDemoUser(authUser,existing);
        // Charger le rôle depuis user_roles (non bloquant)
        supabaseClient.from('user_roles').select('role').eq('user_id',authUser.id).maybeSingle().then(({data:roleData})=>{
          if(roleData?.role) setUser(prev=>prev?{...prev,role:roleData.role}:prev);
        }).catch(()=>{});
        // Charger les subs en arrière-plan (non bloquant)
        loadUserSubs(authUser.id, SW_DB).then(cloudSubs=>{
          if(cloudSubs.length>0){
            mapped.subs=cloudSubs;
            setUser(prev=>prev&&String(prev.id)===String(mapped.id)?{...prev,subs:cloudSubs}:prev);
          }
        }).catch(()=>{});
        setUser(mapped);
        setUsers(prev=>{
          const ex=prev.find(x=>String(x.id)===String(mapped.id)||x.email===mapped.email);
          return ex?prev.map(x=>(String(x.id)===String(ex.id)||x.email===mapped.email)?{...ex,...mapped}:x):[...prev,mapped];
        });
      } else {
        setUser(null);
      }
    });
    return ()=>sub?.subscription?.unsubscribe?.();
  },[]);

  const openAuth=(mode)=>{setAuthMode(mode);setShowAuth(true);};

  const login=(u,isNew)=>{
    setUser(u);
    setUsers(p=>{
      const ex=p.find(x=>String(x.id)===String(u.id)||x.email===u.email);
      return ex?p.map(x=>(String(x.id)===String(ex.id)||x.email===u.email)?{...ex,...u}:x):[...p,u];
    });
    try{localStorage.setItem('oniq_has_visited','1');}catch(e){}
    setView(u.role==="admin"?"a-dashboard":u.role==="commercial"?"co-crm":u.role==="support"?"a-support":"c-market");

    if(isNew)setShowOnboard(true);
  };

  const logout=async()=>{
    try{
      if(supabaseClient) await supabaseClient.auth.signOut();
    }catch(e){
      console.error("Erreur déconnexion:", e);
    }
    setUser(null);
    setView("c-market");
  };

  const setUserSync=updater=>{
    setUser(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setUsers(us=>us.map(u=>String(u.id)===String(next.id)?next:u));
      return next;
    });

  useEffect(()=>{
    let mounted=true;
    async function loadSoftware(){
      if(!supabaseClient) return;

function formatAccessDate(value){
  if(!value) return "—";
  const d=new Date(value);
  if(Number.isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function isAccessActiveRecord(record){
  if(!record?.access_end) return false;
  const end=new Date(record.access_end);
  return !Number.isNaN(end.getTime()) && end>new Date();
}

async function getSoftwareAccessMap(userId){
  if(!supabaseClient || !userId) return {};
  const { data, error } = await supabaseClient
    .from("software_access")
    .select("software_slug,access_start,access_end,source,created_at")
    .eq("user_id", userId)
    .order("access_end", { ascending:false });

  if(error || !Array.isArray(data)){
    console.error("Erreur getSoftwareAccessMap:", error);
    return {};
  }

  const out={};
  data.forEach(row=>{
    if(row?.software_slug && !out[row.software_slug]) out[row.software_slug]=row;
  });
  return out;
}

const SUPPORT_LS_KEY='oniq_support_conv_id';

async function dbSaveConv(convId, messages, status, userInfo){
  if(!supabaseClient) return null;
  // Récupérer le token si dispo
  let headers={'Content-Type':'application/json'};
  try{
    const {data:s}=await supabaseClient.auth.getSession();
    if(s?.session?.access_token) headers['Authorization']=`Bearer ${s.session.access_token}`;
  }catch(e){}

  const payload={
    messages,
    status,
    updated_at:new Date().toISOString(),
    ...(userInfo||{})
  };
  try{
    if(convId){
      const {error}=await supabaseClient.from('support_conversations').update(payload).eq('id',convId);
      if(error) console.warn('update conv',error.message);
      return convId;
    } else {
      const {data,error}=await supabaseClient.from('support_conversations')
        .insert({...payload, created_at:new Date().toISOString()})
        .select('id').single();
      if(error){console.warn('insert conv',error.message);return null;}
      return data?.id||null;
    }
  }catch(e){console.warn('dbSaveConv',e);return null;}
}

function AdminSupport({user}){
  const [convs,setConvs]=useState([]);
  const [selConv,setSelConv]=useState(null);
  const [agentMsg,setAgentMsg]=useState('');
  const [sending,setSending]=useState(false);
  const [filter,setFilter]=useState('all');
  const msgEndRef=useRef(null);

  useEffect(()=>{loadConvs();const iv=setInterval(loadConvs,6000);return()=>clearInterval(iv);},[]);

  useEffect(()=>{
    if(selConv){const fresh=convs.find(c=>c.id===selConv.id);if(fresh)setSelConv(fresh);}
  },[convs]);

  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:'smooth'});},[selConv?.messages]);

  async function loadConvs(){
    if(!supabaseClient)return;
    try{
      const {data}=await supabaseClient.from('support_conversations')
        .select('*').order('updated_at',{ascending:false}).limit(100);
      if(Array.isArray(data)) setConvs(data.map(r=>({...r,messages:Array.isArray(r.messages)?r.messages:[]})));
    }catch(e){}
  }

  async function sendAgentReply(){
    if(!agentMsg.trim()||!selConv||sending)return;
    setSending(true);
    const msg={role:'agent',content:agentMsg.trim(),ts:Date.now(),author:user?.name||user?.email||'Agent'};
    const updated=[...(selConv.messages||[]),msg];

                      <div style={{fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.user_name||c.user_email||'Visiteur'}</div>
                      <div style={{fontFamily:SS,fontSize:10,color:C.stone,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{last?.content||'—'}</div>
                    </div>
                  </div>
                  <StatusPill s={c.status}/>
                </div>
                <div style={{fontFamily:SS,fontSize:9,color:C.sand,marginLeft:40}}>
                  {c.updated_at?new Date(c.updated_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Zone conversation */}
      {!selConv?(
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,background:C.ivory}}>
          <div style={{width:56,height:56,borderRadius:'50%',background:C.goldDim,border:`1px solid ${C.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>💬</div>
          <div style={{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink}}>Sélectionnez une conversation</div>
          <div style={{fontFamily:SS,fontSize:12,color:C.stone}}>Cliquez sur une conversation à gauche</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',background:'#fff'}}>
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.linen}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:C.goldDim,border:`1px solid ${C.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:14,fontWeight:700,color:C.gold}}>
                {(selConv.user_name||selConv.user_email||'?')[0].toUpperCase()}
              </div>
              <div>
                <div style={{fontFamily:SF,fontSize:14,fontWeight:700,color:C.ink}}>{selConv.user_name||selConv.user_email||'Visiteur'}</div>
                <div style={{fontFamily:SS,fontSize:10,color:C.stone}}>{selConv.user_email||''} · {(selConv.messages||[]).length} messages</div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <StatusPill s={selConv.status}/>
              {selConv.status!=='closed'
                ?<button onClick={()=>setStatus(selConv.id,'closed')} style={{background:'none',border:`1px solid ${C.linen}`,borderRadius:8,padding:'6px 14px',fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,cursor:'pointer'}}>Fermer</button>
                :<button onClick={()=>setStatus(selConv.id,'open')} style={{background:'none',border:`1px solid ${C.linen}`,borderRadius:8,padding:'6px 14px',fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,cursor:'pointer'}}>Rouvrir</button>
              }
            </div>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'20px',display:'flex',flexDirection:'column',gap:12,background:'#f9f9fb'}}>
            {(selConv.messages||[]).map((m,i)=>{
              const isUser=m.role==='user';
              const isAgent=m.role==='agent';
              return(
                <div key={i} style={{display:'flex',flexDirection:'column',alignItems:isUser?'flex-end':'flex-start',gap:3}}>
                  <div style={{fontFamily:SS,fontSize:9,fontWeight:600,color:C.stone,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                    {isUser?'Client':isAgent?`👤 ${m.author||'Agent'}`:'✦ ONIQ IA'}
                  </div>
                  <div style={{maxWidth:'68%',background:isUser?C.ink:isAgent?'#EEF2FF':'#fff',color:isUser?C.ivory:C.ink,padding:'10px 14px',borderRadius:isUser?'16px 16px 4px 16px':isAgent?'16px 16px 16px 4px':'16px 16px 16px 4px',fontFamily:SS,fontSize:13,lineHeight:1.6,boxShadow:'0 1px 3px rgba(0,0,0,0.06)',border:isAgent?'1px solid #C7D2FE':isUser?'none':`1px solid ${C.linen}`}}>
                    {m.content}
                  </div>
                  <div style={{fontFamily:SS,fontSize:9,color:C.sand}}>
                    {m.ts?new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}
                  </div>
                </div>
              );
            })}
            <div ref={msgEndRef}/>
          </div>
          {selConv.status!=='closed'&&(
            <div style={{padding:'14px 16px',borderTop:`1px solid ${C.linen}`,display:'flex',gap:8,flexShrink:0,background:'#fff'}}>
              <textarea value={agentMsg} onChange={e=>setAgentMsg(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAgentReply();}}}
                placeholder="Répondre… (Entrée pour envoyer, Maj+Entrée pour saut de ligne)"
                style={{flex:1,background:C.dim,border:`1px solid ${C.linen}`,borderRadius:10,padding:'10px 14px',fontFamily:SS,fontSize:13,resize:'none',minHeight:44,maxHeight:120,outline:'none',color:C.ink,lineHeight:1.5}}
              />
              <button onClick={sendAgentReply} disabled={sending||!agentMsg.trim()}
                style={{background:C.gold,border:'none',borderRadius:10,width:44,height:44,cursor:'pointer',color:C.ink,fontSize:16,opacity:sending||!agentMsg.trim()?0.35:1,display:'flex',alignItems:'center',justifyContent:'center',alignSelf:'flex-end'}}>▶</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
