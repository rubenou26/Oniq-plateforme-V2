// WIDGET CHAT LIVE — style Intercom, visible par tous
// ══════════════════════════════════════════════════════════════
function LiveChatWidget({user, canAccessSupport}){
  const [open,setOpen]=useState(false);
  const [screen,setScreen]=useState('home');
  const [msgs,setMsgs]=useState([{role:'bot',content:'Bonjour 👋 Je suis l\'assistant IA d\'ONIQ. Je suis là pour répondre à toutes vos questions sur notre plateforme et nos logiciels.\n\nSi je ne parviens pas à répondre à votre question, je vous mettrai en relation avec un agent humain. Comment puis-je vous aider ?',ts:Date.now()}]);
  const [input,setInput]=useState('');
  const [busy,setBusy]=useState(false);
  const [convId,setConvId]=useState(()=>{ try{return localStorage.getItem(SUPPORT_LS_KEY)||null;}catch(e){return null;}});
  const [escalated,setEscalated]=useState(false);
  const [unread,setUnread]=useState(0);
  const [tickets,setTickets]=useState([]);
  const [selTicket,setSelTicket]=useState(null);
  const [ticketsLoading,setTicketsLoading]=useState(false);
  const msgEndRef=useRef(null);
  const inputRef=useRef(null);
  // Ref miroir de msgs pour éviter les closures stale dans les effects/intervals
  const msgsRef=useRef(msgs);
  useEffect(()=>{msgsRef.current=msgs;},[msgs]);
  const convIdRef=useRef(convId);
  useEffect(()=>{convIdRef.current=convId;},[convId]);

  // Recharger conv existante + tickets au montage
  useEffect(()=>{
    if(convId&&supabaseClient){
      supabaseClient.from('support_conversations').select('*').eq('id',convId).single().then(({data})=>{
        if(data&&Array.isArray(data.messages)&&data.messages.length>0){
          setMsgs(data.messages);
          setEscalated(data.status==='open'||data.status==='answered');
        }
      }).catch(()=>{});
    }
    loadTickets();
  },[]);

  // Polling réponses agent — utilise les refs pour éviter de recréer l'interval à chaque render
  const openRef=useRef(open);
  useEffect(()=>{openRef.current=open;},[open]);
  const escalatedRef=useRef(escalated);
  useEffect(()=>{escalatedRef.current=escalated;},[escalated]);
  const lastUpdatedRef=useRef(null);
  useEffect(()=>{
    if(!convId)return;
    const iv=setInterval(async()=>{
      if(!supabaseClient)return;
      const cid=convIdRef.current;
      if(!cid)return;
      const {data}=await supabaseClient.from('support_conversations').select('messages,status,updated_at').eq('id',cid).single().catch(()=>({data:null}));
      if(!data)return;
      const changed=data.updated_at!==lastUpdatedRef.current||JSON.stringify(data.messages)!==JSON.stringify(msgsRef.current);
      if(changed){
        lastUpdatedRef.current=data.updated_at;
        const prevAgentCount=msgsRef.current.filter(m=>m.role==='agent').length;
        const newAgentCount=(data.messages||[]).filter(m=>m.role==='agent').length;
        if(newAgentCount>prevAgentCount){
          if(!openRef.current){setUnread(u=>u+newAgentCount-prevAgentCount);}
          setMsgs([...(data.messages||[])]);
        } else if(JSON.stringify(data.messages)!==JSON.stringify(msgsRef.current)){
          setMsgs(data.messages||[]);
        }
        if(data.status==='answered'||data.status==='open'){setEscalated(true);}
      }
    },2500);
    return()=>clearInterval(iv);
  },[convId]);

  useEffect(()=>{msgEndRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,open]);
  useEffect(()=>{
    if(open&&screen==='chat'){
      setUnread(0);
      // Focus robuste — on réessaie si besoin
      const t1=setTimeout(()=>inputRef.current?.focus(),150);
      const t2=setTimeout(()=>inputRef.current?.focus(),400);
      return()=>{clearTimeout(t1);clearTimeout(t2);};
    }
  },[open,screen]);

  const userInfo={
    user_id:user?.id||null,
    user_name:user?.name||user?.company||null,
    user_email:user?.email||null
  };

  // Ref pour auto-send depuis les FAQ — déclenché manuellement, pas via useEffect sur msgs
  const pendingAutoSend=useRef(null);

  async function faqAutoSend(txt, currentMsgs, currentConvId){
    if(escalatedRef.current)return; // Ne pas auto-send FAQ si déjà escaladé
    setBusy(true);
    const userMsg={role:'user',content:txt,ts:Date.now()};
    const newMsgs=[...currentMsgs,userMsg];
    setMsgs(newMsgs);
    const cid=await dbSaveConv(currentConvId, newMsgs, 'bot', {user_id:user?.id||null,user_name:user?.name||user?.company||null,user_email:user?.email||null});
    if(cid&&cid!==currentConvId){
      setConvId(cid);
      try{localStorage.setItem(SUPPORT_LS_KEY,cid);const raw=localStorage.getItem('oniq_support_all_ids');const ids=raw?JSON.parse(raw):[];if(!ids.includes(cid))ids.push(cid);localStorage.setItem('oniq_support_all_ids',JSON.stringify(ids));}catch(e){}
    }
    try{
      const history=newMsgs.filter(m=>m.role==='user'||m.role==='bot').slice(-8).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.content}));
      const resp=await callMistralProxy({model:'mistral-small-latest',messages:[{role:'system',content:SUPPORT_CTX},...history],temperature:0.3,max_tokens:200});
      const reply=resp?.choices?.[0]?.message?.content||'Je n\'ai pas pu traiter votre demande. Souhaitez-vous parler à un agent ?';
      const botMsg={role:'bot',content:reply,ts:Date.now()};
      const final=[...newMsgs,botMsg];
      setMsgs(final);
      await dbSaveConv(cid||currentConvId,final,'bot',{user_id:user?.id||null,user_name:user?.name||user?.company||null,user_email:user?.email||null});
    }catch(e){
      const errMsg={role:'bot',content:'Une erreur s\'est produite. Souhaitez-vous être mis en relation avec un agent ?',ts:Date.now()};
      const final=[...newMsgs,errMsg];
      setMsgs(final);
      await dbSaveConv(cid||currentConvId,final,'open',{user_id:user?.id||null,user_name:user?.name||user?.company||null,user_email:user?.email||null});
    }
    setBusy(false);
  }

  // Charger tickets liés à ce user/email
  async function loadTickets(){
    if(!supabaseClient)return;
    setTicketsLoading(true);
    try{
      let q=supabaseClient.from('support_conversations').select('id,user_name,user_email,messages,status,created_at,updated_at').order('updated_at',{ascending:false}).limit(20);
      // Filtrer par user_id si connecté, sinon par localStorage ids
      if(user?.id){
        q=q.eq('user_id',user.id);
      } else {
        // récupérer tous les convIds stockés localement
        const storedIds=[];
        try{
          const raw=localStorage.getItem('oniq_support_all_ids');
          if(raw)storedIds.push(...JSON.parse(raw));
          if(convId&&!storedIds.includes(convId))storedIds.push(convId);
        }catch(e){}
        if(storedIds.length===0){setTickets([]);setTicketsLoading(false);return;}
        q=q.in('id',storedIds);
      }
      const {data}=await q;
      if(Array.isArray(data))setTickets(data.map(r=>({...r,messages:Array.isArray(r.messages)?r.messages:[]})));
    }catch(e){console.warn('loadTickets',e);}
    setTicketsLoading(false);
  }

  async function send(){
    if(!input.trim()||busy)return;
    const txt=input.trim();
    setInput('');
    const userMsg={role:'user',content:txt,ts:Date.now()};
    const newMsgs=[...msgs,userMsg];
    setMsgs(newMsgs);
    setBusy(true);

    const cid=await dbSaveConv(convId, newMsgs, escalatedRef.current?'open':'bot', userInfo);
    if(cid&&cid!==convId){
      setConvId(cid);
      try{
        localStorage.setItem(SUPPORT_LS_KEY,cid);
        // Stocker aussi dans la liste globale
        const raw=localStorage.getItem('oniq_support_all_ids');
        const ids=raw?JSON.parse(raw):[];
        if(!ids.includes(cid))ids.push(cid);
        localStorage.setItem('oniq_support_all_ids',JSON.stringify(ids));
      }catch(e){}
    }

    // Si déjà escaladé vers un agent humain : sauvegarder le message sans réponse IA
    if(escalatedRef.current){
      await dbSaveConv(cid||convId,newMsgs,'open',userInfo);
      setBusy(false);
      setTimeout(()=>inputRef.current?.focus(),50);
      setTimeout(()=>inputRef.current?.focus(),250);
      return;
    }

    const wantsHuman=/humain|agent|personne|quelqu'un|rappel|téléphone|urgence|conseiller/i.test(txt);
    if(wantsHuman){
      const escMsg={role:'bot',content:'Je transmets votre conversation à notre équipe. Un agent va vous répondre ici sous peu.',ts:Date.now()};
      const final=[...newMsgs,escMsg];
      setMsgs(final);setEscalated(true);
      await dbSaveConv(cid||convId,final,'open',userInfo);
      setBusy(false);
      setTimeout(()=>inputRef.current?.focus(),50);
      setTimeout(()=>inputRef.current?.focus(),250);
      return;
    }

    try{
      const history=newMsgs.filter(m=>m.role==='user'||m.role==='bot').slice(-8).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.content}));
      const resp=await callMistralProxy({model:'mistral-small-latest',messages:[{role:'system',content:SUPPORT_CTX},...history],temperature:0.3,max_tokens:200});
      const reply=resp?.choices?.[0]?.message?.content||'Je n\'ai pas pu traiter votre demande. Souhaitez-vous parler à un agent ?';
      const botMsg={role:'bot',content:reply,ts:Date.now()};
      const final=[...newMsgs,botMsg];
      setMsgs(final);
      await dbSaveConv(cid||convId,final,'bot',userInfo);
      if(!openRef.current)setUnread(u=>u+1);
    }catch(e){
      const errMsg={role:'bot',content:'Une erreur s\'est produite. Souhaitez-vous être mis en relation avec un agent ?',ts:Date.now()};
      const final=[...newMsgs,errMsg];
      setMsgs(final);
      await dbSaveConv(cid||convId,final,'open',userInfo);
    }
    setBusy(false);
    // Focus robuste après render
    setTimeout(()=>inputRef.current?.focus(),50);
    setTimeout(()=>inputRef.current?.focus(),250);
  }

  async function doEscalate(){
    const escMsg={role:'bot',content:'Votre conversation a été transmise à notre équipe support. Un agent va vous répondre ici très prochainement.',ts:Date.now()};
    const final=[...msgs,escMsg];
    setMsgs(final);setEscalated(true);escalatedRef.current=true;
    const cid=await dbSaveConv(convId,final,'open',userInfo);
    if(cid&&cid!==convId){
      setConvId(cid);
      try{
        localStorage.setItem(SUPPORT_LS_KEY,cid);
        const raw=localStorage.getItem('oniq_support_all_ids');
        const ids=raw?JSON.parse(raw):[];
        if(!ids.includes(cid))ids.push(cid);
        localStorage.setItem('oniq_support_all_ids',JSON.stringify(ids));
      }catch(e){}
    }
  }

  function newConv(){
    const init=[{role:'bot',content:'Bonjour 👋 Je suis l\'assistant IA d\'ONIQ. Je suis là pour répondre à toutes vos questions sur notre plateforme et nos logiciels.\n\nSi je ne parviens pas à répondre à votre question, je vous mettrai en relation avec un agent humain. Comment puis-je vous aider ?',ts:Date.now()}];
    setMsgs(init);setConvId(null);setEscalated(false);setUnread(0);setScreen('chat');
    try{localStorage.removeItem(SUPPORT_LS_KEY);}catch(e){}
  }

  const statusLabel={open:'En attente',bot:'Répondu par IA',answered:'Répondu',closed:'Fermé'};
  const statusColor={open:'#E65100',bot:'#6366f1',answered:'#16a34a',closed:'#888'};
  const statusBg={open:'#FFF3E0',bot:'#EEF2FF',answered:'#F0FDF4',closed:'#f4f4f5'};

  const btnBg=canAccessSupport?'linear-gradient(135deg,#6366f1,#8b5cf6)':'linear-gradient(135deg,#B89A5A,#D4B87A)';

  // Header partagé
  const Header=({title,back,action})=>(
    <div style={{background:'linear-gradient(135deg,#0A0A08 0%,#1a1a16 100%)',padding:'16px 16px 18px',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:back||title?10:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {back&&<button onClick={back} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,width:28,height:28,cursor:'pointer',color:'rgba(255,255,255,0.7)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>}
          <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#B89A5A,#D4B87A)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:13,fontWeight:900,color:'#0A0A08'}}>O</div>
          <div style={{fontFamily:SF,fontSize:13,fontWeight:700,color:'#fff'}}>{title||'ONIQ Support'}</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          {action}
          <button onClick={()=>setOpen(false)} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,width:28,height:28,cursor:'pointer',color:'rgba(255,255,255,0.5)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>⌄</button>
        </div>
      </div>
    </div>
  );

  // Bottom nav tabs
  const BottomNav=()=>(
    <div style={{display:'flex',borderTop:'1px solid #f0f0f0',background:'#fff',flexShrink:0}}>
      {[
        {id:'home',icon:'🏠',label:'Accueil'},
        {id:'chat',icon:'💬',label:'Chat'},
        {id:'tickets',icon:'🎫',label:'Mes tickets'},
      ].map(tab=>(
        <button key={tab.id} onClick={()=>{if(tab.id==='tickets')loadTickets();setScreen(tab.id);}}
          style={{flex:1,padding:'10px 4px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,borderTop:screen===tab.id?'2px solid #B89A5A':'2px solid transparent',marginTop:-1}}>
          <span style={{fontSize:16}}>{tab.icon}</span>
          <span style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:screen===tab.id?'#B89A5A':'#aaa'}}>{tab.label}</span>
        </button>
      ))}
    </div>
  );

  // Ecran HOME
  const ScreenHome=()=>(
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
      <div style={{background:'linear-gradient(135deg,#0A0A08 0%,#1a1a16 100%)',padding:'20px 18px 52px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#B89A5A,#D4B87A)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:15,fontWeight:900,color:'#0A0A08'}}>O</div>
            <div>
              <div style={{fontFamily:SF,fontSize:14,fontWeight:700,color:'#fff'}}>ONIQ Support</div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'#4ade80'}}/>
                <span style={{fontFamily:SS,fontSize:10,color:'rgba(255,255,255,0.45)'}}>Répond en quelques secondes</span>
              </div>
            </div>
          </div>
          <button onClick={()=>setOpen(false)} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:8,width:28,height:28,cursor:'pointer',color:'rgba(255,255,255,0.5)',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>⌄</button>
        </div>
        <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:'#fff',lineHeight:1.3}}>Bonjour{user?.name?` ${user.name.split(' ')[0]}`:''} 👋</div>
        <div style={{fontFamily:SS,fontSize:12,color:'rgba(255,255,255,0.45)',marginTop:4}}>Notre équipe est là pour vous aider.</div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'0 14px 14px',marginTop:-28}}>
        {/* Card démarrer une conversation */}
        <div style={{background:'#fff',borderRadius:14,boxShadow:'0 4px 20px rgba(0,0,0,0.1)',overflow:'hidden',marginBottom:12,cursor:'pointer'}} onClick={()=>setScreen('chat')}>
          <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#0A0A08,#2a2a20)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>💬</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:SS,fontSize:13,fontWeight:700,color:'#111',marginBottom:2}}>Démarrer une conversation</div>
              <div style={{fontFamily:SS,fontSize:11,color:'#888'}}>Notre IA répond instantanément</div>
            </div>
            <span style={{color:'#ccc',fontSize:16}}>→</span>
          </div>
        </div>

        {/* Card historique tickets */}
        <div style={{background:'#fff',borderRadius:14,boxShadow:'0 4px 20px rgba(0,0,0,0.1)',overflow:'hidden',marginBottom:12,cursor:'pointer'}} onClick={()=>{loadTickets();setScreen('tickets');}}>
          <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🎫</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:SS,fontSize:13,fontWeight:700,color:'#111',marginBottom:2}}>Mes tickets</div>
              <div style={{fontFamily:SS,fontSize:11,color:'#888'}}>Voir l'historique de vos demandes</div>
            </div>
            <span style={{color:'#ccc',fontSize:16}}>→</span>

// SECURITY CHECK ACCESS (fixed)
async function checkAccess(softwareSlug){
  if(!supabaseClient){
    console.error("Supabase non disponible");
    return false;
  }

  const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
  if(userError || !user){
    alert("Connecte-toi d'abord.");
    return false;
  }

  // Les admins ont accès à tous les logiciels
  try{
    const {data:roleData}=await supabaseClient.from('user_roles').select('role').eq('user_id',user.id).maybeSingle();
    if(roleData?.role==='admin') return true;
  }catch(e){}

  const { data, error } = await supabaseClient
    .from("software_access")
    .select("access_end")
    .eq("user_id", user.id)
    .eq("software_slug", softwareSlug)
    .order("access_end", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("Erreur checkAccess:", error);
    return false;
  }

  if(!data || !data.access_end){
    return false;
  }

  return new Date(data.access_end) > new Date();
}

async function openSoftwareProtected(slug){
  const allowed = await checkAccess(slug);
  if(!allowed){
    alert("Accès non actif pour ce logiciel. Vérifie ton abonnement.");
    return;
  }
  const sw=(window.__SW_DB__||[]).find(s=>s.slug===slug)||{slug,name:slug,id:slug};
  window.dispatchEvent(new CustomEvent('oniq-open-software',{detail:sw}));
}
