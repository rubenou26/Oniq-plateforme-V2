// ── PWA Install ──
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _pwaPrompt = e;
  // Notifier React que l'install est disponible
  window.dispatchEvent(new CustomEvent('pwa-install-ready'));
});
window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  window.dispatchEvent(new CustomEvent('pwa-installed'));
});
window.installPWA = async function() {
  if (!_pwaPrompt) return false;
  _pwaPrompt.prompt();
  const { outcome } = await _pwaPrompt.userChoice;
  _pwaPrompt = null;
  return outcome === 'accepted';
};
window.canInstallPWA = () => !!_pwaPrompt;
// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

async function createStripeCheckout(cartItems, customerEmail){
  const sw=Array.isArray(cartItems)?cartItems[0]:null;
  if(!sw)throw new Error("Aucun produit à payer.");

  const priceId=STRIPE_PRICES[sw.slug];
  if(!priceId)throw new Error(`priceId manquant pour : ${sw.slug||'inconnu'}`);

  const payload={
    priceId,
    email:customerEmail||"",
    softwareSlug:sw.slug,
    items:[{slug:sw.slug,priceId,quantity:1}],
    customerEmail:customerEmail||"",
    successUrl:'https://www.oniq.online?payment=success',
    cancelUrl:'https://www.oniq.online?payment=cancel'
  };

  const resp=await fetch(CHECKOUT_FUNCTION_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const session=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(session.error||"Fonction create-checkout indisponible.");
  if(session.error)throw new Error(session.error);
  if(!session.url)throw new Error("URL Stripe introuvable.");
  return session;
}

async function callMistralProxy(payload){
  const headers={'Content-Type':'application/json'};
  // Envoyer le token Supabase (requis par les Edge Functions)
  if(supabaseClient){
    try{
      const {data:s}=await supabaseClient.auth.getSession();
      if(s?.session?.access_token) headers['Authorization']=`Bearer ${s.session.access_token}`;
      else headers['Authorization']=`Bearer ${supabaseKey}`;
    }catch(e){ headers['Authorization']=`Bearer ${supabaseKey}`; }
  } else { headers['Authorization']=`Bearer ${supabaseKey}`; }
  const resp=await fetch(MISTRAL_PROXY_URL,{
    method:'POST',
    headers,
    body:JSON.stringify(payload)
  });
  const data=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(data.error||"Fonction mistral-proxy indisponible.");
  return data;
}

async function uploadCompanyLogoToCloud(file,userId){
  if(!supabaseClient) throw new Error("Supabase n’est pas configuré.");
  if(!userId) throw new Error("Utilisateur non connecté.");
  const ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'');
  const filePath=`${userId}/company-logo.${ext||'png'}`;
  const { error: uploadError } = await supabaseClient.storage
    .from(COMPANY_LOGO_BUCKET)
    .upload(filePath, file, { upsert:true, cacheControl:'3600' });
  if(uploadError) throw uploadError;
  const { data } = supabaseClient.storage.from(COMPANY_LOGO_BUCKET).getPublicUrl(filePath);
  return data?.publicUrl || "";
}

async function persistCompanyLogoUrl(userId, logoUrl){
  if(!supabaseClient||!userId||!logoUrl)return;
  const metadata = { companyLogoUrl: logoUrl, companyLogo: logoUrl };
  try{
    await supabaseClient.auth.updateUser({ data: metadata });
  }catch(e){
    console.warn('auth.updateUser companyLogo failed:',e);
  }
  try{
    await supabaseClient.from('user_profiles').upsert({ user_id:userId, company_logo_url:logoUrl }, { onConflict:'user_id' });
  }catch(e){
    console.warn('user_profiles upsert skipped:',e);
  }
}

async function syncSubsFromCloud(userId, softwareList, setUser, setUsers){
  const cloudSubs=await loadUserSubs(userId, softwareList);
  setUser(prev=>{
    if(!prev)return prev;
    const next={...prev,subs:cloudSubs};
    if(setUsers)setUsers(us=>us.map(u=>String(u.id)===String(next.id)?{...u,...next}:u));
    return next;
  });
  return cloudSubs;
}

const mapAuthUserToDemoUser=(authUser,existingUser)=>{
  const existing=existingUser||{};
  const isAdminEmail=ADMIN_EMAILS.includes(authUser?.email?.toLowerCase());
  // Vérification supplémentaire via metadata Supabase (défini serveur-side)
  const isAdminMeta=authUser?.user_metadata?.role==='admin'||authUser?.app_metadata?.role==='admin';
  const company=authUser?.user_metadata?.company || existing.company || "";
  const companyLogo=authUser?.user_metadata?.companyLogoUrl || authUser?.user_metadata?.companyLogo || existing.companyLogo || "";
  const name=authUser?.user_metadata?.name || authUser?.user_metadata?.full_name || existing.name || company || authUser?.email || "Utilisateur";
  const avatar=(company||name||authUser?.email||"U").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return {
    id: authUser.id,
    role: (isAdminEmail||isAdminMeta)?"admin":(existing.role || "client"),
    name,
    company,
    email: authUser.email,
    password: existing.password || "",
    companyLogo,
    avatar,
    subs: Array.isArray(existing.subs)?existing.subs:[],
    trials: existing.trials || {},
    since: existing.since || new Date().toLocaleDateString("fr-FR",{month:"short",year:"numeric"}),
    status: existing.status || "trial",
    sector: authUser?.user_metadata?.sector || existing.sector || "",
    referralCode: existing.referralCode || genCode(),
    referrals: typeof existing.referrals==="number"?existing.referrals:0,
    referralCredit: typeof existing.referralCredit==="number"?existing.referralCredit:0
  };
};

async function loginWithRole(authUser, existingUser, onLogin, isNew){
  let overrideRole = null;
  if(supabaseClient && authUser?.id){
    try{
      const {data} = await supabaseClient.from('user_roles').select('role').eq('user_id', authUser.id).maybeSingle();
      if(data?.role) overrideRole = data.role;
    }catch(e){}
  }
  const mapped = mapAuthUserToDemoUser(authUser, existingUser);
  if(overrideRole) mapped.role = overrideRole;
  onLogin(mapped, isNew);
}

const softwareLaunchers={
  batimanager:{src:BATI_MANAGER_DATA_URL,mode:"iframe"},
  metrimanager:{src:METRI_MANAGER_DATA_URL,mode:"iframe"}
};
const openSoftwareApp=(sw)=>{
  const launcher=sw?.slug&&softwareLaunchers[sw.slug];
  if(launcher) {
    window.dispatchEvent(new CustomEvent('oniq-open-software',{detail:sw}));
    return;
  }
  alert("Ce logiciel n’est pas encore connecté.");
};

const normalizeTeamSoftwareIds=value=>Array.isArray(value)?value.map(v=>Number(v)).filter(v=>!Number.isNaN(v)):[];
const mapTeamMemberRow=row=>row?({...row,ownerId:row.owner_id,userId:row.user_id,softwareIds:normalizeTeamSoftwareIds(row.software_ids),createdAt:row.created_at}):null;
const TEAM_INVITES_LS_KEY='oniq_team_invites';
const TEAM_MEMBERS_LS_KEY='oniq_team_members';
const TEAM_SESSIONS_LS_KEY='oniq_team_sessions';
const TEAM_COMPANIES_LS_KEY='oniq_team_companies';

function readJsonArray(key){
  try{
    const raw=localStorage.getItem(key);
    const parsed=raw?JSON.parse(raw):[];
    return Array.isArray(parsed)?parsed:[];
  }catch(e){
    return [];
  }
}

function writeJsonArray(key, value){
  try{ localStorage.setItem(key, JSON.stringify(Array.isArray(value)?value:[])); }catch(e){}
}

function localId(prefix='id'){
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
}

function upsertLocalRow(key, row, matchFn){
  const rows=readJsonArray(key);
  const idx=rows.findIndex(matchFn);
  if(idx>=0) rows[idx]={...rows[idx], ...row};
  else rows.push(row);
  writeJsonArray(key, rows);
  return idx>=0?rows[idx]:row;
}

async function ensureCompanyDirectory(owner){
  if(!owner?.id) return null;
  const localRows=readJsonArray(TEAM_COMPANIES_LS_KEY);
  const existingLocal=localRows.find(r=>String(r.owner_id)===String(owner.id));
  const row={
    owner_id:String(owner.id),
    company_code:sanitizeCompanyCode(existingLocal?.company_code || owner.companyCode || genCompanyAccessCode(owner.id)),
    owner_email:owner.email||'',

    updated_at:new Date().toISOString()
  };

  if(!supabaseClient) return row;
  try{
    const payload={...row};

      console.warn('ensureCompanyDirectory cloud skipped:', error.message||error);

    }

function isPermissionError(error){
  const msg=String(error?.message||error||'').toLowerCase();
  return msg.includes('row-level security') || msg.includes('violates row-level security') || msg.includes('permission denied') || msg.includes('not allowed');
}

async function getOwnerTeamMembers(ownerId){

  const localRows=getLocalOwnerTeamMembers(ownerId).map(mapTeamMemberRow);
  if(!supabaseClient) return localRows;
  const { data, error } = await supabaseClient.from('team_members').select('*').eq('owner_id', String(ownerId)).order('created_at', {ascending:true});
  if(error){console.error('Erreur getOwnerTeamMembers:', error); return localRows;}
  const cloudRows=Array.isArray(data)?data.map(mapTeamMemberRow):[];
  const merged=[];
  const seen=new Set();
  [...cloudRows,...localRows].forEach(row=>{
    const key=row?.id||`${row?.ownerId}_${row?.email}`;
    if(row && !seen.has(key)){
      seen.add(key);
      merged.push(row);
    }
  });
  return merged;
}

async function createOrUpdateTeamMember({ownerId,userId,email,name}){
  const normalizedEmail=String(email||'').trim().toLowerCase();
  let existing=await getTeamMemberByEmail(ownerId, normalizedEmail);
  const payload={user_id:String(userId||''),name:name||(existing?.name)||normalizedEmail.split('@')[0],status:'active'};
  if(existing){
    saveLocalTeamMember({
      id: existing.id,
      owner_id:String(ownerId),
      user_id:String(userId||existing.userId||''),
      email:normalizedEmail,
      name:payload.name,
      status:'active',
      software_ids:existing.softwareIds||existing.software_ids||[],
      created_at:existing.createdAt||existing.created_at
    });
    if(!supabaseClient) return mapTeamMemberRow(saveLocalTeamMember({
      id: existing.id,
      owner_id:String(ownerId),
      user_id:String(userId||existing.userId||''),
      email:normalizedEmail,
      name:payload.name,
      status:'active',
      software_ids:existing.softwareIds||existing.software_ids||[],
      created_at:existing.createdAt||existing.created_at
    }));
    const { data, error } = await supabaseClient.from('team_members').update(payload).eq('id', existing.id).select('*').maybeSingle();
    if(error){
      if(isPermissionError(error)) return mapTeamMemberRow(saveLocalTeamMember({
        id: existing.id,
        owner_id:String(ownerId),
        user_id:String(userId||existing.userId||''),
        email:normalizedEmail,
        name:payload.name,
        status:'active',
        software_ids:existing.softwareIds||existing.software_ids||[],
        created_at:existing.createdAt||existing.created_at
      }));
      throw error;
    }
    return mapTeamMemberRow(data||{...existing,user_id:String(userId),name:payload.name,status:'active'});
  }
  const newRow={
    id: localId('tm'),
    owner_id:String(ownerId),
    user_id:String(userId||''),
    email:normalizedEmail,
    name:name||normalizedEmail.split('@')[0],
    status:'active',
    software_ids:[],
    created_at:new Date().toISOString()
  };
  saveLocalTeamMember(newRow);
  if(!supabaseClient) return mapTeamMemberRow(newRow);
  const { data, error } = await supabaseClient.from('team_members').insert({
    owner_id:String(ownerId),
    user_id:String(userId),
    email:normalizedEmail,
    name:name||normalizedEmail.split('@')[0],
    status:'active',
    software_ids:[]
  }).select('*').maybeSingle();
  if(error){
    if(isPermissionError(error)) return mapTeamMemberRow(newRow);
    throw error;
  }
  return mapTeamMemberRow(data);
}

  const max=Math.max(...data),min=Math.min(...data),w=300,h=60,p=6;
  const x=(i)=>p+(i/(data.length-1))*(w-p*2);
  const y=(v)=>h-p-((v-min)/(max-min||1))*(h-p*2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} ${data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")} L${x(data.length-1)},${h} L${x(0)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:60}}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.25"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#g1)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r="3" fill={C.gold}/>

};

// Hook global de traduction
const LangCtx=React.createContext({lang:'fr',t:(k)=>T.fr[k]||k,setLang:()=>{}});
function useLang(){return React.useContext(LangCtx);}
function LangProvider({children}){
  const [lang,setLang]=React.useState(()=>{try{return localStorage.getItem('oniq_lang')||'fr';}catch(e){return 'fr';}});
  const save=(l)=>{setLang(l);try{localStorage.setItem('oniq_lang',l);}catch(e){}};
  const t=(k)=>(T[lang]&&T[lang][k])||(T.fr&&T.fr[k])||k;
  return <LangCtx.Provider value={{lang,t,setLang:save}}>{children}</LangCtx.Provider>;
}
function LangSwitcher(){
  const {lang,setLang}=useLang();
  const [open,setOpen]=React.useState(false);
  return (
    <div style={{position:'relative'}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:6,padding:'7px 11px',cursor:'pointer',color:'rgba(255,255,255,0.75)',fontFamily:SS,fontSize:11,fontWeight:700,width:'100%',justifyContent:'space-between'}}>
        <span>🌐 {LANGS[lang]?.label||'FR'}</span>
        <span style={{fontSize:9,opacity:0.5}}>{open?'▲':'▼'}</span>
      </button>
      {open&&(
        <div style={{position:'absolute',bottom:'110%',left:0,right:0,background:'#1c1c14',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8,overflow:'hidden',zIndex:9999,boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
          {Object.values(LANGS).map(l=>(
            <button key={l.code} onClick={()=>{setLang(l.code);setOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'9px 12px',background:lang===l.code?'rgba(184,154,90,0.15)':'transparent',border:'none',color:lang===l.code?'#B89A5A':'rgba(255,255,255,0.65)',fontFamily:SS,fontSize:12,fontWeight:lang===l.code?700:500,cursor:'pointer',textAlign:'left',boxSizing:'border-box'}}>
              {l.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const EmailConfirmPage=({email,onClose,C,SF,SS})=>{
  const [resending,setResending]=React.useState(false);
  const [sent,setSent]=React.useState(false);
  const [countdown,setCountdown]=React.useState(0);
  const resend=async()=>{
    if(resending||countdown>0)return;
    setResending(true);
    try{
      if(supabaseClient) await supabaseClient.auth.resend({type:'signup',email});
      setSent(true);setCountdown(60);
      const t=setInterval(()=>setCountdown(c=>{if(c<=1){clearInterval(t);return 0;}return c-1;}),1000);
    }catch(e){}
    setResending(false);
  };
  return (
    <div style={{position:'fixed',inset:0,background:C.dim,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:24,overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:480,textAlign:'center'}}>
        <div style={{width:72,height:72,borderRadius:'50%',background:C.goldDim,border:`2px solid ${C.goldB}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px',fontSize:32}}>✉</div>
        <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.22em',textTransform:'uppercase',color:C.gold,marginBottom:10}}>Vérification requise</div>
        <h1 style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,margin:'0 0 14px',lineHeight:1.2}}>Confirmez votre email</h1>
        <p style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.7,marginBottom:8}}>Un email de confirmation a été envoyé à</p>
        <div style={{fontFamily:SF,fontSize:15,fontWeight:700,color:C.ink,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,padding:'10px 18px',display:'inline-block',marginBottom:20}}>{email}</div>
        <p style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.7,margin:'0 auto 28px',maxWidth:380}}>Cliquez sur le lien dans cet email pour activer votre compte. Vérifiez vos <strong>spams</strong> si vous ne le trouvez pas.</p>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:8,padding:'18px 22px',marginBottom:24,textAlign:'left'}}>
          {[{n:'1',t:'Ouvrez votre boîte mail',s:'Cherchez un email de "ONIQ Platform"'},{n:'2',t:'Cliquez sur le lien de confirmation',s:'Le lien est valable 24 heures'},{n:'3',t:'Revenez vous connecter',s:'Votre accès sera immédiatement activé'}].map((step,i)=>(
            <div key={i} style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:i<2?14:0}}>
              <div style={{width:26,height:26,borderRadius:'50%',background:C.ink,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SS,fontSize:11,fontWeight:700,color:C.ivory,flexShrink:0}}>{step.n}</div>
              <div><div style={{fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink}}>{step.t}</div><div style={{fontFamily:SS,fontSize:11,color:C.stone}}>{step.s}</div></div>
            </div>
          ))}
        </div>
        <div style={{marginBottom:16}}>
          {sent&&<div style={{fontFamily:SS,fontSize:11,color:C.green,fontWeight:600,marginBottom:10}}>✓ Email renvoyé ! Vérifiez votre boîte mail et vos spams.</div>}
          <button onClick={resend} disabled={resending||countdown>0} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:5,padding:'10px 22px',fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:countdown>0?'default':'pointer',letterSpacing:'0.1em',textTransform:'uppercase',opacity:countdown>0?0.6:1}}>
            {resending?'Envoi…':countdown>0?`Renvoyer dans ${countdown}s`:"↻ Renvoyer l'email"}
          </button>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',fontFamily:SS,fontSize:11,color:C.stone,cursor:'pointer',textDecoration:'underline',padding:0}}>← Retour à la connexion</button>
      </div>
    </div>
  );
};

const AuthModal=({onLogin,initMode,onClose})=>{
  const [mode,setMode]=useState(initMode||"login");
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [reg,setReg]=useState({company:"",firstname:"",name:"",email:"",sector:"",pass:"",pass2:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [confirmEmail,setConfirmEmail]=useState(null);
  const [resetMode,setResetMode]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const is={width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"12px 14px",fontFamily:SS,fontSize:13,color:C.ivory,outline:"none",boxSizing:"border-box"};
  const ls={fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:7};

  const doResetPassword=async()=>{
    setErr("");
    if(!email){setErr("Saisissez votre email.");return;}
    if(!supabaseClient){setErr("Supabase n’est pas configuré.");return;}
    setLoading(true);
    try{
      const {error}=await supabaseClient.auth.resetPasswordForEmail(email.trim(),{
        redirectTo:window.location.origin+window.location.pathname
      });
      if(error){setErr(error.message||"Erreur lors de l'envoi.");return;}
      setResetSent(true);
    }catch(e){
      setErr(e?.message||"Erreur lors de l'envoi.");
    }finally{
      setLoading(false);
    }
  };

  const doLogin=async()=>{
    setErr("");
    if(!email||!pass){setErr("Saisissez votre email et votre mot de passe.");return;}
    if(!supabaseClient){setErr("Supabase n’est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email.trim(),
        password: pass
      });
      if(error){
        const msg=(error.message||'').toLowerCase();
        if(msg.includes('email not confirmed')){
          setConfirmEmail(email.trim());return;
        } else if(msg.includes('invalid login') || msg.includes('invalid credentials')){
          setErr("Email ou mot de passe incorrect. Si vous venez de créer votre compte, vérifiez que vous avez confirmé votre email via le lien reçu par mail.");
        } else {
          setErr(error.message||"Connexion impossible.");
        }
        return;
      }
      const authUser=data?.user;
      if(!authUser){setErr("Connexion impossible.");return;}
      await loginWithRole(authUser, null, onLogin, false);
    }catch(e){
      setErr(e?.message||"Connexion impossible.");
    }finally{
      setLoading(false);
    }
  };

  const doRegister=async()=>{
    setErr("");
    if(!reg.company||!reg.email||!reg.pass){setErr("Remplissez tous les champs.");return;}
    if(reg.pass!==reg.pass2){setErr("Mots de passe différents.");return;}
    if(!supabaseClient){setErr("Supabase n’est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email: reg.email.trim(),
        password: reg.pass,
        options: {
          data: {
            company: reg.company,
            firstname: reg.firstname || "",
            name: reg.name || reg.company,
            full_name: ((reg.firstname||"") + " " + (reg.name||"")).trim() || reg.company,
            sector: reg.sector || ""
          },
          emailRedirectTo: "https://www.oniq.online"
        }
      });
      if(error){setErr(error.message||"Inscription impossible.");return;}

      // Toujours écrire dans pending_registrations pour que l'admin puisse trouver l'user
      if(data && data.user){
        const userId=data.user.id;
        const userEmail=data.user.email||reg.email.trim();
        try{
          await supabaseClient.from('pending_registrations').upsert({
            user_id:userId,
            email:userEmail,
            company:reg.company||'',
            name:reg.name||reg.company||'',
            sector:reg.sector||'',
            confirmed:false,
            created_at:new Date().toISOString()
          },{onConflict:'user_id'});
        }catch(e){
          // Table peut ne pas exister — on tente company_directory en fallback
          try{
            await supabaseClient.from('company_directory').upsert({
              owner_id:userId,
              owner_email:userEmail,
              owner_name:reg.name||reg.company||'',
              owner_company:reg.company||'',
              owner_role:'client',
              company_code:genCode(),
              created_at:new Date().toISOString()
            },{onConflict:'owner_id'});
          }catch(e2){}
        }
      }

      if(data && data.user && !data.session){
        setConfirmEmail(reg.email.trim());
        return;
      }

      if(data && data.session && data.session.user){
        await loginWithRole(data.session.user, null, onLogin, true);
        return;
      }

      setConfirmEmail(reg.email.trim());
    }catch(e){
      setErr((e && e.message) ? e.message : "Inscription impossible.");
    }finally{
      setLoading(false);
    }
  };

  if(confirmEmail){
    return <EmailConfirmPage email={confirmEmail} onClose={()=>{setConfirmEmail(null);setMode("login");}} C={C} SF={SF} SS={SS}/>;
  }
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(5,5,4,0.88)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:C.deep,border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"44px 48px",width:380,position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:20,background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:18}}>✕</button>
        <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ivory,letterSpacing:4,marginBottom:4}}>ONIQ</div>
        <div style={{height:1,width:36,background:C.gold,marginBottom:20}}/>
        <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:6,padding:4,marginBottom:24}}>
          {[["login","Connexion"],["register","Inscription"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setMode(k);setStep(1);setErr("");}} style={{flex:1,padding:10,borderRadius:4,background:mode===k?"rgba(255,255,255,0.09)":"transparent",border:"none",color:mode===k?C.ivory:"rgba(255,255,255,0.33)",fontFamily:SS,fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {mode==="login"&&!resetMode&&(
          <>
            <div style={{marginBottom:12}}><label style={ls}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="vous@entreprise.fr" style={is}/></div>
            <div style={{marginBottom:8}}><label style={ls}>Mot de passe</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="••••••••" style={is}/></div>
            <div style={{textAlign:"right",marginBottom:16}}><button onClick={()=>{setResetMode(true);setErr("");setResetSent(false)}} style={{background:"none",border:"none",color:C.gold,fontFamily:SS,fontSize:11,cursor:"pointer",textDecoration:"underline",padding:0}}>Mot de passe oublié ?</button></div>
            {err&&<div style={{fontFamily:SS,fontSize:12,color:"#e87777",marginBottom:12,background:"rgba(168,60,60,0.15)",padding:"10px 14px",borderRadius:4}}>{err}</div>}
            <button disabled={loading} onClick={doLogin} style={{width:"100%",background:C.gold,border:"none",borderRadius:4,padding:13,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:loading?0.7:1}}>{loading?"Connexion...":"Se connecter"}</button>
          </>
        )}
        {mode==="login"&&resetMode&&(
          <>
            {!resetSent?(
              <>
                <div style={{fontFamily:SF,fontSize:15,color:C.ivory,marginBottom:6,fontWeight:600}}>Réinitialiser le mot de passe</div>
                <div style={{fontFamily:SS,fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:18,lineHeight:1.5}}>Entrez votre email, vous recevrez un lien pour créer un nouveau mot de passe.</div>
                <div style={{marginBottom:18}}><label style={ls}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doResetPassword()} placeholder="vous@entreprise.fr" style={is}/></div>
                {err&&<div style={{fontFamily:SS,fontSize:12,color:"#e87777",marginBottom:12,background:"rgba(168,60,60,0.15)",padding:"10px 14px",borderRadius:4}}>{err}</div>}
                <button disabled={loading} onClick={doResetPassword} style={{width:"100%",background:C.gold,border:"none",borderRadius:4,padding:13,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:loading?0.7:1,marginBottom:14}}>{loading?"Envoi...":"Envoyer le lien"}</button>
                <button onClick={()=>{setResetMode(false);setErr("")}} style={{width:"100%",background:"none",border:"1px solid rgba(255,255,255,0.15)",borderRadius:4,padding:11,fontFamily:SS,fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>← Retour à la connexion</button>
              </>
            ):(
              <>
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontSize:"2.5rem",marginBottom:14}}>📧</div>
                  <div style={{fontFamily:SF,fontSize:17,color:C.ivory,fontWeight:700,marginBottom:8}}>Email envoyé !</div>
                  <div style={{fontFamily:SS,fontSize:12,color:"rgba(255,255,255,0.55)",lineHeight:1.6,marginBottom:20}}>Un lien de réinitialisation a été envoyé à <strong style={{color:C.gold}}>{email}</strong>. Vérifiez votre boîte de réception (et vos spams).</div>
                  <button onClick={()=>{setResetMode(false);setResetSent(false);setErr("")}} style={{background:C.gold,border:"none",borderRadius:4,padding:"11px 28px",fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ink,cursor:"pointer"}}>Retour à la connexion</button>
                </div>
              </>
            )}
          </>
        )}
        {mode==="register"&&step===1&&(
          <>
            <div style={{fontFamily:SF,fontSize:14,color:C.ivory,marginBottom:16}}>Étape 1 / 2 — Votre entreprise</div>
            <div style={{marginBottom:11}}><label style={ls}>Nom de l’entreprise</label><input type="text" value={reg.company} onChange={e=>setReg(p=>({...p,company:e.target.value}))} placeholder="ACME Construction" style={is}/></div>
            <div style={{display:'flex',gap:10,marginBottom:11}}>
              <div style={{flex:1}}><label style={ls}>Prénom</label><input type="text" value={reg.firstname} onChange={e=>setReg(p=>({...p,firstname:e.target.value}))} placeholder="Jean" style={is}/></div>

const PasswordResetPage=({onDone})=>{
  const [password,setPassword]=useState('');
  const [password2,setPassword2]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [ok,setOk]=useState(false);

  useEffect(()=>{
    let active=true;
    async function bootstrapRecovery(){
      if(!supabaseClient) return;
      try{
        const hashParams=new URLSearchParams((window.location.hash||'').replace(/^#/,''));
        const accessToken=hashParams.get('access_token');
        const refreshToken=hashParams.get('refresh_token');
        if(accessToken && refreshToken){
          const { error } = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if(error) throw error;
        }
        if(active){
          const cleanUrl=window.location.pathname + window.location.search;
          window.history.replaceState({},'',cleanUrl);
        }
      }catch(e){
        if(active) setErr(e?.message||"Lien de réinitialisation invalide ou expiré.");
      }
    }
    bootstrapRecovery();
    return ()=>{active=false;};
  },[]);

  const submit=async()=>{
    setErr('');
    if(!password || !password2){
      setErr('Saisissez votre nouveau mot de passe.');
      return;
    }
    if(password.length<6){
      setErr('Le mot de passe doit contenir au moins 6 caractères.');
      return;
    }
    if(password!==password2){
      setErr('Les mots de passe sont différents.');
      return;
    }
    if(!supabaseClient){
      setErr("Supabase n’est pas configuré.");
      return;
    }
    setLoading(true);
    try{
      const { error } = await supabaseClient.auth.updateUser({ password });
      if(error) throw error;
      setOk(true);
      try{ await supabaseClient.auth.signOut(); }catch(e){}
    }catch(e){
      setErr(e?.message||"Impossible de changer le mot de passe.");
    }finally{
      setLoading(false);
    }
  };

  return (
    <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:520,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:isMob()?'28px 22px':'36px 34px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
        <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.gold,marginBottom:8}}>Réinitialisation du mot de passe</div>
        <div style={{fontFamily:SF,fontSize:isMob()?30:38,fontWeight:700,color:C.ink,marginBottom:8}}>Choisir un nouveau mot de passe</div>
        <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.7,marginBottom:20}}>
          {ok ? "Votre mot de passe a bien été mis à jour." : "Saisissez votre nouveau mot de passe puis validez pour revenir à la connexion."}
        </div>

        {!ok ? (
          <>
            <TI label='Nouveau mot de passe' value={password} onChange={e=>setPassword(e.target.value)} type='password'/>
            <TI label='Confirmer le mot de passe' value={password2} onChange={e=>setPassword2(e.target.value)} type='password' mb={8}/>
            {err && <div style={{background:'#fff4f4',border:'1px solid #efc7c7',color:'#8d2d2d',borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,lineHeight:1.6,margin:'12px 0 16px'}}>{err}</div>}
            <button disabled={loading} onClick={submit} style={{width:'100%',background:C.ink,border:'none',borderRadius:6,padding:'12px 16px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ivory,cursor:'pointer',opacity:loading?0.7:1}}>
              {loading?'Enregistrement...':'Enregistrer le nouveau mot de passe'}
            </button>
          </>
        ) : (
          <>
            <div style={{background:'#f6f2e8',border:`1px solid ${C.linen}`,color:C.ink,borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,lineHeight:1.6,margin:'12px 0 16px'}}>
              Vous pouvez maintenant vous reconnecter avec votre nouveau mot de passe.
            </div>
            <button onClick={onDone} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'12px 16px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer'}}>

          <div style={{display:"flex",gap:18}}>
            <button onClick={()=>{setPrevView(view);setView("pub-mentions");}} style={{background:"none",border:"none",fontFamily:SS,fontSize:10,color:C.stone,cursor:"pointer",textDecoration:"underline",padding:0}}>Mentions légales</button>

  if(sort==="popular")list=[...list].sort((a,b)=>b.reviews-a.reviews);
  if(sort==="rating")list=[...list].sort((a,b)=>b.rating-a.rating);
  if(sort==="price_asc")list=[...list].sort((a,b)=>a.price-b.price);
  if(sort==="price_desc")list=[...list].sort((a,b)=>b.price-a.price);

  const [trialCodeErr,setTrialCodeErr]=useState('');
  const [trialCodeLoading,setTrialCodeLoading]=useState(false);

    if(!user){onAuth("register");return;}
    setShowTrialCode(id);
    setTrialCodeInput('');
    setTrialCodeErr('');
  };
  const submitTrialCode=async()=>{
    if(!trialCodeInput.trim()){setTrialCodeErr("Saisissez un code d'essai.");return;}

                      <div key={star} style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:140}}>
                        <span style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,minWidth:14}}>{star}★</span>
                        <div style={{flex:1,height:6,background:C.dim,borderRadius:3,overflow:"hidden"}}>

                        </div>
                        <span style={{fontFamily:SS,fontSize:10,color:C.stone,minWidth:30,textAlign:"right"}}>{count}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Review cards */}
              <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"1fr 1fr",gap:14}}>

                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:36,height:36,borderRadius:8,background:C.ink,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.gold,fontFamily:SF}}>{rv.author.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
                        <div>
                          <div style={{fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink}}>{rv.author}</div>
                          <div style={{fontFamily:SS,fontSize:10,color:C.stone}}>{rv.company}</div>
                        </div>
                      </div>
                      <div style={{fontFamily:SS,fontSize:10,color:C.sand}}>{rv.date}</div>
                    </div>
                    <Stars r={rv.rating} sm/>
                    <p style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.65,marginTop:10,margin:0}}>"{rv.text}"</p>
                  </div>
                ))}
              </div>
              {(!detail.userReviews||detail.userReviews.length===0)&&(
                <div style={{background:C.paper,border:`1px dashed ${C.linen}`,borderRadius:10,padding:"28px",textAlign:"center"}}>
                  <div style={{fontFamily:SS,fontSize:13,color:C.stone}}>Aucun avis pour le moment. Soyez le premier à donner votre avis !</div>
                </div>
              )}
            </div>

            {/* Bottom CTA */}
            <div style={{background:`linear-gradient(135deg,${C.ink},#1a1510)`,borderRadius:12,padding:"30px 36px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:20}}>
              <div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ivory,marginBottom:6}}>Lancez-vous avec {detail.name}</div>
                <div style={{fontFamily:SS,fontSize:13,color:"rgba(255,255,255,0.45)",lineHeight:1.6}}>Code d'essai disponible · Sans engagement · Support inclus</div>
              </div>
              <div style={{display:"flex",gap:10,flexShrink:0}}>
                {!isSub(detail.id)&&!isTrial(detail.id)&&user&&<button onClick={()=>startTrial(detail.id)} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Entrer un code d'essai</button>}
                {!user&&<button onClick={()=>onAuth("register")} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Créer un compte gratuit</button>}
                {isSub(detail.id)&&<button onClick={()=>{openSoftwareApp(detail);setDetail(null);}} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Ouvrir le logiciel</button>}
                {isTrial(detail.id)&&!isSub(detail.id)&&<button onClick={()=>{openSoftwareApp(detail);setDetail(null);}} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Ouvrir le logiciel</button>}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Panier */}
      {showCart&&(
        <Overlay title="Mon panier" subtitle="Vos logiciels sélectionnés" onClose={()=>setShowCart(false)}>
          {cartItems.map((sw,i)=>(
            <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0"}}>
              <span style={{fontSize:20}}>{sw.icon}</span>
              <div style={{flex:1}}><div style={{fontFamily:SS,fontWeight:700,fontSize:13,color:C.ink}}>{sw.name}</div><div style={{fontFamily:SS,fontSize:11,color:C.stone}}>{sw.cat}</div></div>
              <span style={{fontFamily:SF,fontWeight:700,fontSize:14,color:C.ink}}>{sw.price}€/mois</span>
              <button onClick={()=>toggleCart(sw.id)} style={{background:"none",border:"none",color:C.stone,cursor:"pointer"}}>✕</button>
            </div>{i<cartItems.length-1&&<HR/>}</div>
          ))}
          <HR s={{margin:"12px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
            <span style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total mensuel</span>
            <span style={{fontFamily:SF,fontWeight:700,fontSize:17,color:C.ink}}>{cartTotal} €</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowCart(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Continuer</button>
            <button onClick={()=>{setShowCart(false);setShowPay(true);}} style={{flex:2,background:C.gold,border:"none",borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Passer au paiement</button>
          </div>
        </Overlay>
      )}

      {/* Paiement — Récap puis redirection Stripe */}
      {showPay&&(
        <Overlay title="Paiement" subtitle="Abonnement mensuel · résiliable à tout moment" onClose={()=>setShowPay(false)}>
          <div style={{background:C.dim,border:`1px solid ${C.linen}`,borderRadius:6,padding:13,marginBottom:14}}>
            {cartItems.map(sw=><div key={sw.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontFamily:SS,fontSize:12}}><span style={{color:C.ink}}>{sw.icon} {sw.name}</span><span style={{color:C.gold,fontWeight:700}}>{sw.price}€</span></div>)}
            <HR s={{margin:"9px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,textTransform:"uppercase"}}>Total / mois</span><span style={{fontFamily:SF,fontWeight:700,fontSize:14,color:C.ink}}>{cartTotal} €</span></div>
          </div>
          <div style={{background:C.greenDim,border:`1px solid ${C.green}33`,borderRadius:6,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🔒</span>
            <div><div style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.green}}>Paiement sécurisé par Stripe</div><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2}}>Vous allez être redirigé vers la page de paiement sécurisée Stripe</div></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowPay(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"11px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Annuler</button>
            <button onClick={pay} style={{flex:2,background:C.gold,border:"none",borderRadius:4,padding:"11px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Payer avec Stripe · {cartTotal}€/mois</button>
          </div>
        </Overlay>
      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

      {/* Modal Code d'essai */}
      {showTrialCode&&(
        <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(10,10,8,0.55)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}} onClick={()=>setShowTrialCode(null)}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:isMob()?"16px 14px":"32px 36px",width:420,maxWidth:"94vw",boxShadow:"0 24px 60px rgba(0,0,0,0.18)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:SF,fontSize:20,fontWeight:700,color:C.ink}}>🔑 Code d'essai</div>
              <button onClick={()=>setShowTrialCode(null)} style={{background:"none",border:"none",fontSize:18,color:C.stone,cursor:"pointer"}}>✕</button>
            </div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:20,lineHeight:1.6}}>
              Entrez votre code d'essai pour tester <strong style={{color:C.ink}}>{software.find(s=>s.id===showTrialCode)?.name}</strong> gratuitement. Demandez un code à notre équipe commerciale.
            </div>
            <div style={{marginBottom:16}}>
              <input type="text" value={trialCodeInput} onChange={e=>setTrialCodeInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&submitTrialCode()} placeholder="ONIQ-XXXX-XXXX-XXXX" style={{width:"100%",padding:"14px 16px",border:`2px solid ${trialCodeErr?'#b52020':C.linen}`,borderRadius:8,fontFamily:"monospace",fontSize:16,fontWeight:700,letterSpacing:"0.08em",textAlign:"center",color:C.ink,background:C.dim,boxSizing:"border-box",outline:"none"}} autoFocus/>
            </div>
            {trialCodeErr&&<div style={{fontFamily:SS,fontSize:12,color:"#b52020",marginBottom:14,background:"#fde8e8",padding:"10px 14px",borderRadius:6}}>{trialCodeErr}</div>}
            <button disabled={trialCodeLoading} onClick={submitTrialCode} style={{width:"100%",background:C.gold,border:"none",borderRadius:6,padding:14,fontFamily:SS,fontSize:12,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:trialCodeLoading?0.7:1}}>{trialCodeLoading?"Vérification...":"Activer mon essai"}</button>
            <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:14,textAlign:"center",lineHeight:1.5}}>Pas de code ? <a href="mailto:contact@oniq.fr" style={{color:C.gold,fontWeight:600}}>Contactez-nous</a> pour en obtenir un.</div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Mon Espace ─────────────────────────────────────────────────────────────
const MonEspace=({user,setUser,software})=>{
  const isAdmin=user?.role==='admin';
  const myApps=isAdmin?software:software.filter(s=>user.subs.includes(s.id));
  const myTrials=isAdmin?[]:software.filter(s=>!user.subs.includes(s.id)&&isTrialActive(user.trials?.[s.id]));
  const mrr=myApps.reduce((s,x)=>s+x.price,0);
  const [unsub,setUnsub]=useState(null);
  const [toast,setToast]=useState(null);
  const [accessMap,setAccessMap]=useState({});
  const [loadingAccess,setLoadingAccess]=useState(true);

  useEffect(()=>{
    let mounted=true;
    async function loadAccess(){
      if(!user?.id){
        if(mounted){setAccessMap({});setLoadingAccess(false);}
        return;
      }
      setLoadingAccess(true);
      const map=await getSoftwareAccessMap(user.id);
      if(mounted){
        setAccessMap(map||{});
        setLoadingAccess(false);
      }
    }
    loadAccess();
    return ()=>{mounted=false;};
  },[user?.id,myApps.length]);

  const doUnsub=()=>{
    const sw=software.find(s=>s.id===unsub);
    if(sw) removeUserSub(user.id,sw.slug);
    setUser(u=>({...u,subs:u.subs.filter(x=>x!==unsub)}));
    setAccessMap(prev=>{const next={...prev}; delete next[sw?.slug]; return next;});
    setUnsub(null);
    setToast("Désabonnement effectué.");
    setTimeout(()=>setToast(null),3000);
  };

  const appStatuses=myApps.map(sw=>({ sw, access:accessMap[sw.slug]||null, active:isAccessActiveRecord(accessMap[sw.slug]||null) }));
  const activeCount=appStatuses.filter(x=>x.active).length;
  const nextExpiry=appStatuses.filter(x=>x.access?.access_end).sort((a,b)=>new Date(a.access.access_end)-new Date(b.access.access_end))[0]?.access?.access_end||null;
  const statusLabel=loadingAccess?"Synchronisation...":activeCount>0?`${activeCount} accès actif${activeCount>1?'s':''}`:"Aucun accès actif";
  const invoices=[{id:"INV-2024-104",amount:mrr,date:"01 Déc 2024",status:"paid"},{id:"INV-2024-089",amount:Math.max(0,mrr-5),date:"01 Nov 2024",status:"paid"},{id:"INV-2024-074",amount:Math.max(0,mrr-5),date:"01 Oct 2024",status:"paid"}];

  return (
    <div style={{padding:isMob()?"16px 12px":"28px 36px"}}>
      <div style={{marginBottom:22}}>
        <div style={{fontFamily:SS,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.stone,marginBottom:4}}>Mon espace</div>
        <h1 style={{margin:0,fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink}}>Bonjour, {user.company} 👋</h1>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <KPI label="Abonnement mensuel" value={`${mrr} €`} sub={`${myApps.length} logiciel${myApps.length>1?"s":""} souscrit${myApps.length>1?"s":""}`} accent/>
        <KPI label="Accès actifs" value={loadingAccess?"...":activeCount} sub={statusLabel}/>
        <KPI label="Prochaine échéance" value={nextExpiry?formatAccessDate(nextExpiry):"—"} sub={nextExpiry?"Renouvellement à surveiller":"Aucune échéance"}/>
        <KPI label="Client depuis" value={user.since||"2024"} sub="Membre ONIQ"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"1fr 1fr",gap:window.innerWidth<=768?12:18}}>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>Mes logiciels</span>
            <span style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone}}>{statusLabel}</span>
          </div>
          {myApps.length===0&&<div style={{padding:"22px 18px",fontFamily:SS,fontSize:13,color:C.stone,textAlign:"center"}}>Aucun logiciel souscrit.</div>}
          {appStatuses.map(({sw,access,active},i)=>(
            <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px"}}>
              <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div>
                <div style={{fontFamily:SS,fontSize:10,color:active?C.green:C.red,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>● {active?"Actif":"Inactif"} · {sw.price}€/mois</div>
                <div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:3}}>Fin d’accès : {access?.access_end?formatAccessDate(access.access_end):"—"}{access?.source?` · Source : ${access.source}`:""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>openSoftwareProtected(sw.slug)} style={{background:C.ink,border:"none",borderRadius:4,padding:"6px 10px",fontFamily:SS,fontSize:9,fontWeight:700,color:C.ivory,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>Ouvrir</button>
                <button onClick={()=>setUnsub(sw.id)} style={{background:"none",border:`1px solid ${C.linen}`,borderRadius:4,padding:"5px 9px",fontFamily:SS,fontSize:10,color:C.stone,cursor:"pointer"}}>✕</button>
              </div>
            </div>{i<appStatuses.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
          ))}
          {myTrials.length>0&&(
            <>
              <div style={{padding:"9px 18px",background:C.goldDim,borderTop:`1px solid ${C.linen}`,fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.gold}}>Essais en cours</div>
              {myTrials.map((sw,i)=>(
                <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px"}}>
                  <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
                  <div style={{flex:1}}><div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div><div style={{fontFamily:SS,fontSize:10,color:C.gold,fontWeight:700,marginTop:2}}>{trialDaysLeft(user.trials[sw.id])} jours restants</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><button onClick={()=>openSoftwareApp(sw)} style={{background:C.ink,border:"none",borderRadius:4,padding:"5px 12px",fontFamily:SS,fontSize:10,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>Ouvrir</button><button onClick={()=>toggleCart(sw.id)} style={{background:C.goldDim,border:`1px solid ${C.gold}55`,borderRadius:4,padding:"5px 10px",fontFamily:SS,fontSize:9,fontWeight:700,color:C.gold,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>S'abonner</button></div>
                </div>{i<myTrials.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
              ))}
            </>
          )}
          <div style={{padding:"11px 18px",borderTop:`1px solid ${C.linen}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total mensuel</span>
            <span style={{fontFamily:SF,fontWeight:700,fontSize:15,color:C.ink}}>{mrr} €</span>
          </div>
        </div>
        <div style={{display:"grid",gap:18}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`}}><span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>État de l'abonnement</span></div>
            <div style={{padding:"18px"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:6,padding:"12px 14px"}}><div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone,marginBottom:5}}>Statut</div><div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:activeCount>0?C.green:C.red}}>{loadingAccess?"Synchronisation":activeCount>0?"Actif":"Inactif"}</div></div>
                <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:6,padding:"12px 14px"}}><div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone,marginBottom:5}}>Prochaine fin d’accès</div><div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink}}>{nextExpiry?formatAccessDate(nextExpiry):"—"}</div></div>
              </div>
              <div style={{background:activeCount>0?C.greenDim:C.redDim,border:`1px solid ${activeCount>0?C.green+'33':C.red+'33'}`,borderRadius:6,padding:"12px 14px",fontFamily:SS,fontSize:12,color:activeCount>0?C.green:C.red,lineHeight:1.6}}>
                {loadingAccess?"Vérification des accès en cours…":activeCount>0?"Votre abonnement est bien synchronisé avec Stripe et vos accès logiciels sont ouverts.":"Aucun accès actif détecté. Vérifie ton paiement ou contacte le support."}
              </div>
            </div>
          </div>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`}}><span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>Mes factures</span></div>
            {invoices.map((inv,i)=>(
              <div key={inv.id}><div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 18px"}}>
                <div style={{flex:1}}><div style={{fontFamily:SS,fontSize:12,fontWeight:600,color:C.ink}}>{inv.id}</div><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2}}>{inv.date}</div></div>
                <span style={{fontFamily:SF,fontWeight:700,fontSize:13,color:C.ink,marginRight:10}}>{inv.amount} €</span>
                <Badge status={inv.status}/>
              </div>{i<invoices.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
            ))}
            <div style={{padding:"12px 18px",borderTop:`1px solid ${C.linen}`}}>
              <button style={{width:"100%",background:C.ink,border:"none",borderRadius:4,padding:11,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ivory,cursor:"pointer"}}>Payer maintenant · {mrr} €</button>
            </div>
          </div>
        </div>
      </div>
      {unsub&&(
        <div style={{position:"fixed",inset:0,background:"rgba(5,5,4,0.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:C.ivory,border:`1px solid ${C.linen}`,borderRadius:8,padding:36,width:320,textAlign:"center"}}>
            <div style={{fontFamily:SF,fontSize:17,fontWeight:700,color:C.ink,marginBottom:7}}>Se désabonner ?</div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:22}}>Vous perdrez l'accès à <strong>{software.find(s=>s.id===unsub)?.name}</strong> fin du mois.</div>

const SoftwareLaunchModal=({software,onClose})=>{
  if(!software)return null;
  const launcher=softwareLaunchers[software.slug];
  const iframeRef=React.useRef(null);
  
  useEffect(()=>{
    const CLOUD_TABLE='software_user_data';
    
    // Handler pour les messages de l'iframe BatiManager
    const handleBatiMessage=async(evt)=>{
      if(!evt.data||!evt.data.type)return;
      if(!supabaseClient)return;
      
      // BatiManager demande de sauvegarder
      if(evt.data.type==='bati-save'&&evt.data.data){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁ Parent: no user for save');return}
          const {error}=await supabaseClient.from(CLOUD_TABLE).upsert({
            user_id:userId,
            software_slug:software.slug,
            data_key:evt.data.key,
            data_value:evt.data.data,
            updated_at:new Date().toISOString()
          },{onConflict:'user_id,software_slug,data_key'});
          if(error){
            console.warn('☁ Parent save failed:',error.message);
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-error',error:error.message},'*');
          } else {
            console.log('☁ Parent save OK for BatiManager');
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-ok'},'*');
          }
        }catch(e){console.warn('☁ Parent save error:',e)}
      }
      
      // BatiManager demande de charger les données
      if(evt.data.type==='bati-load'){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁ Parent: no user for load');return}
          const {data:row,error}=await supabaseClient.from(CLOUD_TABLE)
            .select('data_value')
            .eq('user_id',userId)
            .eq('software_slug',software.slug)
            .eq('data_key',evt.data.key)
            .maybeSingle();
          if(error){console.warn('☁ Parent load failed:',error.message);return}
          console.log('☁ Parent load OK, has data:',!!row?.data_value);
          iframeRef.current?.contentWindow?.postMessage({type:'bati-cloud-data',data:row?.data_value||null},'*');
        }catch(e){console.warn('☁ Parent load error:',e)}
      }

      // BatiManager demande un appel Mistral chat via proxy sécurisé
      if(evt.data.type==='bati-mistral-request'&&evt.data.reqId){
        try{
          const result=await callMistralProxy(evt.data.payload);
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-response',reqId:evt.data.reqId,result},'*');
        }catch(e){
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-response',reqId:evt.data.reqId,error:e.message},'*');
        }
      }

      // BatiManager demande un appel Mistral OCR via proxy sécurisé
      // Le payload OCR utilise model:'mistral-ocr-latest' avec document_url (base64 PDF)
      // mistral-proxy attend un format chat/completions → on extrait le texte du PDF via vision
      if(evt.data.type==='bati-mistral-ocr-request'&&evt.data.reqId){
        try{
          const ocrPayload=evt.data.payload;
          let result;
          const docUrl=ocrPayload?.document?.document_url||ocrPayload?.document_url||''
          const isPdfBase64=docUrl.startsWith('data:application/pdf');
          if(isPdfBase64){
            // Envoyer le PDF via mistral-proxy en mode document (chat completions)
            const chatPayload={
              model:'mistral-small-latest',
              messages:[{
                role:'user',
                content:[
                  {type:'document',source:{type:'base64',media_type:'application/pdf',data:docUrl.split(',')[1]}},
                  {type:'text',text:'Extrais tout le texte de ce document PDF. Retourne uniquement le texte brut avec la mise en forme markdown.'}
                ]
              }],
              temperature:0.1
            };
            result=await callMistralProxy(chatPayload);
            // Adapter le résultat au format attendu par BatiManager (pages[].markdown)
            const text=result?.choices?.[0]?.message?.content||''
            result={pages:[{markdown:text,index:0}]};
          } else {
            // Format image ou texte : passer directement via mistral-proxy
            result=await callMistralProxy(ocrPayload);
          }
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-ocr-response',reqId:evt.data.reqId,result},'*');
        }catch(e){
          iframeRef.current?.contentWindow?.postMessage({type:'bati-mistral-ocr-response',reqId:evt.data.reqId,error:e.message},'*');
        }
      }
    };
    
    window.addEventListener('message',handleBatiMessage);

    // Envoyer le token Supabase à l'iframe après chargement
    const sendAuth=async()=>{
      if(!supabaseClient||!iframeRef.current)return;
      try{
        const {data}=await supabaseClient.auth.getSession();
        if(data?.session){
          const msg={type:'oniq-auth-token',access_token:data.session.access_token,refresh_token:data.session.refresh_token};
          const trySend=()=>{
            try{iframeRef.current?.contentWindow?.postMessage(msg,'*');}catch(e){}
          };
          setTimeout(trySend,500);
          setTimeout(trySend,1500);
          setTimeout(trySend,3000);
          setTimeout(trySend,5000);
        }
      }catch(e){console.warn('Auth token send failed:',e)}
    };
    sendAuth();
    
    return ()=>window.removeEventListener('message',handleBatiMessage);
  },[]);
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#fff'}}>
      <button onClick={onClose} style={{position:'fixed',bottom:18,left:18,zIndex:1001,background:'rgba(26,20,16,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:999,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#fff',cursor:'pointer',boxShadow:'0 8px 24px rgba(0,0,0,0.18)'}}>✕ Fermer</button>
      <iframe ref={iframeRef} title={software.name} src={launcher?.src} style={{position:'absolute',inset:0,width:'100%',height:'100%',border:'none',background:'#fff'}} sandbox="allow-scripts allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-pointer-lock"/>
    </div>
  );
};
