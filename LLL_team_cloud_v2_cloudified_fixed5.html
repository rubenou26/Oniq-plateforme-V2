// ═══════════════════════════════════════════════════════════════════
const CRM_STAGES=['prospect','contact','demo','negociation','closing','signe','perdu'];
const CRM_STAGE_LABELS={prospect:'🎯 Prospect',contact:'📞 Contacté',demo:'🖥️ Démo',negociation:'🤝 Négo',closing:'📝 Closing',signe:'✅ Signé',perdu:'❌ Perdu'};
const CRM_STAGE_COLORS={prospect:'#1a3f7a',contact:'#9a6800',demo:'#5b3d9e',negociation:'#b5651d',closing:'#2d6a4f',signe:'#1e6641',perdu:'#b52020'};
const MOIS_NOMS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const COMMISSION_RULES={
  prospect_close:{label:'Prospecté + Closé',rate_first_month:0.80,desc:'80% du 1er mois'},
  close_only:{label:'Closé uniquement',rate_first_month:0.40,desc:'40% du 1er mois'},
  custom_software:{label:'Logiciel clé en main',rate_creation:0.20,rate_first_month:0.80,desc:'20% du prix création + 80% du 1er mois'}
};
const INTERACTION_TYPES=['📞 Appel','📧 Email','📅 RDV','💬 Message','📋 Démo','📄 Devis envoyé','✅ Contrat signé','❌ Refus','⏸️ Pas de réponse'];

const crmUid=()=>Math.random().toString(36).substr(2,8);
const crmNow=()=>new Date().toISOString();
const crmMonth=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const normName=(n)=>(n||'').trim().toLowerCase().replace(/[^a-z0-9àâäéèêëïîôùûüç]/g,'');
const COOLDOWN_MONTHS=6;

const AdminCommercial=({software})=>{
  const [crm,setCrm]=useState(()=>getCRM());
  const [tab,setTab]=useState('dashboard');
  const [showAddCo,setShowAddCo]=useState(false);
  const [showAddLead,setShowAddLead]=useState(false);
  const [showAiProspect,setShowAiProspect]=useState(false);
  const [showObjModal,setShowObjModal]=useState(false);
  const [showInteraction,setShowInteraction]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiResults,setAiResults]=useState(null);
  const [aiSector,setAiSector]=useState('Bâtiment');
  const [aiRegion,setAiRegion]=useState('France');
  const [selCo,setSelCo]=useState('all');
  const [selPeriod,setSelPeriod]=useState(crmMonth());
  const [editLead,setEditLead]=useState(null);
  const [newCo,setNewCo]=useState({nom:'',email:'',tel:'',zone:''});
  const [newLead,setNewLead]=useState({entreprise:'',contact:'',email:'',tel:'',secteur:'Bâtiment',region:'',logiciel:software[0]?.slug||'',source:'Manuel',commercial:'',notes:'',valeur:0});
  const [newInteraction,setNewInteraction]=useState({type:'📞 Appel',note:'',date:new Date().toISOString().slice(0,16)});
  const [objForm,setObjForm]=useState({coId:'',month:crmMonth(),target_leads:20,target_demos:8,target_signed:3,target_ca:0});
  const [aiRelances,setAiRelances]=useState(null);
  const [aiRelLoading,setAiRelLoading]=useState(false);

  useEffect(()=>{
    let alive=true;
    loadCRMFromCloud().then(data=>{if(alive)setCrm(data);});
    return ()=>{alive=false;};
  },[]);

  const save=(d)=>{saveCRM(d);setCrm({...d})};
  const mob=isMob();
  const ls={fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,display:'block',marginBottom:6};
  const is={width:'100%',padding:'10px 12px',border:`1px solid ${C.linen}`,borderRadius:6,fontFamily:SS,fontSize:12,background:C.dim,boxSizing:'border-box'};

  // ══ DATA HELPERS ══
  const findDuplicate=(entreprise)=>{const n=normName(entreprise);return n?crm.leads.find(l=>normName(l.entreprise)===n):null};
  const isInCooldown=(lead)=>{if(!lead||lead.stage!=='perdu')return false;const lc=lead.history?.filter(h=>h.stage==='perdu').pop();if(!lc)return false;const e=new Date(lc.date);e.setMonth(e.getMonth()+COOLDOWN_MONTHS);return new Date()<e};
  const getCooldownEnd=(lead)=>{const lc=lead.history?.filter(h=>h.stage==='perdu').pop();if(!lc)return null;const d=new Date(lc.date);d.setMonth(d.getMonth()+COOLDOWN_MONTHS);return d};

  // ══ CRUD ══
  const addCommercial=()=>{if(!newCo.nom)return;const d={...crm};d.commerciaux.push({id:crmUid(),nom:newCo.nom,email:newCo.email,tel:newCo.tel,zone:newCo.zone,actif:true,createdAt:crmNow()});save(d);setNewCo({nom:'',email:'',tel:'',zone:''});setShowAddCo(false)};

  const addLead=(lead)=>{
    const ex=findDuplicate(lead.entreprise);
    if(ex){
      if(isInCooldown(ex)){alert(`⛔ "${ex.entreprise}" en cooldown ${COOLDOWN_MONTHS} mois.\nRecontact: ${getCooldownEnd(ex)?.toLocaleDateString('fr-FR')}`);return false}
      if(ex.stage==='signe'){alert(`✅ "${ex.entreprise}" est déjà client.`);return false}
      if(!['perdu'].includes(ex.stage)&&!confirm(`⚠️ "${ex.entreprise}" existe déjà (${CRM_STAGE_LABELS[ex.stage]}).\nCréer un doublon ?`))return false;
    }
    const d={...crm};
    const sw=software.find(s=>s.slug===lead.logiciel);
    d.leads.push({id:crmUid(),...lead,stage:'prospect',valeur:lead.valeur||(sw?.price||0),commission_type:lead.commission_type||'prospect_close',createdAt:crmNow(),interactions:[],history:[{stage:'prospect',date:crmNow(),note:'Lead créé'}]});
    save(d);return true;
  };

  const moveStage=(leadId,newStage,note)=>{
    const d={...crm};const l=d.leads.find(x=>x.id===leadId);
    if(l){l.stage=newStage;l.history.push({stage:newStage,date:crmNow(),note:note||''});if(newStage==='signe'){l.signedAt=crmNow()}if(newStage==='perdu'){l.lostAt=crmNow()}}
    save(d);setEditLead(null);
  };

  const addInteractionToLead=(leadId)=>{
    const d={...crm};const l=d.leads.find(x=>x.id===leadId);
    if(l){l.interactions.push({id:crmUid(),...newInteraction,date:newInteraction.date||crmNow()});l.lastContact=crmNow()}
    save(d);setNewInteraction({type:'📞 Appel',note:'',date:new Date().toISOString().slice(0,16)});setShowInteraction(null);
  };

  const saveObjectif=()=>{
    if(!objForm.coId)return;
    const d={...crm};const key=`${objForm.coId}-${objForm.month}`;
    d.objectifs=d.objectifs||[];
    const existing=d.objectifs.findIndex(o=>o.key===key);
    const obj={key,coId:objForm.coId,month:objForm.month,...objForm};
    if(existing>=0)d.objectifs[existing]=obj;else d.objectifs.push(obj);
    save(d);setShowObjModal(false);
  };

  // ══ COMMISSION CALC ══
  const calcCommission=(lead)=>{
    if(lead.stage!=='signe')return 0;
    const sw=software.find(s=>s.slug===lead.logiciel);
    const monthlyPrice=sw?.price||lead.valeur||0;
    const rule=COMMISSION_RULES[lead.commission_type||'prospect_close'];
    if(!rule)return 0;
    let com=monthlyPrice*(rule.rate_first_month||0);
    if(rule.rate_creation&&lead.creation_price)com+=lead.creation_price*rule.rate_creation;
    return com;
  };

  // ══ AI PROSPECTION ══
  const runAiProspect=async()=>{
    setAiLoading(true);setAiResults(null);
    try{
      const swList=software.map(s=>`${s.name}(${s.price}€/mois): ${s.desc}`).join('\n');
      const prompt=`Tu es un expert commercial B2B logiciels SaaS BTP en ${aiRegion}, secteur ${aiSector}.\n\nNos logiciels:\n${swList}\n\nGénère 10 entreprises FICTIVES mais RÉALISTES. JSON uniquement:\n[{"nom":"...","secteur":"...","taille":"TPE|PME|ETI|GE","ville":"...","contact":"...","poste":"...","email_probable":"...","logiciel":"batimanager|metrimanager","score":85,"raison":"...","ca_estime":"..."}]`;
      const data=await callMistralProxy({model:'mistral-small-latest',messages:[{role:'user',content:prompt}],temperature:0.7});
      const txt=data.choices?.[0]?.message?.content||'[]';
      setAiResults(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch(e){setAiResults([]);}
    setAiLoading(false);
  };

  const importAiLead=(r)=>{
    const ok=addLead({entreprise:r.nom,contact:r.contact,email:r.email_probable||'',tel:'',secteur:r.secteur,region:r.ville,logiciel:r.logiciel,source:'IA Prospection',commercial:selCo!=='all'?selCo:'',notes:`${r.poste} · ${r.taille} · Score:${r.score} · CA:${r.ca_estime||'?'} · ${r.raison}`,valeur:software.find(s=>s.slug===r.logiciel)?.price||0,commission_type:'prospect_close'});
    if(ok)setAiResults(prev=>prev.filter(x=>x.nom!==r.nom));
  };

  // ══ AI RELANCES ══
  const runAiRelances=async()=>{
    setAiRelLoading(true);setAiRelances(null);
    const staleLeads=crm.leads.filter(l=>!['signe','perdu'].includes(l.stage)).map(l=>{
      const lastInt=l.interactions?.slice(-1)[0];
      const daysSince=lastInt?Math.floor((Date.now()-new Date(lastInt.date).getTime())/86400000):Math.floor((Date.now()-new Date(l.createdAt).getTime())/86400000);
      return{id:l.id,entreprise:l.entreprise,contact:l.contact,stage:l.stage,daysSince,lastType:lastInt?.type||'Aucun contact',logiciel:l.logiciel};
    }).sort((a,b)=>b.daysSince-a.daysSince).slice(0,15);
    try{
      const prompt=`Tu es un directeur commercial expert. Voici des leads en cours sans nouvelle récente:\n${JSON.stringify(staleLeads)}\n\nPour chaque lead, suggère une action de relance concrète. Réponds en JSON:\n[{"id":"...","entreprise":"...","urgence":"haute|moyenne|basse","action":"phrase d'action concrète","script":"phrase d'accroche téléphonique"}]`;
      const data=await callMistralProxy({model:'mistral-small-latest',messages:[{role:'user',content:prompt}],temperature:0.5});
      setAiRelances(JSON.parse((data.choices?.[0]?.message?.content||'[]').replace(/```json|```/g,'').trim()));
    }catch(e){setAiRelances([]);}
    setAiRelLoading(false);
  };

  // ══ STATS ══
  const leads=selCo==='all'?crm.leads:crm.leads.filter(l=>l.commercial===selCo);
  const periodLeads=leads.filter(l=>l.createdAt?.startsWith(selPeriod));
  const byStage=(s)=>leads.filter(l=>l.stage===s);
  const signes=byStage('signe');
  const perdus=byStage('perdu');
  const cooldownLeads=crm.leads.filter(l=>isInCooldown(l));
  const pipeline=leads.filter(l=>!['signe','perdu'].includes(l.stage));
  const totalCA=signes.reduce((s,l)=>s+(l.valeur||0),0);
  const totalCommissions=signes.reduce((s,l)=>s+calcCommission(l),0);
  const txConv=leads.length>0?((signes.length/leads.length)*100).toFixed(1):0;

  // Stats par commercial pour leaderboard
  const coStats=crm.commerciaux.map(co=>{
    const cl=crm.leads.filter(l=>l.commercial===co.id);
    const cs=cl.filter(l=>l.stage==='signe');
    const ca=cs.reduce((s,l)=>s+(l.valeur||0),0);
    const com=cs.reduce((s,l)=>s+calcCommission(l),0);
    const pl=cl.filter(l=>!['signe','perdu'].includes(l.stage));
    const obj=(crm.objectifs||[]).find(o=>o.coId===co.id&&o.month===selPeriod);
    const periodSigned=cs.filter(l=>l.signedAt?.startsWith(selPeriod)).length;
    const periodDemos=cl.filter(l=>l.history?.some(h=>h.stage==='demo'&&h.date?.startsWith(selPeriod))).length;
    const periodLeads=cl.filter(l=>l.createdAt?.startsWith(selPeriod)).length;
    return{...co,total:cl.length,signes:cs.length,pipeline:pl.length,ca,com,tx:cl.length>0?((cs.length/cl.length)*100).toFixed(1):0,obj,periodSigned,periodDemos,periodLeads,
      interactions:cl.reduce((s,l)=>s+(l.interactions?.length||0),0),
      lastActivity:cl.reduce((latest,l)=>{const la=l.interactions?.slice(-1)[0]?.date||l.createdAt;return la>latest?la:latest},'')
    };
  }).sort((a,b)=>b.ca-a.ca);

  // ══ RENDER ══
  const KPI=({label,value,color,sub})=>React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:mob?'12px':'16px 18px',borderTop:`3px solid ${color}`}},
    React.createElement('div',{style:{fontFamily:SS,fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:C.stone,marginBottom:4}},label),
    React.createElement('div',{style:{fontFamily:SF,fontSize:mob?18:24,fontWeight:700,color}},value),
    sub&&React.createElement('div',{style:{fontFamily:SS,fontSize:9,color:C.stone,marginTop:2}},sub)
  );

  const TabBtn=({id,icon,label})=>React.createElement('button',{onClick:()=>setTab(id),style:{padding:mob?'6px 10px':'8px 18px',borderRadius:6,border:tab===id?'none':`1px solid ${C.linen}`,background:tab===id?C.ink:'transparent',color:tab===id?C.ivory:C.stone,fontFamily:SS,fontSize:mob?9:11,fontWeight:700,cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.06em'}},icon+' '+label);

  return React.createElement('div',{style:{padding:mob?'16px 12px':'28px 36px'}},
    React.createElement('div',{style:{fontFamily:SS,fontSize:9,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:4}},'CRM Commercial'),
    React.createElement('h1',{style:{margin:0,fontFamily:SF,fontSize:mob?22:30,fontWeight:700,color:C.ink,marginBottom:8}},'Gestion Commerciale'),
    React.createElement('div',{style:{fontFamily:SS,fontSize:11,color:C.stone,marginBottom:20}},'Période : '+selPeriod),

    // KPIs
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:mob?'1fr 1fr':'repeat(4,1fr)',gap:mob?8:14,marginBottom:20}},
      React.createElement(KPI,{label:'Pipeline actif',value:pipeline.length,color:'#1a3f7a',sub:periodLeads.length+' ce mois'}),
      React.createElement(KPI,{label:'Signés',value:signes.length,color:'#1e6641',sub:'Tx conv: '+txConv+'%'}),
      React.createElement(KPI,{label:'CA Généré',value:totalCA.toLocaleString('fr-FR')+'€',color:'#5b3d9e',sub:totalCA>0?((totalCA/12)).toLocaleString('fr-FR',{maximumFractionDigits:0})+'€/mois MRR':''}),
      React.createElement(KPI,{label:'Commissions',value:totalCommissions.toLocaleString('fr-FR',{maximumFractionDigits:0})+'€',color:'#b5651d',sub:crm.commerciaux.length+' commerciaux'})
    ),

    // Tabs
    React.createElement('div',{style:{display:'flex',gap:6,marginBottom:20,flexWrap:'wrap'}},
      React.createElement(TabBtn,{id:'dashboard',icon:'📊',label:'Dashboard'}),
      React.createElement(TabBtn,{id:'pipeline',icon:'🔄',label:'Pipeline'}),
      React.createElement(TabBtn,{id:'leaderboard',icon:'🏆',label:'Leaderboard'}),
      React.createElement(TabBtn,{id:'commerciaux',icon:'👥',label:'Équipe'}),
      React.createElement(TabBtn,{id:'objectifs',icon:'🎯',label:'Objectifs'}),
      React.createElement(TabBtn,{id:'relances',icon:'🤖',label:'Relances IA'}),
      React.createElement(TabBtn,{id:'prospection',icon:'🔍',label:'Prospection IA'})
    ),

    // Filtre commercial + période
    React.createElement('div',{style:{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap',alignItems:'center'}},
      React.createElement('select',{value:selCo,onChange:e=>setSelCo(e.target.value),style:{...is,width:'auto'}},
        React.createElement('option',{value:'all'},'Tous les commerciaux'),
        crm.commerciaux.map(co=>React.createElement('option',{key:co.id,value:co.id},co.nom))
      ),
      React.createElement('input',{type:'month',value:selPeriod,onChange:e=>setSelPeriod(e.target.value),style:{...is,width:'auto'}}),
      React.createElement('button',{onClick:()=>setShowAddLead(true),style:{padding:'8px 16px',background:C.gold,border:'none',borderRadius:6,fontFamily:SS,fontSize:10,fontWeight:700,color:C.ink,cursor:'pointer'}},'+ Lead')
    ),

    // ═══ TAB DASHBOARD ═══
    tab==='dashboard'&&React.createElement('div',null,
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:mob?'1fr':'1fr 1fr',gap:14,marginBottom:20}},
        // Pipeline par étape
        React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'18px 20px'}},
          React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink,marginBottom:14}},'Pipeline par étape'),
          CRM_STAGES.filter(s=>s!=='perdu').map(s=>React.createElement('div',{key:s,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${C.linen}`}},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
              React.createElement('div',{style:{width:10,height:10,borderRadius:'50%',background:CRM_STAGE_COLORS[s]}}),
              React.createElement('span',{style:{fontFamily:SS,fontSize:12,color:C.ink}},CRM_STAGE_LABELS[s])
            ),
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
              React.createElement('div',{style:{width:Math.max(20,Math.min(150,byStage(s).length*15)),height:8,background:CRM_STAGE_COLORS[s]+'44',borderRadius:4}},
                React.createElement('div',{style:{width:'100%',height:'100%',background:CRM_STAGE_COLORS[s],borderRadius:4}})
              ),
              React.createElement('span',{style:{fontFamily:SS,fontSize:12,fontWeight:700,color:CRM_STAGE_COLORS[s],minWidth:24,textAlign:'right'}},byStage(s).length)
            )
          ))
        ),
        // Activité récente
        React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'18px 20px'}},
          React.createElement('div',{style:{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink,marginBottom:14}},'Activité récente'),
          crm.leads.flatMap(l=>(l.interactions||[]).map(i=>({...i,lead:l.entreprise}))).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,8).map((i,idx)=>
            React.createElement('div',{key:idx,style:{padding:'6px 0',borderBottom:`1px solid ${C.linen}`,display:'flex',gap:8,alignItems:'flex-start'}},
              React.createElement('div',{style:{fontFamily:SS,fontSize:9,color:C.stone,minWidth:60}},new Date(i.date).toLocaleDateString('fr-FR')),
              React.createElement('div',null,
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,fontWeight:600,color:C.ink}},i.lead),
                React.createElement('div',{style:{fontFamily:SS,fontSize:10,color:C.stone}},i.type+(i.note?' — '+i.note.slice(0,50):''))
              )
            )
          ),
          crm.leads.flatMap(l=>l.interactions||[]).length===0&&React.createElement('div',{style:{fontFamily:SS,fontSize:12,color:C.stone,textAlign:'center',padding:20}},'Aucune interaction')
        )
      ),
      // Cooldown + stats
      cooldownLeads.length>0&&React.createElement('div',{style:{background:'#fde8e8',border:'1px solid #f5b8b8',borderRadius:8,padding:'12px 16px',marginBottom:16}},
        React.createElement('div',{style:{fontFamily:SS,fontSize:11,fontWeight:700,color:'#b52020'}},'⛔ '+cooldownLeads.length+' entreprise'+(cooldownLeads.length>1?'s':'')+' en cooldown ('+COOLDOWN_MONTHS+' mois)')
      )
    ),

    // ═══ TAB PIPELINE ═══
    tab==='pipeline'&&React.createElement('div',null,
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:mob?'1fr':`repeat(${CRM_STAGES.length},1fr)`,gap:8,overflowX:mob?'auto':'visible'}},
        CRM_STAGES.map(stage=>
          React.createElement('div',{key:stage,style:{background:C.dim,borderRadius:10,padding:'10px 8px',minHeight:mob?'auto':300}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,padding:'0 4px'}},
              React.createElement('div',{style:{fontFamily:SS,fontSize:9,fontWeight:700,color:CRM_STAGE_COLORS[stage],textTransform:'uppercase',letterSpacing:'0.06em'}},CRM_STAGE_LABELS[stage]),
              React.createElement('div',{style:{background:CRM_STAGE_COLORS[stage]+'22',color:CRM_STAGE_COLORS[stage],fontFamily:SS,fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:10}},byStage(stage).length)
            ),
            byStage(stage).map(l=>
              React.createElement('div',{key:l.id,onClick:()=>setEditLead(l),style:{background:isInCooldown(l)?'#fde8e8':C.paper,border:`1px solid ${isInCooldown(l)?'#f5b8b8':C.linen}`,borderRadius:6,padding:'8px 10px',marginBottom:6,cursor:'pointer',borderLeft:`3px solid ${CRM_STAGE_COLORS[stage]}`,opacity:isInCooldown(l)?0.65:1}},
                React.createElement('div',{style:{fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink}},l.entreprise),
                React.createElement('div',{style:{fontFamily:SS,fontSize:9,color:C.stone,marginTop:2}},l.contact),
                l.valeur>0&&React.createElement('div',{style:{fontFamily:SS,fontSize:9,fontWeight:700,color:C.gold,marginTop:3}},l.valeur+'€/mois'),
                isInCooldown(l)&&React.createElement('div',{style:{fontFamily:SS,fontSize:8,fontWeight:700,color:'#b52020',marginTop:3}},'⛔ Cooldown → '+getCooldownEnd(l)?.toLocaleDateString('fr-FR')),
                React.createElement('div',{style:{fontFamily:SS,fontSize:8,color:C.stone,marginTop:3}},
                  (l.interactions?.length||0)+' interactions'+(crm.commerciaux.find(c=>c.id===l.commercial)?' · '+crm.commerciaux.find(c=>c.id===l.commercial).nom:'')
                )
              )
            )
          )
        )
      )
    ),

    // ═══ TAB LEADERBOARD ═══
    tab==='leaderboard'&&React.createElement('div',null,
      React.createElement('div',{style:{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink,marginBottom:16}},'🏆 Classement des commerciaux'),
      coStats.length===0?React.createElement('div',{style:{textAlign:'center',padding:40,color:C.stone,fontFamily:SS}},'Ajoutez des commerciaux pour voir le classement'):
      React.createElement('div',{style:{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,overflow:'hidden'}},
        React.createElement('div',{style:{overflowX:'auto'}},
          React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontFamily:SS,fontSize:12}},
            React.createElement('thead',null,

// ── Persistance des abonnements dans Supabase ──
async function loadUserSubs(userId, softwareList){
  if(!supabaseClient||!userId)return [];
  try{
    const {data,error}=await supabaseClient.from("software_access").select("software_slug,access_end").eq("user_id",userId);
    console.log('☁️ loadUserSubs result:',{data,error,userId});
    if(error||!data)return [];
    const now=new Date();
    const activeSlugs=data.filter(r=>new Date(r.access_end)>now).map(r=>r.software_slug);
    const ids=softwareList.filter(s=>activeSlugs.includes(s.slug)).map(s=>s.id);
    console.log('☁️ Active subs:',activeSlugs,'→ IDs:',ids);
    return ids;
  }catch(e){console.warn('loadUserSubs error:',e);return []}
}

async function saveUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId){console.warn('saveUserSub: missing client or userId');return}
  try{
    const accessEnd=new Date();
    accessEnd.setFullYear(accessEnd.getFullYear()+10);
    // Essayer d'abord un upsert
    const {data,error}=await supabaseClient.from("software_access").upsert({
      user_id:userId,
      software_slug:softwareSlug,
      access_end:accessEnd.toISOString()
    },{onConflict:'user_id,software_slug'});
    if(error){
      console.warn('☁️ saveUserSub upsert failed, trying insert:',error.message);
      // Fallback: essayer un simple insert
      const {error:err2}=await supabaseClient.from("software_access").insert({
        user_id:userId,
        software_slug:softwareSlug,
        access_end:accessEnd.toISOString()
      });
      if(err2) console.error('☁️ saveUserSub insert also failed:',err2.message);
      else console.log('☁️ saveUserSub insert OK for',softwareSlug);
    } else {
      console.log('☁️ saveUserSub OK for',softwareSlug);
    }
  }catch(e){console.error('saveUserSub error:',e)}
}

async function removeUserSub(userId, softwareSlug){
  if(!supabaseClient||!userId)return;
  try{
    await supabaseClient.from("software_access").delete().eq("user_id",userId).eq("software_slug",softwareSlug);
  }catch(e){console.warn('removeUserSub error:',e)}
}

  useEffect(()=>{

    loadDemoDevisFromCloud().then(rows=>{ if(active && Array.isArray(rows) && rows.length){ setDevis(rows); } devisReadyRef.current=true; });

  },[]);

  },[users]);

  useEffect(()=>{
    if(!devisReadyRef.current) return;
    saveDemoDevisToCloud(devis);
  },[devis]);

  useEffect(()=>{
    let active=true;
    async function loadTeamContext(){
      if(!teamMode || !teamToken){
        if(active){setTeamInvite(null);setTeamOwner(null);setTeamLoading(false);}
        return;
      }
      setTeamLoading(true);
      const invite=await getTeamInviteByToken(teamToken);
      if(!active) return;
      setTeamInvite(invite||null);
      if(!invite){
        setTeamOwner(null);
        setTeamLoading(false);
        return;
      }
      const fallback=users.find(u=>String(u.id)===String(invite.owner_id) || (invite.owner_email && u.email===invite.owner_email)) || USERS_DB.find(u=>String(u.id)===String(invite.owner_id) || (invite.owner_email && u.email===invite.owner_email)) || {};
      const ownerSubs=invite.owner_id?await loadUserSubs(invite.owner_id, SW_DB):[];
      const ownerProfile=invite.owner_id?await loadUserProfileCloud(invite.owner_id):null;
      if(!active) return;
      setTeamOwner({
        id:invite.owner_id,
        email:invite.owner_email||fallback.email||'',
        company:invite.owner_company||ownerProfile?.company||fallback.company||'Entreprise',
        companyLogo:ownerProfile?.company_logo_url||fallback.companyLogo||'',
        subs:ownerSubs.length?ownerSubs:(fallback.subs||[])
      });
      setTeamLoading(false);
    }
    loadTeamContext();
    return ()=>{active=false;};
  },[teamMode,teamToken,users]);

  useEffect(()=>{
    let mounted=true;
    async function restoreSession(){
      if(!supabaseClient) return;
      const { data, error } = await supabaseClient.auth.getSession();
      if(error){console.error("Erreur session:", error);return;}
      const authUser=data?.session?.user;
      if(!authUser || !mounted) return;
      setShowAuth(false);
      const profile=await loadUserProfileCloud(authUser.id);
      const existing=users.find(u=>u.email===authUser.email)||USERS_DB.find(u=>u.email===authUser.email)||null;
      const mapped=mapAuthUserToDemoUser(authUser,{...(existing||{}),...(profile||{})});
      const cloudSubs=await loadUserSubs(authUser.id, SW_DB);
      if(cloudSubs.length>0) mapped.subs=cloudSubs;
      if(profile?.trials) mapped.trials=profile.trials;
      setUser(mapped);
      setView(mapped.role==="admin"?"a-dashboard":"c-espace");
      setUsers(prev=>{
        const ex=prev.find(x=>String(x.id)===String(mapped.id)||x.email===mapped.email);
        return ex?prev.map(x=>(String(x.id)===String(ex.id)||x.email===mapped.email)?{...ex,...mapped}:x):[...prev,mapped];
      });
    }
    restoreSession();
    return ()=>{mounted=false;};
  },[]);

  // ═══ Gérer le retour Stripe après paiement ═══
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const paymentStatus=params.get('payment');
    const checkoutToken=params.get('checkout_token')||'';
    if(paymentStatus==='success'){
      const waitAndRefresh=async()=>{
        try{
          let targetUserId=user?.id||'';
          if(checkoutToken){
            const pending=await getPendingCheckoutContext(checkoutToken);
            if(pending?.user_id) targetUserId=pending.user_id;
            await markPendingCheckoutStatus(checkoutToken,'success');
          }
          if(targetUserId){
            await syncSubsFromCloud(targetUserId, SW_DB, setUser, setUsers);
          }
        }catch(e){
          console.warn('Stripe refresh error:',e);
        }finally{
          window.history.replaceState({},'',window.location.pathname);
        }
      };
      setTimeout(waitAndRefresh, 2500);
    } else if(paymentStatus==='cancel'){
      if(checkoutToken) markPendingCheckoutStatus(checkoutToken,'cancelled');
      window.history.replaceState({},'',window.location.pathname);
    }
  },[user?.id]);

  useEffect(()=>{
    if(!supabaseClient) return;
    const { data: sub } = supabaseClient.auth.onAuthStateChange(async(_event, session)=>{
      const authUser=session?.user;
      if(authUser){
        setShowAuth(false);
        const profile=await loadUserProfileCloud(authUser.id);
        const existing=users.find(u=>u.email===authUser.email)||USERS_DB.find(u=>u.email===authUser.email)||null;
        const mapped=mapAuthUserToDemoUser(authUser,{...(existing||{}),...(profile||{})});
        loadUserSubs(authUser.id, SW_DB).then(cloudSubs=>{
          if(cloudSubs.length>0){
            mapped.subs=cloudSubs;
            setUser(prev=>prev&&String(prev.id)===String(mapped.id)?{...prev,subs:cloudSubs}:prev);
          }
        }).catch(()=>{});
        if(profile?.trials) mapped.trials=profile.trials;
        setUser(mapped);
        setShowAuth(false);
        setView(mapped.role==="admin"?"a-dashboard":"c-espace");
        setUsers(prev=>{
          const ex=prev.find(x=>String(x.id)===String(mapped.id)||x.email===mapped.email);
          return ex?prev.map(x=>(String(x.id)===String(ex.id)||x.email===mapped.email)?{...ex,...mapped}:x):[...prev,mapped];
        });
      } else {
        setUser(null);
      }
    });
    return ()=>sub?.subscription?.unsubscribe?.();
  },[]);

  useEffect(()=>{
    if(user) setShowAuth(false);
  },[user]);

  const openAuth=(mode)=>{setAuthMode(mode);setShowAuth(true);};

  const login=(u,isNew)=>{
    setShowAuth(false);
    setUser(u);
    setUsers(p=>{
      const ex=p.find(x=>String(x.id)===String(u.id)||x.email===u.email);
      return ex?p.map(x=>(String(x.id)===String(ex.id)||x.email===u.email)?{...ex,...u}:x):[...p,u];
    });
    setView(u.role==="admin"?"a-dashboard":"c-market");
    Promise.resolve().then(()=>persistUserProfileCloud(u)).catch(err=>console.warn("persistUserProfileCloud login error:",err));
    if(isNew)setShowOnboard(true);
  };

  const logout=async()=>{
    try{
      if(supabaseClient) await supabaseClient.auth.signOut();
    }catch(e){
      console.error("Erreur déconnexion:", e);
    }
    setUser(null);
    setView("c-market");
  };

  const setUserSync=updater=>{
    setUser(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setUsers(us=>{
        const exists=us.some(u=>String(u.id)===String(next.id));
        return exists?us.map(u=>String(u.id)===String(next.id)?next:u):[...us,next];
      });
      persistUserProfileCloud(next);
      return next;
    });
  };

  useEffect(()=>{
    let mounted=true;
    async function loadSoftware(){
      if(!supabaseClient) return;
      const { data, error } = await supabaseClient.from("software_products").select("*").order("created_at",{ascending:true});
      if(error){console.error("Erreur chargement logiciels:", error);return;}
      if(!mounted || !Array.isArray(data) || data.length===0) return;
      const mapped=data.map((item,idx)=>{
        const fallback=SW_DB.find(sw=>sw.slug===item.slug)||SW_DB[idx]||{};
        return {
          ...fallback,
          id: item.id || fallback.id || Date.now()+idx,
          slug: item.slug || fallback.slug,
          name: item.name || fallback.name,
          desc: item.description || fallback.desc || "",
          longDesc: item.description || fallback.longDesc || "",
          price: Number(item.monthly_price ?? fallback.price ?? 0)
        };
      });
      setSoftware(mapped);
    }
    loadSoftware();
    return ()=>{mounted=false;};

function formatAccessDate(value){
  if(!value) return "—";
  const d=new Date(value);
  if(Number.isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function isAccessActiveRecord(record){
  if(!record?.access_end) return false;
  const end=new Date(record.access_end);
  return !Number.isNaN(end.getTime()) && end>new Date();
}

async function getSoftwareAccessMap(userId){
  if(!supabaseClient || !userId) return {};
  const { data, error } = await supabaseClient
    .from("software_access")
    .select("software_slug,access_start,access_end,source,created_at")
    .eq("user_id", userId)
    .order("access_end", { ascending:false });

  if(error || !Array.isArray(data)){
    console.error("Erreur getSoftwareAccessMap:", error);
    return {};
  }

  const out={};
  data.forEach(row=>{
    if(row?.software_slug && !out[row.software_slug]) out[row.software_slug]=row;
  });
  return out;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

// SECURITY CHECK ACCESS (fixed)
async function checkAccess(softwareSlug){
  if(!supabaseClient){
    console.error("Supabase non disponible");
    return false;
  }

  const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
  if(userError || !user){
    alert("Connecte-toi d'abord.");
    return false;
  }

  const { data, error } = await supabaseClient
    .from("software_access")
    .select("access_end")
    .eq("user_id", user.id)
    .eq("software_slug", softwareSlug)
    .order("access_end", { ascending:false })
    .limit(1)
    .maybeSingle();

  if(error){
    console.error("Erreur checkAccess:", error);
    return false;
  }

  if(!data || !data.access_end){
    return false;
  }

  return new Date(data.access_end) > new Date();
}

async function openSoftwareProtected(slug){
  const allowed = await checkAccess(slug);
  if(!allowed){
    alert("Ton accès n'est pas actif pour ce logiciel. Vérifie ton abonnement ou contacte le support.");
    return;
  }
  if(typeof go === "function"){
    go(slug);
    return;
  }
  console.warn("Fonction go(slug) introuvable");
}
