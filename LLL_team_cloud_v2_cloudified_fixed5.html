function useIsMobile(breakpoint=768){
  const [isMobile,setIsMobile]=useState(window.innerWidth<=breakpoint);
  useEffect(()=>{
    const handler=()=>setIsMobile(window.innerWidth<=breakpoint);
    window.addEventListener('resize',handler);
    return()=>window.removeEventListener('resize',handler);
  },[breakpoint]);
  return isMobile;
}

async function createStripeCheckout(cartItems, customerEmail, opts={}){
  const sw=Array.isArray(cartItems)?cartItems[0]:null;
  if(!sw)throw new Error("Aucun produit à payer.");

  const priceId=STRIPE_PRICES[sw.slug];
  if(!priceId)throw new Error(`priceId manquant pour : ${sw.slug||'inconnu'}`);

  const payload={
    priceId,
    email:customerEmail||"",
    softwareSlug:sw.slug,
    items:[{slug:sw.slug,priceId,quantity:1}],
    customerEmail:customerEmail||"",
    successUrl:opts.successUrl || (window.location.origin+window.location.pathname+'?payment=success'),
    cancelUrl:opts.cancelUrl || (window.location.origin+window.location.pathname+'?payment=cancel')
  };

  const resp=await fetch(CHECKOUT_FUNCTION_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const session=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(session.error||"Fonction create-checkout indisponible.");
  if(session.error)throw new Error(session.error);
  if(!session.url)throw new Error("URL Stripe introuvable.");
  return session;
}

async function callMistralProxy(payload){
  const resp=await fetch(MISTRAL_PROXY_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });
  const data=await resp.json().catch(()=>({}));
  if(!resp.ok)throw new Error(data.error||"Fonction mistral-proxy indisponible.");
  return data;
}

const supabaseUrl = "https://kxdxxhepewziazfnfnkq.supabase.co";

const supabaseClient = window.supabase ? supabase.createClient(supabaseUrl, supabaseKey) : null;

async function uploadCompanyLogoToCloud(file,userId){
  if(!supabaseClient) throw new Error("Supabase n'est pas configuré.");
  if(!userId) throw new Error("Utilisateur non connecté.");
  const ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'');
  const filePath=`${userId}/company-logo.${ext||'png'}`;
  const { error: uploadError } = await supabaseClient.storage
    .from(COMPANY_LOGO_BUCKET)
    .upload(filePath, file, { upsert:true, cacheControl:'3600' });
  if(uploadError) throw uploadError;
  const { data } = supabaseClient.storage.from(COMPANY_LOGO_BUCKET).getPublicUrl(filePath);
  return data?.publicUrl || "";
}

async function persistCompanyLogoUrl(userId, logoUrl){
  if(!supabaseClient||!userId||!logoUrl)return;
  const metadata = { companyLogoUrl: logoUrl, companyLogo: logoUrl };
  try{
    await supabaseClient.auth.updateUser({ data: metadata });
  }catch(e){
    console.warn('auth.updateUser companyLogo failed:',e);
  }
  try{
    await supabaseClient.from('user_profiles').upsert({ user_id:userId, company_logo_url:logoUrl }, { onConflict:'user_id' });
  }catch(e){
    console.warn('user_profiles upsert skipped:',e);
  }
}

async function syncSubsFromCloud(userId, softwareList, setUser, setUsers){
  const cloudSubs=await loadUserSubs(userId, softwareList);
  setUser(prev=>{
    if(!prev)return prev;
    const next={...prev,subs:cloudSubs};
    if(setUsers)setUsers(us=>us.map(u=>String(u.id)===String(next.id)?{...u,...next}:u));
    return next;
  });
  return cloudSubs;
}

const APP_STATE_TABLE='app_state';
const CHECKOUT_PENDING_TABLE='checkout_pending';
const DEFAULT_CRM_STATE={commerciaux:[],leads:[],objectifs:[]};
let TRIAL_CODES_CACHE=[];
let CRM_CACHE={...DEFAULT_CRM_STATE};

async function readAppState(key, fallback){
  if(!supabaseClient) return fallback;
  try{
    const { data, error } = await supabaseClient.from(APP_STATE_TABLE).select('value').eq('key', key).maybeSingle();
    if(error){console.warn('readAppState error:', key, error.message); return fallback;}
    return data?.value ?? fallback;
  }catch(e){console.warn('readAppState exception:', key, e); return fallback;}
}

async function writeAppState(key, value){
  if(!supabaseClient) return false;
  try{
    const { error } = await supabaseClient.from(APP_STATE_TABLE).upsert({key,value,updated_at:new Date().toISOString()},{onConflict:'key'});
    if(error){console.warn('writeAppState error:', key, error.message); return false;}
    return true;
  }catch(e){console.warn('writeAppState exception:', key, e); return false;}
}

async function loadCRMFromCloud(){
  const data=await readAppState('crm_v2', DEFAULT_CRM_STATE);
  CRM_CACHE=(data&&typeof data==='object')?{...DEFAULT_CRM_STATE,...data}:{...DEFAULT_CRM_STATE};
  return CRM_CACHE;
}
function getCRM(){return CRM_CACHE;}
async function saveCRM(d){ CRM_CACHE={...DEFAULT_CRM_STATE,...(d||{})}; return writeAppState('crm_v2', CRM_CACHE); }

async function createPendingCheckoutContext(user, cartItems){
  const token=(window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():`checkout-${Date.now()}-${Math.random().toString(36).slice(2,10)}`;
  if(!supabaseClient) return {token};
  try{
    const payload={
      token,
      user_id:user?.id||'',
      email:user?.email||'',
      cart:(cartItems||[]).map(sw=>({id:sw.id,slug:sw.slug,name:sw.name,price:sw.price})),
      status:'pending',
      created_at:new Date().toISOString()
    };
    const { error } = await supabaseClient.from(CHECKOUT_PENDING_TABLE).insert(payload);
    if(error) console.warn('createPendingCheckoutContext error:', error.message);
  }catch(e){console.warn('createPendingCheckoutContext exception:', e);}
  return {token};
}

async function getPendingCheckoutContext(token){
  if(!supabaseClient || !token) return null;
  try{
    const { data, error } = await supabaseClient.from(CHECKOUT_PENDING_TABLE).select('*').eq('token', token).maybeSingle();
    if(error){console.warn('getPendingCheckoutContext error:', error.message); return null;}
    return data||null;
  }catch(e){console.warn('getPendingCheckoutContext exception:', e); return null;}
}

async function markPendingCheckoutStatus(token, status){
  if(!supabaseClient || !token) return;
  try{ await supabaseClient.from(CHECKOUT_PENDING_TABLE).update({status}).eq('token', token); }catch(e){console.warn('markPendingCheckoutStatus exception:', e);}
}

async function loadActiveTeamInvites(ownerId){
  if(!supabaseClient || !ownerId) return [];
  try{
    const { data, error } = await supabaseClient.from('team_invites').select('*').eq('owner_id', String(ownerId)).in('status',['pending','active']).order('created_at',{ascending:false});
    if(error){console.warn('loadActiveTeamInvites error:', error.message); return [];}
    const now=Date.now();
    return (Array.isArray(data)?data:[]).filter(inv=>!inv.expires_at || new Date(inv.expires_at).getTime()>now);
  }catch(e){console.warn('loadActiveTeamInvites exception:', e); return [];}
}

async function revokeTeamInvite(inviteId){
  if(!supabaseClient || !inviteId) return;
  try{ await supabaseClient.from('team_invites').update({status:'revoked'}).eq('id', inviteId); }catch(e){console.warn('revokeTeamInvite exception:', e);}
}

const openSoftwareApp=(sw)=>{

const normalizeTeamSoftwareIds=value=>Array.isArray(value)?value.map(v=>Number(v)).filter(v=>!Number.isNaN(v)):[];
const mapTeamMemberRow=row=>row?({...row,ownerId:row.owner_id,userId:row.user_id,softwareIds:normalizeTeamSoftwareIds(row.software_ids),createdAt:row.created_at}):null;

async function createTeamInvite(owner){
  if(!supabaseClient) throw new Error('Supabase indisponible');
  const token=(window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():genCode()+genCode();
  const expiresAt=new Date(Date.now()+30*24*60*60*1000).toISOString();
  const { error } = await supabaseClient.from('team_invites').insert({
    token,
    owner_id:String(owner.id),
    owner_email:owner.email||'',
    owner_company:owner.company||'Mon entreprise',
    status:'active',
    created_at:new Date().toISOString(),
    expires_at:expiresAt
  });
  if(error) throw error;
  return token;
}

async function getTeamInviteByToken(token){
  if(!supabaseClient || !token) return null;
  const { data, error } = await supabaseClient.from('team_invites').select('*').eq('token', token).in('status',['pending','active']).maybeSingle();
  if(error){console.error('Erreur getTeamInviteByToken:', error); return null;}
  if(data?.expires_at && new Date(data.expires_at).getTime()<=Date.now()) return null;
  return data;
}

async function getOwnerTeamMembers(ownerId){
  if(!supabaseClient || !ownerId) return [];
  const { data, error } = await supabaseClient.from('team_members').select('*').eq('owner_id', String(ownerId)).order('created_at', {ascending:true});
  if(error){console.error('Erreur getOwnerTeamMembers:', error); return [];}
  return Array.isArray(data)?data.map(mapTeamMemberRow):[];
}

async function updateTeamMemberSoftware(memberId, softwareIds){
  if(!supabaseClient || !memberId) return;
  const { error } = await supabaseClient.from('team_members').update({software_ids:softwareIds}).eq('id', memberId);
  if(error) throw error;
}

async function updateTeamMemberStatus(memberId, status){
  if(!supabaseClient || !memberId) return;
  const { error } = await supabaseClient.from('team_members').update({status}).eq('id', memberId);
  if(error) throw error;
}

async function getTeamMemberByAuth(ownerId, userId){
  if(!supabaseClient || !ownerId || !userId) return null;
  const { data, error } = await supabaseClient.from('team_members').select('*').eq('owner_id', String(ownerId)).eq('user_id', String(userId)).maybeSingle();
  if(error){console.error('Erreur getTeamMemberByAuth:', error); return null;}
  return mapTeamMemberRow(data);
}

async function getTeamMemberByEmail(ownerId, email){
  if(!supabaseClient || !ownerId || !email) return null;
  const { data, error } = await supabaseClient.from('team_members').select('*').eq('owner_id', String(ownerId)).eq('email', String(email).toLowerCase()).maybeSingle();
  if(error){console.error('Erreur getTeamMemberByEmail:', error); return null;}
  return mapTeamMemberRow(data);
}

async function createOrUpdateTeamMember({ownerId,userId,email,name}){
  if(!supabaseClient) throw new Error('Supabase indisponible');
  const normalizedEmail=String(email||'').trim().toLowerCase();
  let existing=await getTeamMemberByEmail(ownerId, normalizedEmail);
  if(existing){
    const payload={user_id:String(userId),name:name||existing.name||normalizedEmail.split('@')[0],status:'active'};
    const { data, error } = await supabaseClient.from('team_members').update(payload).eq('id', existing.id).select('*').maybeSingle();
    if(error) throw error;
    return mapTeamMemberRow(data||{...existing,user_id:String(userId),name:payload.name,status:'active'});
  }
  const { data, error } = await supabaseClient.from('team_members').insert({
    owner_id:String(ownerId),
    user_id:String(userId),
    email:normalizedEmail,
    name:name||normalizedEmail.split('@')[0],
    status:'active',
    software_ids:[]
  }).select('*').maybeSingle();
  if(error) throw error;
  return mapTeamMemberRow(data);
}

async function createTeamSession(inviteToken, memberId){
  if(!supabaseClient || !inviteToken || !memberId) return;
  await supabaseClient.from('team_sessions').insert({invite_token:inviteToken,member_id:memberId});
}

const getMemberSoftwareIds=(member)=>normalizeTeamSoftwareIds(member?.softwareIds);

const Sparkline=({data})=>{
  const max=Math.max(...data),min=Math.min(...data),w=300,h=60,p=6;
  const x=(i)=>p+(i/(data.length-1))*(w-p*2);
  const y=(v)=>h-p-((v-min)/(max-min||1))*(h-p*2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} ${data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")} L${x(data.length-1)},${h} L${x(0)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:60}}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.25"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#g1)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r="3" fill={C.gold}/>
          <text x={x(i)} y={h} textAnchor="middle" style={{fontSize:8,fontFamily:SS,fill:C.stone}}>{MRR_MONTHS[i]}</text>
        </g>
      ))}
    </svg>
  );
};

const AuthModal=({onLogin,initMode,onClose})=>{
  const [mode,setMode]=useState(initMode||"login");
  const [step,setStep]=useState(1);
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [reg,setReg]=useState({company:"",name:"",email:"",sector:"",pass:"",pass2:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [resetMode,setResetMode]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const is={width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"12px 14px",fontFamily:SS,fontSize:13,color:C.ivory,outline:"none",boxSizing:"border-box"};
  const ls={fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:7};

  const doResetPassword=async()=>{
    setErr("");
    if(!email){setErr("Saisissez votre email.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const {error}=await supabaseClient.auth.resetPasswordForEmail(email.trim(),{
        redirectTo:window.location.origin+window.location.pathname
      });
      if(error){setErr(error.message||"Erreur lors de l'envoi.");return;}
      setResetSent(true);
    }catch(e){
      setErr(e?.message||"Erreur lors de l'envoi.");
    }finally{
      setLoading(false);
    }
  };

  const doLogin=async()=>{
    setErr("");
    if(!email||!pass){setErr("Saisissez votre email et votre mot de passe.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const loginEmail=email.trim().toLowerCase();
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: loginEmail,
        password: pass
      });
      if(error) throw error;
      let authUser=data?.user||null;
      if(!authUser){
        const { data: userData, error: userError } = await supabaseClient.auth.getUser();
        if(userError) throw userError;
        authUser=userData?.user||null;
      }
      if(!authUser) throw new Error("Connexion impossible.");
      const mappedUser=mapAuthUserToDemoUser(authUser);
      setLoading(false);
      onLogin(mappedUser,false);
      return;
    }catch(e){
      setErr(e?.message||"Connexion impossible.");
    }finally{
      setLoading(false);
    }
  };

  const doRegister=async()=>{
    setErr("");
    if(!reg.company||!reg.email||!reg.pass){setErr("Remplissez tous les champs.");return;}
    if(reg.pass!==reg.pass2){setErr("Mots de passe différents.");return;}
    if(!supabaseClient){setErr("Supabase n'est pas configuré.");return;}
    setLoading(true);
    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email: reg.email.trim(),
        password: reg.pass,
        options: {
          data: {
            company: reg.company,
            name: reg.name || reg.company,
            sector: reg.sector || ""
          },
          emailRedirectTo: "https://oniq-plateforme-v2.vercel.app"
        }
      });
      if(error){setErr(error.message||"Inscription impossible.");return;}

      if(data && data.user && !data.session){
        setErr("Compte créé. Vérifie ton email pour confirmer ton inscription.");
        setMode("login");
        setStep(1);
        return;
      }

      if(data && data.session && data.session.user){
        onLogin(mapAuthUserToDemoUser(data.session.user),true);
        return;
      }

      setErr("Compte créé. Vérifie ton email pour confirmer ton inscription.");
      setMode("login");
      setStep(1);
    }catch(e){
      setErr((e && e.message) ? e.message : "Inscription impossible.");
    }finally{
      setLoading(false);
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(5,5,4,0.88)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:C.deep,border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"44px 48px",width:380,position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:16,right:20,background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:18}}>✕</button>
        <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ivory,letterSpacing:4,marginBottom:4}}>ONIQ</div>
        <div style={{height:1,width:36,background:C.gold,marginBottom:20}}/>
        <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:6,padding:4,marginBottom:24}}>
          {[["login","Connexion"],["register","Inscription"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setMode(k);setStep(1);setErr("");}} style={{flex:1,padding:10,borderRadius:4,background:mode===k?"rgba(255,255,255,0.09)":"transparent",border:"none",color:mode===k?C.ivory:"rgba(255,255,255,0.33)",fontFamily:SS,fontSize:12,fontWeight:600,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {mode==="login"&&!resetMode&&(
          <>
            <div style={{marginBottom:12}}><label style={ls}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="vous@entreprise.fr" style={is}/></div>
            <div style={{marginBottom:8}}><label style={ls}>Mot de passe</label><input type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="••••••••" style={is}/></div>
            <div style={{textAlign:"right",marginBottom:16}}><button onClick={()=>{setResetMode(true);setErr("");setResetSent(false)}} style={{background:"none",border:"none",color:C.gold,fontFamily:SS,fontSize:11,cursor:"pointer",textDecoration:"underline",padding:0}}>Mot de passe oublié ?</button></div>
            {err&&<div style={{fontFamily:SS,fontSize:12,color:"#e87777",marginBottom:12,background:"rgba(168,60,60,0.15)",padding:"10px 14px",borderRadius:4}}>{err}</div>}
            <button disabled={loading} onClick={doLogin} style={{width:"100%",background:C.gold,border:"none",borderRadius:4,padding:13,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:loading?0.7:1}}>{loading?"Connexion...":"Se connecter"}</button>
          </>
        )}
        {mode==="login"&&resetMode&&(
          <>
            {!resetSent?(
              <>
                <div style={{fontFamily:SF,fontSize:15,color:C.ivory,marginBottom:6,fontWeight:600}}>Réinitialiser le mot de passe</div>
                <div style={{fontFamily:SS,fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:18,lineHeight:1.5}}>Entrez votre email, vous recevrez un lien pour créer un nouveau mot de passe.</div>
                <div style={{marginBottom:18}}><label style={ls}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doResetPassword()} placeholder="vous@entreprise.fr" style={is}/></div>
                {err&&<div style={{fontFamily:SS,fontSize:12,color:"#e87777",marginBottom:12,background:"rgba(168,60,60,0.15)",padding:"10px 14px",borderRadius:4}}>{err}</div>}
                <button disabled={loading} onClick={doResetPassword} style={{width:"100%",background:C.gold,border:"none",borderRadius:4,padding:13,fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.ink,cursor:"pointer",opacity:loading?0.7:1,marginBottom:14}}>{loading?"Envoi...":"Envoyer le lien"}</button>
                <button onClick={()=>{setResetMode(false);setErr("")}} style={{width:"100%",background:"none",border:"1px solid rgba(255,255,255,0.15)",borderRadius:4,padding:11,fontFamily:SS,fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.6)",cursor:"pointer"}}>← Retour à la connexion</button>
              </>
            ):(
              <>
                <div style={{textAlign:"center",padding:"20px 0"}}>
                  <div style={{fontSize:"2.5rem",marginBottom:14}}>📧</div>
                  <div style={{fontFamily:SF,fontSize:17,color:C.ivory,fontWeight:700,marginBottom:8}}>Email envoyé !</div>
                  <div style={{fontFamily:SS,fontSize:12,color:"rgba(255,255,255,0.55)",lineHeight:1.6,marginBottom:20}}>Un lien de réinitialisation a été envoyé à <strong style={{color:C.gold}}>{email}</strong>. Vérifiez votre boîte de réception (et vos spams).</div>
                  <button onClick={()=>{setResetMode(false);setResetSent(false);setErr("")}} style={{background:C.gold,border:"none",borderRadius:4,padding:"11px 28px",fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:C.ink,cursor:"pointer"}}>Retour à la connexion</button>
                </div>
              </>
            )}

        )}
        {mode==="register"&&step===1&&(
          <>
            <div style={{fontFamily:SF,fontSize:14,color:C.ivory,marginBottom:16}}>Étape 1 / 2 — Votre entreprise</div>
            {[["Nom de l'entreprise","company","text"],["Votre nom","name","text"],["Email professionnel","email","email"]].map(([l,k,t])=>(
              <div key={k} style={{marginBottom:11}}><label style={ls}>{l}</label><input type={t} value={reg[k]} onChange={e=>setReg(p=>({...p,[k]:e.target.value}))} style={is}/></div>
            ))}
            <div style={{marginBottom:14}}>
              <label style={ls}>Secteur</label>
              <select value={reg.sector} onChange={e=>setReg(p=>({...p,sector:e.target.value}))} style={{...is,appearance:"none",background:"rgba(255,255,255,0.07)"}}>
                <option value="">Choisir...</option>{SECTORS.map(s=><option key={s} value={s} style={{color:C.ink}}>{s}</option>)}
              </select>
            </div>
            {err&&<div style={{fontFamily:SS,fontSize:12,color:"#e87777",marginBottom:12,background:"rgba(168,60,60,0.15)",padding:"10px 14px",borderRadius:4}}>{err}</div>}
            <div style={{display:"flex",gap:10}}>

};

const Marketplace=({user,setUser,software,setView,onAuth})=>{
  const [cat,setCat]=useState("Tous");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("popular");
  const [cart,setCart]=useState([]);
  const [detail,setDetail]=useState(null);
  const [showCart,setShowCart]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const [toast,setToast]=useState(null);
  const [aiQ,setAiQ]=useState("");
  const [aiLoad,setAiLoad]=useState(false);
  const [aiRes,setAiRes]=useState(null);
  const [showAi,setShowAi]=useState(false);

  const CATS=["Tous",...Array.from(new Set(software.map(s=>s.cat)))];
  let list=software.filter(s=>(cat==="Tous"||s.cat===cat)&&s.name.toLowerCase().includes(search.toLowerCase()));
  if(sort==="popular")list=[...list].sort((a,b)=>b.reviews-a.reviews);
  if(sort==="rating")list=[...list].sort((a,b)=>b.rating-a.rating);
  if(sort==="price_asc")list=[...list].sort((a,b)=>a.price-b.price);
  if(sort==="price_desc")list=[...list].sort((a,b)=>b.price-a.price);

  const isSub=id=>user?.subs?.includes(id);
  const isTrial=id=>user&&isTrialActive(user.trials?.[id]);
  const isCart=id=>cart.includes(id);

  const [showTrialCode,setShowTrialCode]=useState(null);
  const [trialCodeInput,setTrialCodeInput]=useState('');
  const [trialCodeErr,setTrialCodeErr]=useState('');
  const [trialCodeLoading,setTrialCodeLoading]=useState(false);

  const startTrial=id=>{
    if(!user){onAuth("register");return;}
    setShowTrialCode(id);
    setTrialCodeInput('');
    setTrialCodeErr('');
  };
  const submitTrialCode=async()=>{
    if(!trialCodeInput.trim()){setTrialCodeErr("Saisissez un code d'essai.");return;}
    setTrialCodeLoading(true);setTrialCodeErr('');
    const result=await redeemTrialCode(trialCodeInput,user.id,user.email);
    setTrialCodeLoading(false);
    if(!result.ok){setTrialCodeErr(result.msg);return;}
    // Vérifier que le code correspond au bon logiciel
    const sw=software.find(s=>s.id===showTrialCode);
    if(sw&&result.slug!==sw.slug){setTrialCodeErr("Ce code est pour un autre logiciel.");return;}
    setUser(u=>({...u,trials:{...u.trials,[showTrialCode]:Date.now()}}));
    setShowTrialCode(null);
    setToast(`✓ ${result.msg}`);
    setTimeout(()=>setToast(null),4000);
    setDetail(null);
  };
  const toggleCart=id=>{if(!user){onAuth("register");return;}setCart(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
  const cartItems=software.filter(s=>cart.includes(s.id));
  const cartTotal=cartItems.reduce((s,x)=>s+x.price,0);
  const pay=async()=>{
    try{
      const pending=await createPendingCheckoutContext(user, cartItems);
      const params=new URLSearchParams({payment:'success'});
      if(pending?.token) params.set('checkout_token', pending.token);
      const cancelParams=new URLSearchParams({payment:'cancel'});
      if(pending?.token) cancelParams.set('checkout_token', pending.token);
      const session=await createStripeCheckout(cartItems, user.email, {
        successUrl:`${window.location.origin}${window.location.pathname}?${params.toString()}`,
        cancelUrl:`${window.location.origin}${window.location.pathname}?${cancelParams.toString()}`
      });
      if(session&&session.url){
        window.location.href=session.url;
        return;
      }
      throw new Error("Session de paiement indisponible.");
    }catch(e){
      console.error('Stripe error:',e);
      setToast("Paiement indisponible : "+e.message);
      setTimeout(()=>setToast(null),5000);
    }
  };

  const runAi=async()=>{
    if(!user){onAuth("register");return;}
    if(!aiQ.trim())return;
    setAiLoad(true);setAiRes(null);
    try{
      const catalog=software.map(s=>`id:${s.id} ${s.name}(${s.price}€): ${s.desc}`).join("\n");
      const prompt=`Catalogue:\n${catalog}\n\nBesoin: "${aiQ}"\n\nRéponds UNIQUEMENT en JSON sans markdown:\n{"message":"réponse courte","matches":[{"id":1,"reason":"raison"}],"noMatch":false}`;
      const data=await callMistralProxy({model:"mistral-small-latest",messages:[{role:"user",content:prompt}],temperature:0.3});
      if(data.error)throw new Error(data.error.message);
      const txt=data.choices?.[0]?.message?.content||"{}";
      setAiRes(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch(e){setAiRes({message:"Une erreur est survenue, réessayez.",matches:[],noMatch:true});}
    setAiLoad(false);
  };
  const aiMatches=aiRes?software.filter(s=>aiRes.matches?.some(m=>m.id===s.id)):[];

  return (
    <div style={{padding:isMob()?"16px 12px":"28px 36px"}}>

              <span>✦</span> Recherche IA
              {!user&&<span style={{fontSize:9,background:C.gold,color:C.ink,borderRadius:2,padding:"1px 5px",fontWeight:800,marginLeft:2}}>PRO</span>}
            </button>
            {user&&cart.length>0&&<button onClick={()=>setShowCart(true)} style={{background:C.gold,border:"none",borderRadius:6,padding:isMob()?"6px 12px":"8px 16px",fontFamily:SS,fontSize:isMob()?10:11,fontWeight:700,color:C.ink,cursor:"pointer"}}>🛒 {cart.length} · {cartTotal}€/mois</button>}

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:C.gold}}>✦</span>
            <span style={{fontFamily:SS,fontSize:isMob()?11:12,color:C.ink}}>Créez un compte gratuit pour activer les <strong>codes d'essai</strong> et accéder à votre espace pro.</span>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,width:isMob()?"100%":"auto"}}>
            <button onClick={()=>onAuth("login")} style={{background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"6px 14px",fontFamily:SS,fontSize:11,fontWeight:600,color:C.stone,cursor:"pointer",flex:isMob()?1:undefined}}>Connexion</button>
            <button onClick={()=>onAuth("register")} style={{background:C.ink,border:"none",borderRadius:4,padding:"6px 14px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase",flex:isMob()?1:undefined}}>S'inscrire</button>
          </div>
        </div>
      )}

      {/* IA */}
      {showAi&&user&&(
        <div style={{background:C.paper,border:`1.5px solid ${C.gold}55`,borderRadius:10,padding:"18px 22px",marginBottom:18,position:"relative"}}>

                    </div>

              {sub&&<div style={{position:"absolute",top:10,right:10,background:C.greenDim,color:C.green,fontSize:9,fontWeight:800,padding:"3px 7px",borderRadius:2,border:`1px solid ${C.green}44`}}>Abonné</div>}
              {trial&&!sub&&<div style={{position:"absolute",top:10,right:10,background:C.goldDim,color:C.gold,fontSize:9,fontWeight:700,padding:"3px 7px",borderRadius:2,border:`1px solid ${C.gold}44`}}>Essai · {trialDaysLeft(user.trials[sw.id])}j</div>}
              <div style={{padding:"16px 16px 0"}}>
                <div style={{fontSize:24,marginBottom:8}}>{sw.icon}</div>

                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.stone,marginBottom:5}}>{sw.cat}</div>
                <Stars r={sw.rating} sm/><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2,marginBottom:8}}>{sw.reviews} avis</div>
                <div style={{fontFamily:SS,fontSize:11,color:C.stone,lineHeight:1.5,marginBottom:10}}>{sw.desc}</div>
              </div>
              <div style={{flex:1}}/>
              <div style={{padding:"0 16px 14px"}}>
                <HR s={{marginBottom:10}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontFamily:SF,fontWeight:700,fontSize:15,color:C.ink}}>{sw.price}€<span style={{fontSize:10,fontWeight:400,color:C.stone}}>/mois</span></span>
                  <button onClick={()=>setDetail(sw)} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontFamily:SS,fontSize:11,fontWeight:600,padding:0}}>Détails →</button>
                </div>
                {sub&&<div style={{textAlign:"center",fontFamily:SS,fontSize:11,fontWeight:700,color:C.green,padding:"6px 0"}}>✓ Abonné</div>}
                {!sub&&trial&&<button onClick={()=>toggleCart(sw.id)} style={{width:"100%",background:inC?C.ink:C.paper,border:`1px solid ${inC?C.ink:C.linen}`,borderRadius:4,padding:"7px",fontFamily:SS,fontSize:10,fontWeight:700,color:inC?C.ivory:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.07em"}}>{inC?"✓ Dans le panier":"S'abonner"}</button>}
                {!sub&&!trial&&user&&(
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>startTrial(sw.id)} style={{flex:1,background:C.greenDim,border:`1px solid ${C.green}44`,borderRadius:4,padding:"7px",fontFamily:SS,fontSize:9,fontWeight:700,color:C.green,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>Code d'essai</button>
                    <button onClick={()=>toggleCart(sw.id)} style={{flex:1,background:inC?C.ink:C.paper,border:`1px solid ${inC?C.ink:C.linen}`,borderRadius:4,padding:"7px",fontFamily:SS,fontSize:9,fontWeight:700,color:inC?C.ivory:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>{inC?"✓":"+ Ajouter"}</button>
                  </div>
                )}
                {!sub&&!trial&&!user&&<button onClick={()=>setDetail(sw)} style={{width:"100%",background:C.dim,border:`1px solid ${C.linen}`,borderRadius:4,padding:"7px",fontFamily:SS,fontSize:10,fontWeight:600,color:C.stone,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.07em"}}>Voir le logiciel</button>}
              </div>
            </div>
          );
        })}
      </div>

      {/* CTA devis */}
      <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:8,padding:"20px 26px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:20}}>
        <div>
          <div style={{fontFamily:SF,fontSize:16,fontWeight:700,color:C.ink,marginBottom:3}}>Votre logiciel n'existe pas encore ?</div>
          <div style={{fontFamily:SS,fontSize:12,color:C.stone}}>Développement sur mesure · Devis gratuit sous 48h · Support inclus</div>
        </div>
        <button onClick={()=>user?setView("c-devis"):onAuth("register")} style={{background:C.ink,border:"none",borderRadius:6,padding:"10px 22px",fontFamily:SS,fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",color:C.ivory,cursor:"pointer",whiteSpace:"nowrap"}}>{user?"Découvrir l'offre →":"Créer un compte →"}</button>
      </div>

      {/* Detail page */}
      {detail&&(
        <div style={{position:"fixed",inset:0,background:C.ivory,zIndex:300,overflowY:"auto"}}>
          {/* Sticky top bar */}
          <div style={{position:"sticky",top:0,zIndex:301,background:"rgba(245,242,236,0.92)",backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.linen}`,padding:"12px 32px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontFamily:SF,fontWeight:700,fontSize:15,color:C.ink}}>{detail.price}€<span style={{fontSize:10,fontWeight:400,color:C.stone}}>/mois</span></span>
              {isSub(detail.id)&&<span style={{background:C.greenDim,color:C.green,border:`1px solid ${C.green}44`,padding:"5px 12px",borderRadius:4,fontFamily:SS,fontSize:10,fontWeight:700}}>✓ Abonné</span>}
              {isTrial(detail.id)&&!isSub(detail.id)&&<span style={{background:C.goldDim,color:C.gold,border:`1px solid ${C.gold}44`,padding:"5px 12px",borderRadius:4,fontFamily:SS,fontSize:10,fontWeight:700}}>Essai · {trialDaysLeft(user.trials[detail.id])}j</span>}
              {!isSub(detail.id)&&!isTrial(detail.id)&&user&&<button onClick={()=>startTrial(detail.id)} style={{background:C.greenDim,border:`1px solid ${C.green}44`,borderRadius:6,padding:"8px 18px",fontFamily:SS,fontSize:10,fontWeight:700,color:C.green,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.07em"}}>Code d'essai</button>}
              {!isSub(detail.id)&&user&&<button onClick={()=>{toggleCart(detail.id);}} style={{background:isCart(detail.id)?C.ink:C.gold,border:"none",borderRadius:6,padding:"8px 18px",fontFamily:SS,fontSize:10,fontWeight:700,color:isCart(detail.id)?C.ivory:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.07em"}}>{isCart(detail.id)?"✓ Dans le panier":"+ Ajouter au panier"}</button>}
              {!user&&<button onClick={()=>onAuth("register")} style={{background:C.gold,border:"none",borderRadius:6,padding:"8px 18px",fontFamily:SS,fontSize:10,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.07em"}}>Créer un compte</button>}

              <div style={{flex:1}}>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:C.gold,marginBottom:6}}>{detail.cat} · Marketplace ONIQ</div>
                <div style={{fontFamily:SF,fontSize:32,fontWeight:700,color:C.ink,lineHeight:1.1,marginBottom:10}}>{detail.name}</div>

              <div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ivory,marginBottom:6}}>Lancez-vous avec {detail.name}</div>
                <div style={{fontFamily:SS,fontSize:13,color:"rgba(255,255,255,0.45)",lineHeight:1.6}}>Code d'essai disponible · Sans engagement · Support inclus</div>
              </div>
              <div style={{display:"flex",gap:10,flexShrink:0}}>
                {!isSub(detail.id)&&!isTrial(detail.id)&&user&&<button onClick={()=>startTrial(detail.id)} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Entrer un code d'essai</button>}
                {!user&&<button onClick={()=>onAuth("register")} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Créer un compte gratuit</button>}

                {isTrial(detail.id)&&!isSub(detail.id)&&<button onClick={()=>{openSoftwareApp(detail);setDetail(null);}} style={{background:C.gold,border:"none",borderRadius:8,padding:"12px 28px",fontFamily:SS,fontSize:12,fontWeight:700,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em"}}>Ouvrir le logiciel</button>}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Panier */}
      {showCart&&(
        <Overlay title="Mon panier" subtitle="Vos logiciels sélectionnés" onClose={()=>setShowCart(false)}>
          {cartItems.map((sw,i)=>(
            <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0"}}>
              <span style={{fontSize:20}}>{sw.icon}</span>
              <div style={{flex:1}}><div style={{fontFamily:SS,fontWeight:700,fontSize:13,color:C.ink}}>{sw.name}</div><div style={{fontFamily:SS,fontSize:11,color:C.stone}}>{sw.cat}</div></div>
              <span style={{fontFamily:SF,fontWeight:700,fontSize:14,color:C.ink}}>{sw.price}€/mois</span>
              <button onClick={()=>toggleCart(sw.id)} style={{background:"none",border:"none",color:C.stone,cursor:"pointer"}}>✕</button>
            </div>{i<cartItems.length-1&&<HR/>}</div>
          ))}
          <HR s={{margin:"12px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
            <span style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total mensuel</span>
            <span style={{fontFamily:SF,fontWeight:700,fontSize:17,color:C.ink}}>{cartTotal} €</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setShowCart(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Continuer</button>
            <button onClick={()=>{setShowCart(false);setShowPay(true);}} style={{flex:2,background:C.gold,border:"none",borderRadius:4,padding:"9px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Passer au paiement</button>
          </div>
        </Overlay>
      )}

      {/* Paiement — Récap puis redirection Stripe */}
      {showPay&&(
        <Overlay title="Paiement" subtitle="Abonnement mensuel · résiliable à tout moment" onClose={()=>setShowPay(false)}>
          <div style={{background:C.dim,border:`1px solid ${C.linen}`,borderRadius:6,padding:13,marginBottom:14}}>
            {cartItems.map(sw=><div key={sw.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontFamily:SS,fontSize:12}}><span style={{color:C.ink}}>{sw.icon} {sw.name}</span><span style={{color:C.gold,fontWeight:700}}>{sw.price}€</span></div>)}
            <HR s={{margin:"9px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontFamily:SS,fontSize:10,fontWeight:700,color:C.stone,textTransform:"uppercase"}}>Total / mois</span><span style={{fontFamily:SF,fontWeight:700,fontSize:14,color:C.ink}}>{cartTotal} €</span></div>
          </div>
          <div style={{background:C.greenDim,border:`1px solid ${C.green}33`,borderRadius:6,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🔒</span>
            <div><div style={{fontFamily:SS,fontSize:11,fontWeight:700,color:C.green}}>Paiement sécurisé par Stripe</div><div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:2}}>Vous allez être redirigé vers la page de paiement sécurisée Stripe</div></div>

            <button onClick={()=>setShowPay(false)} style={{flex:1,background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"11px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Annuler</button>

      )}

      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

      {/* Modal Code d'essai */}
      {showTrialCode&&(
        <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(10,10,8,0.55)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}} onClick={()=>setShowTrialCode(null)}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:isMob()?"16px 14px":"32px 36px",width:420,maxWidth:"94vw",boxShadow:"0 24px 60px rgba(0,0,0,0.18)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:SF,fontSize:20,fontWeight:700,color:C.ink}}>🔑 Code d'essai</div>
              <button onClick={()=>setShowTrialCode(null)} style={{background:"none",border:"none",fontSize:18,color:C.stone,cursor:"pointer"}}>✕</button>

            <div style={{fontFamily:SS,fontSize:12,color:C.stone,marginBottom:20,lineHeight:1.6}}>

            </div>
            <div style={{marginBottom:16}}>
              <input type="text" value={trialCodeInput} onChange={e=>setTrialCodeInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&submitTrialCode()} placeholder="ONIQ-XXXX-XXXX-XXXX" style={{width:"100%",padding:"14px 16px",border:`2px solid ${trialCodeErr?'#b52020':C.linen}`,borderRadius:8,fontFamily:"monospace",fontSize:16,fontWeight:700,letterSpacing:"0.08em",textAlign:"center",color:C.ink,background:C.dim,boxSizing:"border-box",outline:"none"}} autoFocus/>

            <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:14,textAlign:"center",lineHeight:1.5}}>Pas de code ? <a href="mailto:contact@oniq.fr" style={{color:C.gold,fontWeight:600}}>Contactez-nous</a> pour en obtenir un.</div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── Mon Espace ─────────────────────────────────────────────────────────────
const MonEspace=({user,setUser,software})=>{
  const myApps=software.filter(s=>user.subs.includes(s.id));
  const myTrials=software.filter(s=>!user.subs.includes(s.id)&&isTrialActive(user.trials?.[s.id]));
  const mrr=myApps.reduce((s,x)=>s+x.price,0);
  const [unsub,setUnsub]=useState(null);
  const [toast,setToast]=useState(null);
  const [accessMap,setAccessMap]=useState({});
  const [loadingAccess,setLoadingAccess]=useState(true);

  useEffect(()=>{
    let mounted=true;
    async function loadAccess(){
      if(!user?.id){
        if(mounted){setAccessMap({});setLoadingAccess(false);}
        return;
      }
      setLoadingAccess(true);
      const map=await getSoftwareAccessMap(user.id);
      if(mounted){
        setAccessMap(map||{});
        setLoadingAccess(false);
      }
    }
    loadAccess();
    return ()=>{mounted=false;};
  },[user?.id,myApps.length]);

  const doUnsub=()=>{
    const sw=software.find(s=>s.id===unsub);
    if(sw) removeUserSub(user.id,sw.slug);
    setUser(u=>({...u,subs:u.subs.filter(x=>x!==unsub)}));
    setAccessMap(prev=>{const next={...prev}; delete next[sw?.slug]; return next;});
    setUnsub(null);
    setToast("Désabonnement effectué.");
    setTimeout(()=>setToast(null),3000);
  };

  const appStatuses=myApps.map(sw=>({ sw, access:accessMap[sw.slug]||null, active:isAccessActiveRecord(accessMap[sw.slug]||null) }));
  const activeCount=appStatuses.filter(x=>x.active).length;
  const nextExpiry=appStatuses.filter(x=>x.access?.access_end).sort((a,b)=>new Date(a.access.access_end)-new Date(b.access.access_end))[0]?.access?.access_end||null;
  const statusLabel=loadingAccess?"Synchronisation...":activeCount>0?`${activeCount} accès actif${activeCount>1?'s':''}`:"Aucun accès actif";
  const invoices=[{id:"INV-2024-104",amount:mrr,date:"01 Déc 2024",status:"paid"},{id:"INV-2024-089",amount:Math.max(0,mrr-5),date:"01 Nov 2024",status:"paid"},{id:"INV-2024-074",amount:Math.max(0,mrr-5),date:"01 Oct 2024",status:"paid"}];

  return (
    <div style={{padding:isMob()?"16px 12px":"28px 36px"}}>
      <div style={{marginBottom:22}}>
        <div style={{fontFamily:SS,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.stone,marginBottom:4}}>Mon espace</div>
        <h1 style={{margin:0,fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink}}>Bonjour, {user.company} 👋</h1>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"repeat(4,1fr)",gap:14,marginBottom:22}}>
        <KPI label="Abonnement mensuel" value={`${mrr} €`} sub={`${myApps.length} logiciel${myApps.length>1?"s":""} souscrit${myApps.length>1?"s":""}`} accent/>
        <KPI label="Accès actifs" value={loadingAccess?"...":activeCount} sub={statusLabel}/>
        <KPI label="Prochaine échéance" value={nextExpiry?formatAccessDate(nextExpiry):"—"} sub={nextExpiry?"Renouvellement à surveiller":"Aucune échéance"}/>
        <KPI label="Client depuis" value={user.since||"2024"} sub="Membre ONIQ"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<=768?"1fr":"1fr 1fr",gap:window.innerWidth<=768?12:18}}>
        <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:6,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.linen}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontFamily:SF,fontSize:14,fontWeight:600,color:C.ink}}>Mes logiciels</span>
            <span style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:C.stone}}>{statusLabel}</span>
          </div>
          {myApps.length===0&&<div style={{padding:"22px 18px",fontFamily:SS,fontSize:13,color:C.stone,textAlign:"center"}}>Aucun logiciel souscrit.</div>}
          {appStatuses.map(({sw,access,active},i)=>(
            <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px"}}>
              <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div>
                <div style={{fontFamily:SS,fontSize:10,color:active?C.green:C.red,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em"}}>● {active?"Actif":"Inactif"} · {sw.price}€/mois</div>
                <div style={{fontFamily:SS,fontSize:10,color:C.stone,marginTop:3}}>Fin d'accès : {access?.access_end?formatAccessDate(access.access_end):"—"}{access?.source?` · Source : ${access.source}`:""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>openSoftwareProtected(sw.slug)} style={{background:C.ink,border:"none",borderRadius:4,padding:"6px 10px",fontFamily:SS,fontSize:9,fontWeight:700,color:C.ivory,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.06em"}}>Ouvrir</button>
                <button onClick={()=>setUnsub(sw.id)} style={{background:"none",border:`1px solid ${C.linen}`,borderRadius:4,padding:"5px 9px",fontFamily:SS,fontSize:10,color:C.stone,cursor:"pointer"}}>✕</button>
              </div>
            </div>{i<appStatuses.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
          ))}
          {myTrials.length>0&&(
            <>
              <div style={{padding:"9px 18px",background:C.goldDim,borderTop:`1px solid ${C.linen}`,fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:C.gold}}>Essais en cours</div>
              {myTrials.map((sw,i)=>(
                <div key={sw.id}><div style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px"}}>
                  <div style={{width:34,height:34,borderRadius:6,background:C.goldDim,border:`1px solid ${C.goldB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{sw.icon}</div>
                  <div style={{flex:1}}><div style={{fontFamily:SS,fontWeight:700,fontSize:12,color:C.ink}}>{sw.name}</div><div style={{fontFamily:SS,fontSize:10,color:C.gold,fontWeight:700,marginTop:2}}>{trialDaysLeft(user.trials[sw.id])} jours restants</div></div>
                  <button style={{background:C.ink,border:"none",borderRadius:4,padding:"5px 12px",fontFamily:SS,fontSize:10,fontWeight:700,color:C.ivory,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase"}}>S'abonner</button>
                </div>{i<myTrials.length-1&&<HR s={{margin:"0 18px"}}/>}</div>
              ))}

const SoftwareLaunchModal=({software,onClose})=>{
  if(!software)return null;
  const launcher=softwareLaunchers[software.slug];
  const iframeRef=React.useRef(null);
  
  useEffect(()=>{
    const CLOUD_TABLE='software_user_data';
    
    // Handler pour les messages de l'iframe BatiManager
    const handleBatiMessage=async(evt)=>{
      if(!evt.data||!evt.data.type)return;
      if(!supabaseClient)return;
      
      // BatiManager demande de sauvegarder
      if(evt.data.type==='bati-save'&&evt.data.data){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁️ Parent: no user for save');return}
          const {error}=await supabaseClient.from(CLOUD_TABLE).upsert({
            user_id:userId,
            software_slug:'batimanager',
            data_key:evt.data.key,
            data_value:evt.data.data,
            updated_at:new Date().toISOString()
          },{onConflict:'user_id,software_slug,data_key'});
          if(error){
            console.warn('☁️ Parent save failed:',error.message);
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-error',error:error.message},'*');
          } else {
            console.log('☁️ Parent save OK for BatiManager');
            iframeRef.current?.contentWindow?.postMessage({type:'bati-save-ok'},'*');
          }
        }catch(e){console.warn('☁️ Parent save error:',e)}
      }
      
      // BatiManager demande de charger les données
      if(evt.data.type==='bati-load'){
        try{
          const {data:session}=await supabaseClient.auth.getSession();
          const userId=session?.session?.user?.id;
          if(!userId){console.warn('☁️ Parent: no user for load');return}
          const {data:row,error}=await supabaseClient.from(CLOUD_TABLE)
            .select('data_value')
            .eq('user_id',userId)
            .eq('software_slug','batimanager')
            .eq('data_key',evt.data.key)
            .maybeSingle();
          if(error){console.warn('☁️ Parent load failed:',error.message);return}
          console.log('☁️ Parent load OK, has data:',!!row?.data_value);
          iframeRef.current?.contentWindow?.postMessage({type:'bati-cloud-data',data:row?.data_value||null},'*');
        }catch(e){console.warn('☁️ Parent load error:',e)}
      }
    };
    
    window.addEventListener('message',handleBatiMessage);

    // Envoyer le token Supabase à l'iframe après chargement
    const sendAuth=async()=>{
      if(!supabaseClient||!iframeRef.current)return;
      try{
        const {data}=await supabaseClient.auth.getSession();
        if(data?.session){
          const msg={type:'oniq-auth-token',access_token:data.session.access_token,refresh_token:data.session.refresh_token};
          const trySend=()=>{
            try{iframeRef.current?.contentWindow?.postMessage(msg,'*');}catch(e){}
          };
          setTimeout(trySend,500);
          setTimeout(trySend,1500);
          setTimeout(trySend,3000);
          setTimeout(trySend,5000);
        }
      }catch(e){console.warn('Auth token send failed:',e)}
    };
    sendAuth();
    
    return ()=>window.removeEventListener('message',handleBatiMessage);
  },[]);
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#fff'}}>
      <button onClick={onClose} style={{position:'fixed',bottom:18,right:18,zIndex:1001,background:'rgba(26,20,16,0.88)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:999,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:'#fff',cursor:'pointer',boxShadow:'0 8px 24px rgba(0,0,0,0.18)'}}>Fermer ✕</button>
      <iframe ref={iframeRef} title={software.name} src={launcher?.src} style={{position:'absolute',inset:0,width:'100%',height:'100%',border:'none',background:'#fff'}} sandbox="allow-scripts allow-same-origin allow-downloads allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"/>
    </div>
  );
};

    setLoading(true);
    const [rows,cloudInvites]=await Promise.all([getOwnerTeamMembers(owner.id),loadActiveTeamInvites(owner.id)]);
    setMembers(rows);
    setInvites(cloudInvites);

const TeamAccessPage=({token,owner,software})=>{
  const [member,setMember]=useState(null);
  const [mode,setMode]=useState('register');
  const [form,setForm]=useState({name:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(true);
  const [submitting,setSubmitting]=useState(false);
  const [launchedSoftware,setLaunchedSoftware]=useState(null);

  useEffect(()=>{
    const handler=e=>setLaunchedSoftware(e.detail||null);
    window.addEventListener('oniq-open-software',handler);
    return ()=>window.removeEventListener('oniq-open-software',handler);
  },[]);

  useEffect(()=>{
    let alive=true;
    async function bootstrap(){
      setLoading(true);
      setErr('');
      if(!supabaseClient || !owner?.id){ if(alive) setLoading(false); return; }
      const { data } = await supabaseClient.auth.getUser();
      const authUser=data?.user;
      if(authUser){
        const found=await getTeamMemberByAuth(owner.id, authUser.id);
        if(alive && found && found.status!=='disabled') setMember(found);
      }
      if(alive) setLoading(false);
    }
    bootstrap();
    return ()=>{alive=false;};
  },[token, owner?.id]);

  const saveSession=async(memberId)=>{ await createTeamSession(token, memberId); };

  const doRegister=async()=>{
    if(!form.name||!form.email||!form.password){setErr('Remplissez tous les champs.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      const existing=await getTeamMemberByEmail(owner.id, form.email);
      if(existing && existing.userId){setErr("Cet email existe déjà dans l'équipe. Connectez-vous."); setMode('login'); return;}
      const { data, error } = await supabaseClient.auth.signUp({
        email: form.email.trim().toLowerCase(),
        password: form.password,
        options: { data: { name: form.name, company: owner.company||'' } }
      });
      if(error) throw error;
      const authUser=data?.user || (await supabaseClient.auth.getUser()).data?.user;
      if(!authUser){setErr('Compte créé. Confirmez votre email puis reconnectez-vous.'); return;}
      const next=await createOrUpdateTeamMember({ownerId:owner.id,userId:authUser.id,email:form.email,name:form.name});
      await saveSession(next.id);
      setMember(next);
    }catch(e){
      console.error('Erreur inscription équipe:',e);
      setErr(e?.message||"Impossible de créer l'accès équipe.");
    }finally{
      setSubmitting(false);
    }
  };

  const doLogin=async()=>{
    if(!form.email||!form.password){setErr('Renseignez votre email et mot de passe.');return;}
    if(!supabaseClient){setErr('Supabase indisponible.');return;}
    try{
      setSubmitting(true);
      setErr('');
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: form.email.trim().toLowerCase(),
        password: form.password
      });
      if(error) throw error;
      const { data } = await supabaseClient.auth.getUser();
      const authUser=data?.user;
      if(!authUser) throw new Error('Connexion impossible.');
      let found=await getTeamMemberByAuth(owner.id, authUser.id);
      if(!found){
        found=await createOrUpdateTeamMember({
          ownerId:owner.id,
          userId:authUser.id,
          email:authUser.email,
          name:authUser.user_metadata?.name||authUser.email?.split('@')[0]||'Membre'
        });
      }
      if(found.status==='disabled'){setErr('Accès équipe suspendu.'); return;}
      await saveSession(found.id);
      setMember(found);
    }catch(e){
      console.error('Erreur connexion équipe:',e);
      setErr(e?.message||'Accès équipe introuvable ou suspendu.');
    }finally{
      setSubmitting(false);
    }
  };

  if(loading){
    return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}><div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',textAlign:'center',maxWidth:460,fontFamily:SS,color:C.stone}}>Chargement de l'accès équipe...</div></div>;
  }

  if(member){
    const apps=software.filter(sw=>getMemberSoftwareIds(member).includes(sw.id));
    return <>
      <div style={{minHeight:'100vh',background:C.dim,padding:'42px 24px'}}>
        <div style={{maxWidth:1180,margin:'0 auto'}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'26px 28px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',gap:18,flexWrap:'wrap',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              {owner?.companyLogo?(<img src={owner.companyLogo} alt='Logo entreprise' style={{width:62,height:62,objectFit:'contain',borderRadius:10,background:C.ivory,border:`1px solid ${C.linen}`,padding:8}}/>):(<div style={{width:62,height:62,borderRadius:10,background:C.ink,border:`1px solid ${C.gold}55`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:22,fontWeight:700,color:C.gold}}>{(owner.company||'ON').slice(0,2).toUpperCase()}</div>)}
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Accès équipe</div>
                <div style={{fontFamily:SF,fontSize:isMob()?22:30,fontWeight:700,color:C.ink,marginBottom:4}}>Nos logiciels</div>
                <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6}}>Connecté en tant que <strong>{member.name}</strong> · accès limité au hub de {owner.company}.</div>
              </div>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,marginBottom:3}}>Logiciels autorisés</div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ink}}>{apps.length}</div>
              </div>
              <button onClick={async()=>{try{await supabaseClient?.auth.signOut();}catch(e){} setMember(null);}} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>Déconnexion</button>
            </div>
          </div>
          <SoftwareGrid apps={apps} showCommercialInfos={false}/>
          {apps.length===0&&<div style={{marginTop:18,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun logiciel ne vous a encore été attribué. Demandez au patron de vous donner accès depuis l'onglet <strong>Gérer mon équipe</strong>.</div>}
        </div>
      </div>
      {launchedSoftware&&<SoftwareLaunchModal software={launchedSoftware} onClose={()=>setLaunchedSoftware(null)}/>}    
    </>;
  }

  return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{width:460,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
      <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Invitation équipe</div>
      <div style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,marginBottom:6}}>Rejoindre {owner.company}</div>
      <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6,marginBottom:18}}>Créez votre accès membre ou connectez-vous. Après connexion, vous aurez uniquement accès au hub logiciels qui vous est attribué.</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setMode('register')} style={{flex:1,background:mode==='register'?C.ink:'transparent',border:`1px solid ${mode==='register'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='register'?C.ivory:C.stone,cursor:'pointer'}}>Créer mon accès</button>
        <button onClick={()=>setMode('login')} style={{flex:1,background:mode==='login'?C.ink:'transparent',border:`1px solid ${mode==='login'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='login'?C.ivory:C.stone,cursor:'pointer'}}>Connexion</button>
      </div>
      {mode==='register'&&<div style={{marginBottom:12}}><TI label='Nom complet' value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>}
      <TI label='Email' value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type='email'/>
      <TI label='Mot de passe' value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} type='password' mb={10}/>
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:12,color:C.red,marginBottom:12}}>{err}</div>}
      <button disabled={submitting} onClick={mode==='register'?doRegister:doLogin} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'11px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer',opacity:submitting?0.7:1}}>{submitting?'Chargement...':(mode==='register'?'Créer et accéder au hub':'Se connecter au hub')}</button>
    </div>
  </div>;
};

// ── Système de codes d'essai ──
async function generateTrialCode(softwareSlug, durationDays=7, note=''){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='ONIQ-';
  for(let i=0;i<3;i++){for(let j=0;j<4;j++)code+=chars[Math.floor(Math.random()*chars.length)];if(i<2)code+='-';}
  const entry={code,softwareSlug,durationDays,note,createdAt:new Date().toISOString(),usedBy:null,usedAt:null};
  if(supabaseClient){
    const { error } = await supabaseClient.from('promo_codes').insert({code,software_slug:softwareSlug,duration_days:durationDays,note,created_at:entry.createdAt,used_by:null,used_at:null});
    if(error) throw error;
  }
  TRIAL_CODES_CACHE=[entry,...getTrialCodes().filter(c=>c.code!==code)];
  return entry;
}

async function redeemTrialCode(codeStr, userId, userEmail){
  const codeUp=codeStr.trim().toUpperCase();
  let found=null;
  if(supabaseClient){
    try{
      const {data,error}=await supabaseClient.from('promo_codes').select('*').eq('code',codeUp).maybeSingle();
      if(error) throw error;
      if(data) found={code:data.code,softwareSlug:data.software_slug,durationDays:data.duration_days||7,note:data.note||'',createdAt:data.created_at,usedBy:data.used_by,usedAt:data.used_at};
    }catch(e){console.warn('redeemTrialCode cloud error:',e);}
  }
  if(!found) found=getTrialCodes().find(c=>c.code===codeUp)||null;
  if(!found) return {ok:false,msg:"Code invalide. Vérifiez votre saisie."};
  if(found.usedBy) return {ok:false,msg:"Ce code a déjà été utilisé."};
  found.usedBy=userEmail||userId;
  found.usedAt=new Date().toISOString();
  if(supabaseClient){
    await supabaseClient.from('promo_codes').update({used_by:found.usedBy,used_at:found.usedAt}).eq('code',codeUp);
    const accessEnd=new Date();
    accessEnd.setDate(accessEnd.getDate()+(found.durationDays||7));
    await supabaseClient.from('software_access').upsert({user_id:userId,software_slug:found.softwareSlug,access_end:accessEnd.toISOString()},{onConflict:'user_id,software_slug'});
  }
  TRIAL_CODES_CACHE=getTrialCodes().map(c=>c.code===codeUp?found:c);
  return {ok:true,slug:found.softwareSlug,days:found.durationDays||7,msg:`Essai de ${found.durationDays||7} jours activé !`};
}
