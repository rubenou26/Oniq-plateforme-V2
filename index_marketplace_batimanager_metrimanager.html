const softwareLaunchers={
  batimanager:{src:BATI_MANAGER_DATA_URL,mode:"iframe"},
  metrimanager:{src:METRI_MANAGER_DATA_URL,mode:"iframe"}
};
const openSoftwareApp=(sw)=>{
  const launcher=sw?.slug&&softwareLaunchers[sw.slug];
  if(launcher) {
    window.dispatchEvent(new CustomEvent('oniq-open-software',{detail:sw}));
    return;
  }
  alert("Ce logiciel n'est pas encore connecté.");
};

const TEAM_INVITES_KEY='oniq_team_invites_v1';
const TEAM_MEMBERS_KEY='oniq_team_members_v1';
const TEAM_SESSIONS_KEY='oniq_team_sessions_v1';
const loadStore=(key,fallback)=>{try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback;}catch(e){return fallback;}};
const saveStore=(key,value)=>localStorage.setItem(key,JSON.stringify(value));
const getTeamInvites=()=>loadStore(TEAM_INVITES_KEY,{});
const saveTeamInvites=v=>saveStore(TEAM_INVITES_KEY,v);
const getTeamMembers=()=>loadStore(TEAM_MEMBERS_KEY,[]);
const saveTeamMembers=v=>saveStore(TEAM_MEMBERS_KEY,v);
const getTeamSessions=()=>loadStore(TEAM_SESSIONS_KEY,{});
const saveTeamSessions=v=>saveStore(TEAM_SESSIONS_KEY,v);
const createTeamInvite=(owner)=>{
  const token=genCode();
  const invites=getTeamInvites();
  invites[token]={token,ownerId:owner.id,createdAt:Date.now(),label:owner.company};
  saveTeamInvites(invites);
  return token;
};
const getOwnerTeamMembers=(ownerId)=>getTeamMembers().filter(m=>String(m.ownerId)===String(ownerId));
const getMemberSoftwareIds=(member, ownerSubs)=>{
  const assigned=Array.isArray(member?.softwareIds)?member.softwareIds:[];
  return ownerSubs.filter(id=>assigned.includes(id));
};

const HR=({s})=><div style={{height:1,background:`linear-gradient(90deg,transparent,${C.linen},transparent)`,...s}}/>;

const Stars=({r,sm})=>(
  <span style={{display:"inline-flex",gap:1,alignItems:"center"}}>
    {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(r)?C.gold:C.linen,fontSize:sm?11:13}}>★</span>)}
    <span style={{fontFamily:SS,fontSize:sm?10:12,color:C.stone,marginLeft:3}}>{r}</span>
  </span>
);

const Badge=({status})=>{
  const m={active:{l:"Actif",bg:C.greenDim,c:C.green},trial:{l:"Essai",bg:C.goldDim,c:C.gold},overdue:{l:"Retard",bg:C.redDim,c:C.red},paid:{l:"Payé",bg:C.greenDim,c:C.green},pending:{l:"En attente",bg:C.amberDim,c:C.amber},quoted:{l:"Devis envoyé",bg:C.goldDim,c:C.gold}};
  const s=m[status]||m.active;
  return <span style={{background:s.bg,color:s.c,border:`1px solid ${s.c}44`,padding:"3px 10px",borderRadius:3,fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:SS,whiteSpace:"nowrap"}}>{s.l}</span>;
};

const Mono=({i,size=36})=>(
  <div style={{width:size,height:size,borderRadius:4,background:C.ink,border:`1px solid ${C.gold}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.3,fontWeight:700,color:C.gold,fontFamily:SF,flexShrink:0}}>{i}</div>

const Sparkline=({data})=>{
  const max=Math.max(...data),min=Math.min(...data),w=300,h=60,p=6;
  const x=(i)=>p+(i/(data.length-1))*(w-p*2);
  const y=(v)=>h-p-((v-min)/(max-min||1))*(h-p*2);
  const pts=data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const area=`M${x(0)},${y(data[0])} ${data.map((v,i)=>`L${x(i)},${y(v)}`).join(" ")} L${x(data.length-1)},${h} L${x(0)},${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:60}}>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity="0.25"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#g1)"/>
      <polyline points={pts} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((v,i)=>(
        <g key={i}>
          <circle cx={x(i)} cy={y(v)} r="3" fill={C.gold}/>
          <text x={x(i)} y={h} textAnchor="middle" style={{fontSize:8,fontFamily:SS,fill:C.stone}}>{MRR_MONTHS[i]}</text>
        </g>
      ))}
    </svg>
  );
};

const TeamManagementPanel=({owner,software,setRefreshSeed})=>{
  const [inviteToken,setInviteToken]=useState('');
  const [copied,setCopied]=useState(false);
  const [members,setMembers]=useState(()=>getOwnerTeamMembers(owner.id));
  const syncMembers=()=>{setMembers(getOwnerTeamMembers(owner.id));setRefreshSeed(Date.now());};
  const inviteLink=inviteToken?`${window.location.origin}${window.location.pathname}?team=1&t=${inviteToken}&owner=${owner.id}`:'';
  const generateInvite=()=>{const token=createTeamInvite(owner);setInviteToken(token);};
  const toggleSoftware=(memberId,softwareId)=>{
    const all=getTeamMembers().map(m=>{
      if(m.id!==memberId)return m;
      const assigned=Array.isArray(m.softwareIds)?m.softwareIds:[];
      const next=assigned.includes(softwareId)?assigned.filter(id=>id!==softwareId):[...assigned,softwareId];
      return {...m,softwareIds:next};
    });
    saveTeamMembers(all);syncMembers();
  };
  const toggleStatus=(memberId)=>{
    const all=getTeamMembers().map(m=>m.id!==memberId?m:{...m,status:m.status==='disabled'?'active':'disabled'});
    saveTeamMembers(all);syncMembers();
  };
  return (
    <div style={{display:'grid',gap:18}}>
      <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px'}}>
        <div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink,marginBottom:5}}>Inviter un membre</div>
        <div style={{fontFamily:SS,fontSize:12,color:C.stone,lineHeight:1.6,marginBottom:14}}>Le membre reçoit un lien court, crée son compte ou se connecte, puis vous lui attribuez les logiciels autorisés.</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
          <button onClick={generateInvite} style={{background:C.ink,border:'none',borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ivory,cursor:'pointer'}}>Générer un lien d'invitation</button>
          {inviteLink&&<button onClick={()=>{navigator.clipboard?.writeText(inviteLink);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{background:copied?C.greenDim:C.gold,border:copied?`1px solid ${C.green}44`:'none',borderRadius:6,padding:'10px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:copied?C.green:C.ink,cursor:'pointer'}}>{copied?'✓ Lien copié':'Copier le lien'}</button>}
        </div>
        {inviteLink&&<div style={{marginTop:14,background:C.dim,border:`1px solid ${C.linen}`,borderRadius:8,padding:'12px 14px',fontFamily:SS,fontSize:12,color:C.ink,wordBreak:'break-all'}}>{inviteLink}</div>}
      </div>
      <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${C.linen}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:SF,fontSize:18,fontWeight:700,color:C.ink}}>Gérer mon équipe</div>
            <div style={{fontFamily:SS,fontSize:12,color:C.stone}}>Attribuez les accès logiciel membre par membre.</div>
          </div>
          <div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.gold}}>{members.length} membre{members.length>1?'s':''}</div>
        </div>
        {members.length===0&&<div style={{padding:'24px 20px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun membre enregistré pour le moment.</div>}
        {members.map((member,idx)=>(
          <div key={member.id}>
            <div style={{padding:'18px 20px',display:'grid',gridTemplateColumns:'1.1fr 2fr auto',gap:18,alignItems:'start'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:13,fontWeight:700,color:C.ink}}>{member.name}</div>
                <div style={{fontFamily:SS,fontSize:11,color:C.stone,marginTop:3}}>{member.email}</div>
                <div style={{marginTop:8}}><Badge status={member.status==='disabled'?'overdue':'active'}/></div>
              </div>
              <div>
                <div style={{fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Logiciels attribués</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {software.filter(sw=>owner.subs.includes(sw.id)).map(sw=>{
                    const checked=(member.softwareIds||[]).includes(sw.id);
                    return <label key={sw.id} style={{display:'inline-flex',alignItems:'center',gap:6,background:checked?C.goldDim:C.ivory,border:`1px solid ${checked?C.gold+'55':C.linen}`,borderRadius:30,padding:'7px 10px',fontFamily:SS,fontSize:11,color:checked?C.ink:C.stone,cursor:'pointer'}}><input type='checkbox' checked={checked} onChange={()=>toggleSoftware(member.id,sw.id)}/>{sw.name}</label>;
                  })}
                </div>
              </div>
              <button onClick={()=>toggleStatus(member.id)} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>{member.status==='disabled'?'Réactiver':'Suspendre'}</button>

            {idx<members.length-1&&<HR s={{margin:'0 20px'}}/>}

const TeamAccessPage=({token,owner,software})=>{
  const [member,setMember]=useState(null);
  const [mode,setMode]=useState('register');
  const [form,setForm]=useState({name:'',email:'',password:''});
  const [err,setErr]=useState('');
  const [launchedSoftware,setLaunchedSoftware]=useState(null);
  useEffect(()=>{
    const sessions=getTeamSessions();
    const memberId=sessions[token];
    if(memberId){
      const found=getTeamMembers().find(m=>String(m.id)===String(memberId) && m.status!=='disabled');
      if(found)setMember(found);
    }
  },[token]);
  useEffect(()=>{
    const handler=e=>setLaunchedSoftware(e.detail||null);
    window.addEventListener('oniq-open-software',handler);
    return ()=>window.removeEventListener('oniq-open-software',handler);
  },[]);
  const saveSession=(memberId)=>{const sessions=getTeamSessions();sessions[token]=memberId;saveTeamSessions(sessions);};
  const doRegister=()=>{
    if(!form.name||!form.email||!form.password){setErr('Remplissez tous les champs.');return;}
    const all=getTeamMembers();
    if(all.find(m=>m.ownerId===owner.id && m.email.toLowerCase()===form.email.toLowerCase())){setErr("Cet email existe déjà dans l'équipe. Connectez-vous.");return;}
    const next={id:Date.now(),ownerId:owner.id,name:form.name,email:form.email,password:form.password,status:'active',softwareIds:[]};
    all.push(next); saveTeamMembers(all); saveSession(next.id); setMember(next); setErr('');
  };
  const doLogin=()=>{
    const found=getTeamMembers().find(m=>m.ownerId===owner.id && m.email.toLowerCase()===form.email.toLowerCase() && m.password===form.password && m.status!=='disabled');
    if(!found){setErr('Accès équipe introuvable ou suspendu.');return;}
    saveSession(found.id); setMember(found); setErr('');
  };
  if(member){
    const apps=software.filter(sw=>getMemberSoftwareIds(member,owner.subs).includes(sw.id));
    return <>
      <div style={{minHeight:'100vh',background:C.dim,padding:'42px 24px'}}>
        <div style={{maxWidth:1180,margin:'0 auto'}}>
          <div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'26px 28px',marginBottom:20,display:'flex',alignItems:'center',justifyContent:'space-between',gap:18,flexWrap:'wrap',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
            <div style={{display:'flex',alignItems:'center',gap:16}}>
              {owner?.companyLogo?(<img src={owner.companyLogo} alt='Logo entreprise' style={{width:62,height:62,objectFit:'contain',borderRadius:10,background:C.ivory,border:`1px solid ${C.linen}`,padding:8}}/>):(<div style={{width:62,height:62,borderRadius:10,background:C.ink,border:`1px solid ${C.gold}55`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:SF,fontSize:22,fontWeight:700,color:C.gold}}>{(owner.company||'ON').slice(0,2).toUpperCase()}</div>)}
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.2em',textTransform:'uppercase',color:C.stone,marginBottom:5}}>Accès équipe</div>
                <div style={{fontFamily:SF,fontSize:30,fontWeight:700,color:C.ink,marginBottom:4}}>Nos logiciels</div>
                <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6}}>Connecté en tant que <strong>{member.name}</strong> · accès limité au hub de {owner.company}.</div>
              </div>
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
              <div>
                <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:C.stone,marginBottom:3}}>Logiciels autorisés</div>
                <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ink}}>{apps.length}</div>
              </div>
              <button onClick={()=>{const sessions=getTeamSessions(); delete sessions[token]; saveTeamSessions(sessions); setMember(null);}} style={{background:'transparent',border:`1px solid ${C.linen}`,borderRadius:6,padding:'9px 12px',fontFamily:SS,fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.stone,cursor:'pointer'}}>Déconnexion</button>
            </div>
          </div>
          <SoftwareGrid apps={apps} showCommercialInfos={false}/>
          {apps.length===0&&<div style={{marginTop:18,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:10,padding:'20px 22px',fontFamily:SS,fontSize:13,color:C.stone}}>Aucun logiciel ne vous a encore été attribué. Demandez au patron de vous donner accès depuis l'onglet <strong>Gérer mon équipe</strong>.</div>}
        </div>
      </div>
      {launchedSoftware&&<SoftwareLaunchModal software={launchedSoftware} onClose={()=>setLaunchedSoftware(null)}/>}    
    </>;
  }
  return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{width:460,background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',boxShadow:'0 14px 40px rgba(10,10,8,0.05)'}}>
      <div style={{fontFamily:SS,fontSize:9,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:C.stone,marginBottom:8}}>Invitation équipe</div>
      <div style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,marginBottom:6}}>Rejoindre {owner.company}</div>
      <div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6,marginBottom:18}}>Créez votre accès membre ou connectez-vous. Après connexion, vous aurez uniquement accès au hub logiciels qui vous est attribué.</div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setMode('register')} style={{flex:1,background:mode==='register'?C.ink:'transparent',border:`1px solid ${mode==='register'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='register'?C.ivory:C.stone,cursor:'pointer'}}>Créer mon accès</button>
        <button onClick={()=>setMode('login')} style={{flex:1,background:mode==='login'?C.ink:'transparent',border:`1px solid ${mode==='login'?C.ink:C.linen}`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:11,fontWeight:700,color:mode==='login'?C.ivory:C.stone,cursor:'pointer'}}>Connexion</button>
      </div>
      {mode==='register'&&<div style={{marginBottom:12}}><TI label='Nom complet' value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>}
      <TI label='Email' value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type='email'/>
      <TI label='Mot de passe' value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} type='password' mb={10}/>
      {err&&<div style={{background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:6,padding:'10px 12px',fontFamily:SS,fontSize:12,color:C.red,marginBottom:12}}>{err}</div>}
      <button onClick={mode==='register'?doRegister:doLogin} style={{width:'100%',background:C.gold,border:'none',borderRadius:6,padding:'11px 14px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ink,cursor:'pointer'}}>{mode==='register'?'Créer et accéder au hub':'Se connecter au hub'}</button>
    </div>
  </div>;
};

  const teamOwnerId=teamInvite?.ownerId || teamParams.get('owner');
  const teamOwner=teamOwnerId?users.find(u=>String(u.id)===String(teamOwnerId))||null:null;

  const openAuth=(mode)=>{setAuthMode(mode);setShowAuth(true);};

  const login=(u,isNew)=>{
    setUser(u);
    setUsers(p=>{const ex=p.find(x=>x.id===u.id);return ex?p.map(x=>x.id===u.id?u:x):[...p,u];});
    setView(u.role==="admin"?"a-dashboard":"c-market");
    setShowAuth(false);
    if(isNew)setShowOnboard(true);
  };

  const logout=()=>{setUser(null);setView("c-market");};

  const setUserSync=updater=>{
    setUser(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setUsers(us=>us.map(u=>u.id===next.id?next:u));
      return next;
    });
  };

  const onboardDone=(picks)=>{
    setShowOnboard(false);
    if(picks.length>0){
      const now=Date.now();
      setUserSync(u=>({...u,trials:{...u.trials,...picks.reduce((a,id)=>({...a,[id]:now}),{})}}));
    }
  };

  const isAdmin=user?.role==='admin';
  const activeNav=view==='a-client-detail'?'a-clients':view;
  const NAV=isAdmin?ADMIN_NAV:PUBLIC_NAV;

  if(teamMode){
    if(teamOwner){
      return <TeamHubView owner={teamOwner} teamToken={teamToken} software={software}/>;
    }
    return <div style={{minHeight:'100vh',background:C.dim,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}><div style={{background:C.paper,border:`1px solid ${C.linen}`,borderRadius:14,padding:'34px 36px',textAlign:'center',maxWidth:460}}><div style={{fontSize:38,marginBottom:12}}>🔒</div><div style={{fontFamily:SF,fontSize:28,fontWeight:700,color:C.ink,marginBottom:6}}>Lien équipe invalide</div><div style={{fontFamily:SS,fontSize:13,color:C.stone,lineHeight:1.6,marginBottom:18}}>Ce lien n'est plus reconnu dans cette démo. Générez un nouveau lien depuis le compte du patron pour partager l'accès équipe.</div><button onClick={()=>window.location.href=window.location.pathname} style={{background:C.ink,border:'none',borderRadius:6,padding:'10px 16px',fontFamily:SS,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.ivory,cursor:'pointer'}}>Retour à la plateforme</button></div></div>;
  }

  return (
    <div style={{fontFamily:SS,background:C.dim,minHeight:"100vh",display:"flex"}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

      {showOnboard&&<Onboarding user={user} onDone={onboardDone}/>}
      {showAuth&&<AuthModal onLogin={login} initMode={authMode} onClose={()=>setShowAuth(false)}/>}

      {/* Sidebar */}
      <div style={{width:216,background:C.deep,display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:10,flexShrink:0}}>
        <div style={{padding:"22px 18px 14px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <div style={{fontFamily:SF,fontSize:20,fontWeight:700,color:C.ivory,letterSpacing:5,marginBottom:4}}>ONIQ</div>
          <div style={{height:1,background:`linear-gradient(90deg,${C.gold}88,transparent)`,marginBottom:5}}/>
          <div style={{fontFamily:SS,fontSize:8,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(255,255,255,0.18)"}}>{isAdmin?"Admin":user?"Espace Client":"Marketplace"}</div>
        </div>

        <nav style={{flex:1,padding:"10px 8px",display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>setView(item.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 13px',borderRadius:4,background:activeNav===item.id?`${C.gold}1A`:'transparent',border:`1px solid ${activeNav===item.id?C.gold+'44':'transparent'}`,color:activeNav===item.id?C.gold:'rgba(255,255,255,0.33)',cursor:'pointer',fontFamily:SS,fontSize:12,fontWeight:activeNav===item.id?600:400,textAlign:'left',transition:'all 0.15s',width:'100%'}}
              onMouseEnter={e=>{if(activeNav!==item.id){e.currentTarget.style.color='rgba(255,255,255,0.6)';e.currentTarget.style.background='rgba(255,255,255,0.04)';}}}
              onMouseLeave={e=>{if(activeNav!==item.id){e.currentTarget.style.color='rgba(255,255,255,0.33)';e.currentTarget.style.background='transparent';}}}
            ><span style={{fontSize:11,opacity:0.5}}>{item.g}</span>{item.label}</button>
          ))}

          <>
            <div style={{height:1,background:'rgba(255,255,255,0.05)',margin:'8px 6px'}}/>
            <div style={{padding:'5px 13px 3px',fontFamily:SS,fontSize:8,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:'rgba(255,255,255,0.18)'}}>Espace pro</div>
            {(user?CLIENT_PRO_NAV:LOCKED_PRO).map(item=>(
              <button key={item.id} onClick={()=>user?setView(item.id):openAuth('register')} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 13px',borderRadius:4,background:user&&activeNav===item.id?`${C.gold}1A`:'transparent',border:`1px solid ${user&&activeNav===item.id?C.gold+'44':'transparent'}`,color:user?(activeNav===item.id?C.gold:'rgba(255,255,255,0.33)'):'rgba(255,255,255,0.18)',cursor:'pointer',fontFamily:SS,fontSize:12,textAlign:'left',width:'100%',transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!(user&&activeNav===item.id)){e.currentTarget.style.color=user?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.42)';e.currentTarget.style.background='rgba(255,255,255,0.03)';}}}
                onMouseLeave={e=>{if(!(user&&activeNav===item.id)){e.currentTarget.style.color=user?'rgba(255,255,255,0.33)':'rgba(255,255,255,0.18)';e.currentTarget.style.background='transparent';}}}
              ><span style={{fontSize:11,opacity:user?0.5:0.35}}>{item.g}</span><span style={{flex:1}}>{item.label}</span>{!user&&<span style={{fontSize:9,opacity:0.4}}>🔒</span>}</button>
            ))}
            <div style={{padding:'12px 13px 3px',fontFamily:SS,fontSize:8,fontWeight:700,letterSpacing:'0.18em',textTransform:'uppercase',color:'rgba(255,255,255,0.18)'}}>Hub</div>
            {(user?CLIENT_HUB_NAV:LOCKED_HUB).map(item=>(
              <button key={item.id} onClick={()=>user?setView(item.id):openAuth('register')} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 13px',borderRadius:4,background:user&&activeNav===item.id?`${C.gold}1A`:'transparent',border:`1px solid ${user&&activeNav===item.id?C.gold+'44':'transparent'}`,color:user?(activeNav===item.id?C.gold:'rgba(255,255,255,0.33)'):'rgba(255,255,255,0.18)',cursor:'pointer',fontFamily:SS,fontSize:12,textAlign:'left',width:'100%',transition:'all 0.15s'}}
                onMouseEnter={e=>{if(!(user&&activeNav===item.id)){e.currentTarget.style.color=user?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.42)';e.currentTarget.style.background='rgba(255,255,255,0.03)';}}}
                onMouseLeave={e=>{if(!(user&&activeNav===item.id)){e.currentTarget.style.color=user?'rgba(255,255,255,0.33)':'rgba(255,255,255,0.18)';e.currentTarget.style.background='transparent';}}}
              ><span style={{fontSize:11,opacity:user?0.5:0.35}}>{item.g}</span><span style={{flex:1}}>{item.label}</span>{!user&&<span style={{fontSize:9,opacity:0.4}}>🔒</span>}</button>
            ))}
          </>
        </nav>

        <div style={{padding:"11px 14px",borderTop:"1px solid rgba(255,255,255,0.05)"}}>
          {user?(
            <>
              <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:9}}>
                <div style={{width:26,height:26,borderRadius:4,background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:C.ink,fontFamily:SF,flexShrink:0}}>{user.avatar}</div>
                <div style={{overflow:"hidden"}}><div style={{fontFamily:SS,fontSize:11,fontWeight:600,color:C.ivory,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.company}</div><div style={{fontFamily:SS,fontSize:8,letterSpacing:"0.1em",color:"rgba(255,255,255,0.22)",textTransform:"uppercase"}}>{isAdmin?"Admin":"Client"}</div></div>
              </div>
              <button onClick={logout} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:4,padding:"7px",fontFamily:SS,fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.28)",cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Déconnexion</button>
            </>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              <button onClick={()=>openAuth("register")} style={{width:"100%",background:C.gold,border:"none",borderRadius:4,padding:"9px",fontFamily:SS,fontSize:10,fontWeight:800,color:C.ink,cursor:"pointer",letterSpacing:"0.1em",textTransform:"uppercase"}}>Créer un compte</button>
              <button onClick={()=>openAuth("login")} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"7px",fontFamily:SS,fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.4)",cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Se connecter</button>
            </div>
          )}
        </div>
      </div>

      {/* Main */}
      <div style={{marginLeft:216,flex:1,overflowY:"auto",minHeight:"100vh"}}>
        {isAdmin&&(
          <div style={{padding:"32px 36px"}}>
            <div style={{maxWidth:1040,margin:"0 auto"}}>
              {view==="a-dashboard"&&<AdminDash users={users} software={software} devis={devis} setView={setView}/>}
              {view==="a-clients"&&<AdminClients users={users} setUsers={setUsers} software={software} setView={setView} setSelClient={setSelClient}/>}
              {view==="a-client-detail"&&<AdminClientDetail client={selClient} setClient={setSelClient} users={users} setUsers={setUsers} software={software} setView={setView}/>}
              {view==="a-software"&&<AdminSoftware software={software} setSoftware={setSoftware}/>}
              {view==="a-devis"&&<AdminDevis devis={devis} setDevis={setDevis}/>}
              {view==="a-factures"&&<AdminFactures users={users} software={software}/>}
              {view==="a-referrals"&&<AdminReferrals users={users}/>}
            </div>
          </div>
        )}
        {!isAdmin&&(
          <>
            {view==="c-market"&&<Marketplace user={user} setUser={setUserSync} software={software} setView={setView} onAuth={openAuth}/>}
            {view==="pub-secteurs"&&<Secteurs onSector={s=>{setSelSector(s);setView("pub-sector-detail");}} onAuth={openAuth}/>}
            {view==="pub-sector-detail"&&<SectorDetail sector={selSector} onBack={()=>setView("pub-secteurs")} onAuth={openAuth} user={user}/>}
            {view==="pub-apropos"&&<Apropos onAuth={openAuth}/>}
            {view==="c-espace"&&user&&<MonEspace user={user} setUser={setUserSync} software={software}/> }
            {view==="c-hub"&&user&&<SoftwareHub user={user} software={software} setUser={setUserSync}/> }
            {view==="c-parrainage"&&user&&<Parrainage user={user}/>}
            {view==="c-devis"&&<DevisClient user={user}/>}
            {(view==="c-espace"||view==="c-hub"||view==="c-parrainage")&&!user&&(
              <div style={{padding:"80px 36px",textAlign:"center"}}>
                <div style={{maxWidth:380,margin:"0 auto"}}>
                  <div style={{fontSize:38,marginBottom:14}}>🔒</div>
                  <div style={{fontFamily:SF,fontSize:22,fontWeight:700,color:C.ink,marginBottom:7}}>Fonctionnalité pro</div>
                  <div style={{fontFamily:SS,fontSize:13,color:C.stone,marginBottom:26,lineHeight:1.7}}>
                    {view==="c-espace"&&"Gérez vos abonnements, essais et factures."}
                    {view==="c-hub"&&"Retrouvez tous les logiciels inclus dans l'abonnement du client."}
                    {view==="c-parrainage"&&"Parrainez des confrères, gagnez des mois offerts."}
                                      </div>
                  <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                    <button onClick={()=>openAuth("login")} style={{background:"transparent",border:`1px solid ${C.linen}`,borderRadius:4,padding:"9px 18px",fontFamily:SS,fontSize:11,fontWeight:700,color:C.stone,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Se connecter</button>
                    <button onClick={()=>openAuth("register")} style={{background:C.gold,border:"none",borderRadius:4,padding:"9px 18px",fontFamily:SS,fontSize:11,fontWeight:800,color:C.ink,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.1em"}}>Créer un compte gratuit</button>
                  </div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
